<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-light.min.css">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #ffffff;
  --bg-alt: #f5f5f7;
  --bg-sidebar: #f5f5f7;
  --bg-code: #f5f5f7;
  --bg-surface: #f5f5f7;

  --text: #1d1d1f;
  --text-body: rgba(0, 0, 0, 0.8);
  --text-muted: rgba(0, 0, 0, 0.56);
  --text-tertiary: rgba(0, 0, 0, 0.48);
  --text-heading: #1d1d1f;

  --accent: #0071e3;
  --link: #0066cc;

  --border: rgba(0, 0, 0, 0.08);
  --border-strong: rgba(0, 0, 0, 0.16);

  --sidebar-width: 300px;
  --topbar-height: 52px;
  --progress-height: 3px;

  --shadow-elev: rgba(0, 0, 0, 0.22) 3px 5px 30px 0px;
}

html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }

body {
  font-family: 'SF Pro Text', -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Pretendard', system-ui, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
  font-size: 17px;
  line-height: 1.47;
  letter-spacing: -0.022em;
  color: var(--text);
  background: var(--bg);
  overflow-x: hidden;
  font-feature-settings: "kern", "liga", "calt";
  word-break: keep-all;
  overflow-wrap: break-word;
}

#progress-bar {
  position: fixed;
  top: 0;
  left: 0;
  height: var(--progress-height);
  background: linear-gradient(90deg, #0071e3, #2997ff);
  z-index: 10000;
  transition: width 0.1s linear;
  width: 0%;
}

#topbar {
  position: fixed;
  top: var(--progress-height);
  left: 0;
  right: 0;
  height: var(--topbar-height);
  background: rgba(255, 255, 255, 0.72);
  backdrop-filter: saturate(180%) blur(20px);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 24px;
  z-index: 1000;
}

#topbar .menu-toggle {
  display: none;
  background: none;
  border: none;
  color: var(--text);
  font-size: 22px;
  cursor: pointer;
  margin-right: 12px;
  padding: 6px 10px;
  border-radius: 8px;
}

#topbar .menu-toggle:hover { background: rgba(0,0,0,0.04); }

#topbar .title {
  font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', sans-serif;
  font-size: 17px;
  font-weight: 600;
  color: var(--text-heading);
  letter-spacing: -0.022em;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

#topbar .back-link {
  margin-left: 16px;
  color: var(--link);
  text-decoration: none;
  font-size: 13.5px;
  font-weight: 500;
  white-space: nowrap;
  padding: 7px 14px;
  border-radius: 980px;
  border: 1px solid var(--border);
  letter-spacing: -0.014em;
  transition: background 0.15s, border-color 0.15s, color 0.15s;
}

#topbar .back-link:hover {
  background: rgba(0, 113, 227, 0.06);
  border-color: var(--accent);
  color: var(--accent);
}

/* Language toggle — inline link style (no box) */
#topbar .lang-toggle {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  letter-spacing: -0.010em;
}
#topbar .lang-toggle a {
  color: var(--text-muted);
  text-decoration: none;
  padding: 4px 2px;
  transition: color 0.15s;
  cursor: pointer;
}
#topbar .lang-toggle a:hover { color: var(--text); }
#topbar .lang-toggle a.active {
  color: var(--text-heading);
  font-weight: 600;
}
#topbar .lang-toggle .sep { color: var(--border-strong); }

#sidebar {
  position: fixed;
  top: calc(var(--progress-height) + var(--topbar-height));
  left: 0;
  width: var(--sidebar-width);
  height: calc(100vh - var(--topbar-height) - var(--progress-height));
  background: var(--bg-sidebar);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  z-index: 999;
  display: flex;
  flex-direction: column;
  scrollbar-width: thin;
  scrollbar-color: rgba(0,0,0,0.16) transparent;
}

#sidebar::-webkit-scrollbar { width: 6px; }
#sidebar::-webkit-scrollbar-track { background: transparent; }
#sidebar::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.16); border-radius: 3px; }

#search-box {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  background: rgba(255, 255, 255, 0.6);
  flex-shrink: 0;
}

#search-input {
  width: 100%;
  padding: 9px 12px;
  background: #ffffff;
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-size: 13.5px;
  outline: none;
  font-family: inherit;
  letter-spacing: -0.016em;
  transition: border-color 0.15s, box-shadow 0.15s;
}

#search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0, 113, 227, 0.15); }
#search-input::placeholder { color: var(--text-muted); }

#toc-container {
  flex: 1;
  overflow-y: auto;
  padding: 8px 0 32px;
}

#toc-container::-webkit-scrollbar { width: 4px; }
#toc-container::-webkit-scrollbar-track { background: transparent; }
#toc-container::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.12); border-radius: 2px; }

/* Chapter level (h1) */
.toc-item {
  display: block;
  padding: 8px 16px 8px 20px;
  color: var(--text);
  text-decoration: none;
  font-size: 14px;
  font-weight: 600;
  line-height: 1.4;
  letter-spacing: -0.014em;
  border-left: 3px solid transparent;
  transition: color 0.15s, background 0.15s, border-color 0.15s;
  cursor: pointer;
}

/* Section (h2) */
.toc-item.toc-h2 {
  padding: 5px 16px 5px 36px;
  font-size: 13px;
  font-weight: 400;
  color: var(--text-muted);
  letter-spacing: -0.012em;
}

.toc-item.toc-h2 + .toc-item:not(.toc-h2) { margin-top: 6px; }

.toc-item:hover {
  color: var(--text);
  background: rgba(0, 0, 0, 0.04);
}

.toc-item.toc-h2:hover { color: var(--text); }

.toc-item.active {
  color: var(--accent);
  border-left-color: var(--accent);
  background: rgba(0, 113, 227, 0.08);
  font-weight: 700;
}

.toc-item.toc-h2.active {
  font-weight: 500;
  color: var(--accent);
}

.toc-item.toc-hidden { display: none; }

.toc-group-label {
  display: block;
  padding: 22px 16px 6px 20px;
  font-size: 11px;
  font-weight: 700;
  color: rgba(0, 0, 0, 0.42);
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

.toc-group-label:first-child { padding-top: 8px; }
.toc-group-label.toc-hidden { display: none; }

.toc-no-results {
  padding: 20px 16px;
  color: var(--text-muted);
  font-size: 13.5px;
  text-align: center;
  display: none;
  letter-spacing: -0.014em;
}

#main-content {
  margin-left: var(--sidebar-width);
  margin-top: calc(var(--progress-height) + var(--topbar-height));
  min-height: calc(100vh - var(--topbar-height) - var(--progress-height));
  padding: 56px 56px 96px;
}

#content {
  max-width: 820px;
  margin: 0 auto;
}

#loading {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 80px 20px;
  color: var(--text-muted);
}

.spinner {
  width: 36px;
  height: 36px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin-bottom: 16px;
}

@keyframes spin { to { transform: rotate(360deg); } }

#content h1, #content h2, #content h3, #content h4, #content h5, #content h6 {
  font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Pretendard', sans-serif;
  color: var(--text-heading);
  font-feature-settings: "ss01", "kern";
  scroll-margin-top: 72px;
}

#content h1 {
  font-size: 48px;
  font-weight: 600;
  line-height: 1.08;
  letter-spacing: -0.018em;
  margin: 0 0 28px 0;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
}

#content h1:not(:first-of-type) {
  margin-top: 96px;
}

#content h1 + blockquote {
  border-left: none;
  background: transparent;
  text-align: center;
  font-size: 18px;
  color: var(--text-muted);
  padding: 8px 0 24px;
  letter-spacing: -0.018em;
}

#content h2 {
  font-size: 30px;
  font-weight: 600;
  line-height: 1.10;
  letter-spacing: -0.014em;
  margin: 56px 0 18px 0;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
}

#content h3 {
  font-size: 22px;
  font-weight: 600;
  line-height: 1.16;
  letter-spacing: -0.012em;
  margin: 40px 0 12px 0;
}

#content h4 {
  font-size: 18px;
  font-weight: 600;
  line-height: 1.22;
  letter-spacing: -0.010em;
  margin: 28px 0 10px 0;
}

#content h5, #content h6 {
  font-size: 17px;
  font-weight: 600;
  line-height: 1.3;
  margin: 24px 0 8px 0;
}

#content p { margin: 0 0 16px 0; color: var(--text-body); }

#content a {
  color: var(--link);
  text-decoration: none;
  transition: color 0.15s;
}

#content a:hover { text-decoration: underline; text-underline-offset: 2px; }

#content ul, #content ol {
  margin: 0 0 16px 0;
  padding-left: 28px;
}

#content li { margin-bottom: 6px; color: var(--text-body); }
#content li > ul, #content li > ol { margin-top: 6px; margin-bottom: 6px; }

#content hr {
  border: none;
  border-top: 1px solid var(--border);
  margin: 56px 0;
}

#content strong { color: var(--text); font-weight: 600; }

#content img {
  max-width: 100%;
  height: auto;
  border-radius: 12px;
  margin: 12px 0;
}

#content code {
  font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, 'Liberation Mono', monospace;
  font-size: 0.82em;
  letter-spacing: 0;
}

#content :not(pre) > code {

  padding: 2px 6px;
  border-radius: 5px;
  color: var(--text);
}

#content pre {
  background: var(--bg-code);
  border: none;
  border-radius: 12px;
  padding: 18px 20px;
  overflow-x: auto;
  margin: 0 0 20px 0;
  font-size: 13px;
  line-height: 1.55;
}

#content pre code {
  background: none;
  padding: 0;
  color: inherit;
  font-size: inherit;
}

#content table {
  width: 100%;
  border-collapse: collapse;
  margin: 0 0 20px 0;
  font-size: 15px;
  display: block;
  overflow-x: auto;
}

#content thead { background: var(--bg-surface); }

#content th {

  color: var(--text-heading);

#content blockquote {

}

#content blockquote strong { color: var(--accent); }

.katex { font-size: 1.05em; }
.katex-display { overflow-x: auto; overflow-y: hidden; padding: 4px 0; margin: 20px 0; }

mark.search-highlight {

.guide-overview .overview-header { margin-bottom: 44px; }
.guide-overview .overview-title {

<textarea id="md-source-ko" style="display:none;">
# 참고한 자료와 감사

이 자료는 아래 저자와 글에서 많은 것을 배웠다. 본문은 그 자료들을
그대로 옮긴 요약이 아니라, 로보틱스·CV 연구를 시작하는 학생의 작업
흐름에 맞게 다시 엮은 산문이다. 그래도 출발점은 분명히 남겨 두어야
한다. 좋은 생각은 원래 나온 자리로 돌아갈 수 있어야 한다.

## 과학 글쓰기와 논문 읽기

- George D. Gopen, Judith A. Swan, “The Science of Scientific Writing”
- S. Keshav, “How to Read a Paper”
- George M. Whitesides, “Whitesides’ Group: Writing a Paper”
- Brett Mensh, Konrad Kording, “Ten Simple Rules for Structuring Papers”
- Donald E. Knuth, Tracy Larrabee, Paul M. Roberts, *Mathematical Writing*

## 한국어 연구 생활과 논문 쓰기

- 엄태웅 작가, 최윤섭 박사, 권창현 교수의 [gradschoolstory](https://gradschoolstory.chkwon.net) 글들
- 김기섭 교수의 [gsk1m.github.io](https://gsk1m.github.io/)와 [gisbi-kim.github.io](https://gisbi-kim.github.io/) 글들
- 임형태 박사의 paper writing checklist, Awesome-PhD-CV, paper-quality-stat-plots
- cxli233의 *Friends Don’t Let Friends Make Bad Graphs* 계열 글

## 시각적 비유와 자매 자료

- Matt Might, [*The Illustrated Guide to a PhD*](https://matt.might.net/articles/phd-school-in-pictures/)
- 자매 프로젝트 [robotics-practice](../robotics-practice/)의 Spatial AI·SLAM·CV 연구 운영 메모

## 이 책의 흐름

이 책은 네 묶음으로 읽힌다. 먼저 넓은 관심을 좁은 질문으로 바꾸는 법을
본다. 그 다음 읽기를 양이 아니라 판단의 문제로 다룬다. 세 번째 묶음은
그 판단을 논문의 골격과 증거로 바꾸는 일이다. 마지막에는 학회를 결과의
전시장보다 다음 질문을 얻는 장소로 본다. 읽기, 쓰기, 발표는 따로 떨어진
기술이 아니라 같은 연구가 통과하는 네 국면이다.

<h1 id="chapter-1">Ch.1 — 연구는 주제를 받는 일이 아니라 질문을 좁히는 일이다</h1>

처음 연구실에 들어오면 대개 논문 한 편이나 키워드 하나가 손에 들어온다. 지도교수가 던져 준 주제, 선배가 하다 남긴 코드, 최근에 많이 보이는 benchmark. 그때 가장 흔한 오해는 그것이 곧 내 연구라고 믿는 것이다. 주제는 연구의 출발점일 수는 있지만 연구 그 자체는 아니다. 연구는 남이 준 넓은 말을 내 손으로 좁혀, 어느 한 문장으로 책임질 수 있게 만드는 과정이다.

분야 진입의 첫 단계는 리뷰 논문을 읽는 일이지만, 리뷰를 읽는 이유도 지식을 많이 모으기 위해서가 아니다. 리뷰는 지도를 제공한다. 지도에서 해야 할 일은 모든 길을 외우는 것이 아니라 내가 서 있는 위치와 아직 비어 있는 길을 찾는 것이다. 좋은 리뷰를 읽고 나면 네 질문이 남아야 한다. 이 분야는 무엇을 문제로 삼아 왔는가. 어떤 접근이 반복되어 왔는가. 아직 해결되지 않은 자리는 어디인가. 내가 들어갈 수 있는 좁은 틈은 어디인가.

Keshav식 citation overlap survey도 결국 같은 일을 한다. seed paper 몇 편을 잡고 backward citation과 forward citation을 같이 본다. 여러 논문이 반복해서 부르는 paper는 분야의 바닥이고, 여러 paper가 반복해서 부르는 사람은 분야의 축이다. 2026년에는 이 일을 Google Scholar, Semantic Scholar, OpenAlex, Connected Papers 같은 paper graph로 훨씬 빨리 할 수 있다. 하지만 도구가 빨라졌다고 판단이 사라지는 것은 아니다. graph가 보여 주는 것은 연결이고, 연구자가 해야 하는 일은 그 연결 중 어느 하나가 내 질문으로 좁혀질 수 있는지 보는 일이다.

질문을 좁힐 때 파인만식 세 줄이 유용하다. 문제를 쓴다. 아주 열심히 생각한다. 답을 쓴다. 우스울 만큼 단순하지만, 대부분의 막힘은 첫 줄에서 이미 드러난다. 문제를 한 줄로 쓰지 못한 상태에서 방법을 고르면, 방법은 곧 장식이 된다. 로보틱스라면 “SLAM을 하고 싶다”는 문제도 아니고 “LiDAR localization을 개선하고 싶다”도 아직 문제라고 부르기 어렵다. “비가 오는 야외 주차장에서 range-image 기반 localization이 실패하는 조건을 줄이고 싶다” 정도가 되어야 실험과 비교 대상이 붙기 시작한다.

여기서 중요한 것은 처음부터 정답을 맞히는 일이 아니다. 첫 problem statement는 틀려도 된다. 오히려 틀리는 편이 정상이다. 다만 한 문장으로 좁혀져 있어야 다음 논문이 그 문장을 고치게 만들 수 있다. 넓은 관심사는 읽을수록 더 넓어지지만, 좁은 문장은 읽을수록 더 정확해진다.

연구의 주도권은 바로 그 좁히기에서 생긴다. 교수의 제안을 거부해서가 아니라, 교수의 제안 안에서 내가 책임질 수 있는 한 문장을 만들 때 생긴다. 누가 던져 준 문제인가보다 중요한 것은 그 문제를 내가 어떤 말로 다시 쓰는가다. 10년 후에도 남는 연구자의 스타일은 거창한 어휘에서 나오지 않는다. 넓은 세계를 보고도 자기 손에 들어올 만큼 정확한 한 문장을 만드는 습관에서 나온다.

---

<h1 id="chapter-2">Ch.2 — 오래 앉아 있어도 생각하지 않으면 연구가 아니다</h1>

연구실에 오래 앉아 있었다는 사실은 위안이 된다. 일정표에는 시간이 채워지고, 노트북 화면에는 코드와 논문이 떠 있고, 밤이 되면 피곤하다. 그런데 어떤 날은 열두 시간을 보냈는데도 아침과 같은 문제를 그대로 들고 퇴근한다. 그날 한 일은 분명 있었지만 연구는 거의 움직이지 않았다. 이 차이를 구분하지 못하면 박사과정의 시간이 가장 쉽게 새어 나간다.

연구 시간에는 적어도 세 층이 있다. 손이 움직이는 시간, 머리가 연결하는 시간, 아무것도 안 하는 것처럼 보이지만 문제가 내부에서 익는 시간. 손이 움직이는 시간은 가장 잘 보인다. 코드를 짜고, 빌드를 고치고, 표를 만들고, 문장을 옮긴다. 이 시간은 필요하지만 연구의 전부는 아니다. 머리가 연결하는 시간은 더 비싸다. 지금 보고 있는 실패가 어느 가정에서 왔는지, figure 하나가 어떤 claim을 받치는지, 한 실험이 논문 전체에서 무엇을 바꾸는지 묻는 시간이다. 마지막으로 멈춤의 시간이 있다. 산책, 샤워, 잠깐의 빈 시간처럼 보이는 곳에서 문제가 다른 형태로 다시 떠오른다.

새 도구를 익히는 시간과 생각하는 시간을 섞지 않는 편이 좋다. 새 템플릿, 새 editor, 새 자동화 환경을 만지는 동안에는 생각이 도구에 끌려간다. 도구를 익히는 시간은 따로 잡고, 생각의 시간에는 이미 손에 익은 도구를 쓴다. 좋은 도구는 생각을 대신하지 않고, 생각이 끊기지 않게 해 준다.

손으로 쓰는 일이 아직 살아 있는 이유도 여기에 있다. 손글씨가 낭만적이라서가 아니다. 손은 속도를 늦춘다. 키보드에서는 문장이 너무 빨리 늘어나고, 빠르게 늘어난 문장은 종종 생각보다 앞서 간다. 손으로 쓰면 한 문장마다 멈춤이 생기고, 그 멈춤 안에서 문제의 모양이 바뀐다. 특히 problem statement, contribution, rebuttal의 첫 문장처럼 논문 전체를 묶는 문장은 느리게 써야 한다.

코드가 돌아가는 것과 이해한 것도 다르다. baseline을 빌드하고 dataset을 통과시켰다고 해서 그 논문을 이해한 것은 아니다. 그 코드의 어느 함수가 논문의 어느 claim과 맞물리는지, 어떤 실패가 논문에서 말한 limitation과 같은 것인지 알아야 한다. 실행은 이해의 입구일 뿐이다.

10년 후의 스타일은 이 시간 구분에서 생긴다. 오래 앉는 사람은 많다. 빠르게 도구를 바꾸는 사람도 많다. 하지만 자기에게 생각이 시작되는 조건을 알고, 그 조건을 지키고, 손이 바쁜 시간과 머리가 일하는 시간을 구분하는 사람은 드물다. 연구자는 시간을 많이 쓰는 사람이 아니라, 생각이 실제로 움직이는 자리를 알아보는 사람이다.

<h1 id="chapter-3">Ch.3 — 읽기는 더 읽는 기술이 아니라 덜 읽는 기술이다</h1>

질문이 좁아지고 생각의 시간이 따로 확보되면, 다음 문제는 입력이다. 새
논문은 계속 들어오고, 모든 논문은 자기가 중요하다고 말한다. 여기서
연구자의 일은 더 많이 삼키는 것이 아니라, 자기 질문 앞에 세울 것과
지나쳐 보낼 것을 가르는 일이다.

논문 읽기에서 가장 먼저 배워야 할 일은 많이 읽는 법이 아니다. 안 읽을 논문을 빨리 버리는 법이다. 분야가 조금만 넓어져도 한 주에 들어오는 후보는 감당할 수 없을 만큼 많아진다. paper graph와 alert는 쉬지 않고 새 논문을 밀어 넣고, 학회가 가까워지면 accepted paper list와 OpenReview thread까지 따라붙는다. 이 시대의 독해력은 모든 것을 소화하는 능력이 아니라, 직접 읽을 3-5편을 남기는 능력이다.

좋은 선별은 네 가지 신호를 본다. 첫째, citation과 discussion의 움직임이다. 인용 수 하나로 판단하지는 않지만, 어떤 논문이 누구에게 빨리 읽히고 있는지는 정보다. 둘째, 저자와 기관의 prior다. 이미 신뢰가 쌓인 그룹의 신작은 first pass 우선권을 받는다. 셋째, figure 1이다. 한 컷에서 message가 잡히지 않으면 본문도 흔들릴 가능성이 크다. 넷째, abstract의 모래시계 구조다. 넓은 분야 문제에서 정확한 paper gap으로 좁혀지고, 다시 분야적 함의로 열리는가. 이 네 신호는 빠른 거절을 위한 도구다.

입력 시스템은 단순해야 한다. paper graph와 alert, 신뢰 그룹의 lab page, venue와 review surface, 해설과 큐레이션. 이 네 묶음이면 충분하다. 모든 입력원을 매일 열어보는 결정은 연구 열심이 아니라 집중력 낭비다. 주 1회 정해진 시간에 weekly brief를 만들고, 모델에는 metadata와 abstract만이 아니라 source URL, project page, code link, OpenReview link를 함께 넣는다. 질문은 “좋은 논문을 찾아 줘”가 아니라 “내 thesis와 가까운 후보와 그 근거 위치를 보여 줘”여야 한다.

모델이 고른 후보를 읽었다고 착각하면 안 된다. 도구는 후보를 올리고 제외 사유를 제안할 수 있다. 하지만 1st pass는 사람이 들어가야 한다. 노트에 남는 것도 긴 요약이 아니라 내가 확인한 근거 위치와 다음 결정이어야 한다. 읽지 않은 논문을 읽은 척 저장하는 시스템은 없는 편이 낫다.

신간은 core paper 위에 놓일 때만 의미가 생긴다. 분야의 고전 5-10편이 본인 안에 없으면 신간은 모두 따로 떠다닌다. 신입에게 필요한 것은 alert를 많이 켜는 일이 아니라 core paper 한 편을 끝까지 읽는 일이다. 고전 위에 신간을 올려놓을 수 있을 때, “이 논문은 어느 흐름의 다음 한 수인가”가 보인다.

읽기는 양의 문제가 아니다. 읽기는 판단의 문제다. 무엇을 버릴지, 무엇을 first pass까지만 볼지, 무엇을 3rd pass까지 들고 갈지 결정하는 일이다. 10년 후에도 남는 독자는 많이 읽은 사람이 아니라, 자기 질문 앞에서 어떤 텍스트가 필요한지 알아보는 사람이다.

<h1 id="chapter-4">Ch.4 — 한 편을 읽었다는 말은 남길 판단이 있다는 뜻이다</h1>

논문을 읽었다는 말은 페이지를 넘겼다는 뜻이 아니다. abstract를 이해했다는 뜻도 아니다. 읽은 뒤에 남길 판단이 있어야 한다. 이 논문은 어떤 종류인가. 누구의 작업 뒤에 서 있는가. 주장이 타당한가. 무엇을 기여했다고 말하는가. 글은 명료한가. Keshav의 5 Cs는 단순한 체크리스트처럼 보이지만, 실제로는 읽기의 최소 산출물이다.

1st pass는 논문을 평가하는 첫 만남이다. title, abstract, introduction, heading, conclusion, figure 정도만 본다. 본문 디테일에는 들어가지 않는다. 이때 할 일은 논문을 이해하는 것이 아니라 계속 읽을 가치가 있는지 판단하는 것이다. 5-10분 안에 5 Cs가 채워지지 않으면 두 가지 가능성이 있다. 글쓴이가 message를 못 잡았거나, 내가 배경을 모른다. 둘 다 멈춤 신호다.

2nd pass는 내용을 잡는 단계다. 본문을 읽되 증명과 구현 디테일에 너무 오래 머물지 않는다. figure와 graph는 면밀히 본다. 축 라벨, error bar, dataset split, ablation 조건은 논문의 정직함이 드러나는 자리다. 이 단계의 산출물은 한 단락 요약이다. 어떤 문제를 잡았고, 어떤 방법으로 접근했고, 무엇을 보였는가. 한 시간이 넘어가면 배경이 부족하다는 신호다. 모르는 reference 한두 편을 1st pass로 보고 돌아오는 편이 낫다.

3rd pass는 머릿속 재구현이다. 저자가 둔 가정과 같은 가정에서 출발해 내가 같은 결론에 도달할 수 있는지 본다. 이때 발견되는 것은 논문의 약점만이 아니다. 빌려올 수 있는 기법, 숨은 가정, 실험 설계의 중심이 함께 보인다. reviewer로 읽을 때는 이 단계가 사실상 필수다. 좋은 reviewer comment는 감상이 아니라 본문 위치와 연결된 판단이다. “unclear”가 아니라 “§3.2의 assumption이 Table 2의 비교 조건과 맞지 않는다”가 되어야 한다.

자동화 도구는 이 과정을 줄여 주기보다 위치를 좁혀 준다. paper packet을 넣고 contribution claim 세 개와 근거 위치를 찾게 한다. related work에서 가장 자주 비교되는 baseline을 묻는다. 수식의 유도 단계를 풀어 달라고 하되, 모르는 부분은 모른다고 표시하게 한다. 그런 다음 사람이 확인한다. 근거 위치가 틀리면 결과는 버린다. 그럴듯한 요약보다 더 위험한 것은 그럴듯한 위치 정보다.

읽기의 목표는 기억이 아니라 판단이다. 좋은 논문은 내 질문을 바꾸고, 나쁜 논문도 왜 나쁜지 알면 내 기준을 바꾼다. 10년 후의 나는 내가 읽은 모든 논문을 기억하지 못한다. 다만 그때 남긴 판단의 형식은 남는다. 어떤 글을 보고 어디에서 멈췄는지, 어떤 근거를 확인하고 어떤 결정을 내렸는지. 그것이 독자의 스타일이다.

---

<h1 id="chapter-5">Ch.5 — 코드는 논문의 주장과 맞물릴 때 읽힌다</h1>

SLAM과 CV 분야에서 논문만 읽는 일은 절반만 읽는 일에 가깝다. 좋은 논문은 대개 code repository, project page, dataset, issue thread를 함께 남긴다. 하지만 코드를 열었다고 해서 더 깊이 읽은 것은 아니다. 코드를 읽는 목적은 repository 구조를 외우는 일이 아니라, 논문의 claim이 실제 구현의 어느 결정과 맞물리는지 확인하는 일이다.

한 편을 코드와 함께 읽는 사이클은 느리다. 먼저 paper를 1st, 2nd pass로 본다. 이 단계에서 message가 잡히지 않으면 repository를 열어도 얻는 것이 적다. 다음으로 README와 entry script를 훑어 어디서 시작해 어디로 흐르는지 한 줄로 적는다. 그 다음 직접 빌드하고 한 번 돌려 본다. build error는 예외가 아니라 작업의 일부다. 마지막으로 paper의 방법 단락과 코드의 함수가 어떻게 대응되는지 찾는다.

이 대응은 모든 줄을 맞추는 작업이 아니다. 결정적인 한두 줄이면 충분하다. 논문에서 “we use a robust kernel”이라고 쓴 문장이 실제로 어느 loss function에 들어가는지, “pre-integration”이라고 부른 과정이 어느 module에서 수행되는지, figure의 pipeline 박스가 코드의 어느 directory로 갈라지는지 찾는다. 그 지점이 잡히면 논문은 설명이 아니라 작동하는 물건이 된다.

issue와 PR도 읽기 자료다. paper는 성공한 경로를 정리하지만 issue는 실패한 경로를 남긴다. build가 자주 깨지는 곳, hyperparameter가 바뀐 이유, multi-threading을 포기한 이유가 issue와 PR에 남아 있다. 논문의 limitation 섹션은 저자가 인식한 한계이고, open issue는 사용자가 부딪힌 한계다. 둘을 함께 보면 방법의 실제 범위가 보인다.

모델은 paper-code 매핑에서 강력하다. “이 문장이 코드의 어느 함수에 해당하는가”를 물으면 후보를 빨리 좁혀 준다. 하지만 line 번호는 쉽게 틀린다. 비슷해 보이는 함수를 짚고 실제로는 다른 모듈일 때도 있다. 후보를 사람이 검증하지 않으면, 6개월 뒤 잘못된 line 번호 위에 자기 실험을 세우게 된다.

수식도 같은 방식으로 읽는다. proof나 derivation을 모두 외우는 것이 아니라, 어떤 가정이 어느 식으로 들어가고 어느 코드 결정으로 내려오는지 본다. 수식이 논문의 주장과 코드의 실행 사이에서 다리 역할을 할 때, 읽기는 비로소 깊어진다.

좋은 연구자는 코드를 직접 다 쓰는 사람이 아니다. 또 모든 코드를 자동화 도구에 맡기는 사람도 아니다. 논문의 주장, 수식의 가정, 코드의 결정이 어디에서 만나는지 알아보는 사람이다. 10년 후에도 남는 구현 감각은 특정 library 사용법이 아니라 이 매핑 능력에서 온다.

<h1 id="chapter-6">Ch.6 — 노트는 기억 창고가 아니라 다음 결정을 남기는 장치다</h1>

논문을 언제든 다시 열어 요약할 수 있는 시대에는 긴 노트의 가치가 줄어든다. 6개월 후 필요한 것은 밑줄의 색이나 요약 문단의 길이가 아니라, 내가 왜 이 논문을 남겼는가다. 노트는 기억 창고가 아니라 다음 결정을 위한 장치다. 다시 돌아왔을 때 이 논문이 baseline인지, related work인지, 반박 대상인지, 아니면 버려도 되는지 바로 알 수 있어야 한다.

한 편의 노트에는 5 Cs 위에 세 칸만 더 붙이면 충분하다. 첫째, claim과 근거 위치. 직접 인용할 문장이 있을 때만 짧은 원문을 남기고, 대부분은 내 말로 쓴 claim과 page, section, figure, table, equation 번호를 남긴다. 둘째, 내 작업과의 거리. 이 논문이 내 thesis의 어디에 붙는지 적는다. 셋째, 다음 액션. 중단, 보류, 진행 중 무엇인지와 다시 볼 시점을 남긴다.

reference manager는 본체가 아니다. DOI, arXiv, OpenReview, venue page, publisher page가 source of truth이고, manager는 그 정보를 논문 양식에 맞게 내보내는 호환 계층이다. 손으로 BibTeX를 typing할 필요는 없지만, 자동 생성된 metadata도 한 번은 본인이 통과해야 한다. DOI가 맞는가. 저자 철자가 맞는가. peer-reviewed version인지 preprint인지 구분되는가. 같은 paper가 두 key로 중복되지 않았는가.

한 편을 저장할 때의 단위는 PDF가 아니라 paper packet이다. packet에는 논문 URL, DOI/arXiv ID, PDF, code repository, project page, supplementary, OpenReview thread, dataset link가 들어간다. PDF는 그중 하나일 뿐이다. PDF 위 표시를 남기는 일은 임시 읽기 흔적일 수 있지만, 재호출의 단위로는 약하다.

모델은 paper packet 위에서 작동한다. “5 Cs를 채우되 각 항목마다 근거 위치를 붙이고, 근거가 없으면 없음이라고 적어라.” “내 thesis keyword와 가까운 reference 후보 5편을 고르되 왜 가까운지 한 줄씩 적어라.” “paper A와 B의 방법, 가정, dataset, metric, 한계를 표로 비교하라.” 이렇게 물어야 한다. 그리고 최종 노트에는 도구의 문장이 아니라 내가 확인한 claim과 위치만 남긴다.

검색은 tag만으로 굴러가지 않는다. plain text, citation key, DOI/arXiv ID, embedding search, grep이 함께 작동한다. tag를 많이 다는 것보다 검색 가능한 문장으로 쓰는 편이 낫다. 한 달에 한 번 정리할 것도 highlight가 아니라 claim ledger다. 서로 충돌하는 claim, 같은 baseline을 공유하는 paper, 내 hypothesis를 바꾼 paper를 한 줄씩 뽑는다.

노트가 좋은지 판단하는 기준은 간단하다. 6개월 후의 내가 paper를 다시 열기 전에 다음 행동을 알 수 있는가. 알 수 있다면 좋은 노트다. 알 수 없다면 아무리 길어도 보관된 텍스트일 뿐이다.

<h1 id="chapter-7">Ch.7 — 논문은 완성된 뒤 쓰는 보고서가 아니라 연구를 굴리는 골격이다</h1>

질문을 좁히고, 읽을 것을 고르고, 판단을 노트에 남겼다면 이제 글이
시작된다. 하지만 글은 마지막에 붙이는 포장지가 아니다. 논문 형식은
연구가 아직 흔들릴 때 무엇을 더 해야 하는지 알려 주는 골격이다.

첫 논문을 쓰는 학생은 종종 연구가 끝나면 글을 쓴다고 생각한다. 실험이 다 끝나고, 결과가 정리되고, 그림이 완성되면 그때 문장을 붙이면 된다고 믿는다. 하지만 좋은 논문은 그렇게 만들어지지 않는다. 논문은 완성된 연구를 보관하는 보고서가 아니라, 연구가 진행되는 동안 무엇을 더 해야 하는지 드러내는 골격이다.

Whitesides가 outline을 먼저 쓰라고 한 이유가 여기에 있다. outline은 목차가 아니다. 아직 없는 결과를 위한 자리표다. Title, abstract, introduction, method, results, discussion, conclusion의 각 칸에 placeholder를 넣으면 빈 곳이 보인다. 어떤 claim은 실험이 없어서 비어 있고, 어떤 figure는 message가 없어서 비어 있고, 어떤 method는 결과와 짝이 없어 비어 있다. outline은 그 빈 곳을 보여 주기 때문에 연구 도구가 된다.

첫 outline은 틀려도 된다. 오히려 틀려야 한다. 문제는 틀린 outline이 아니라 outline 없이 실험만 쌓는 상태다. outline이 있으면 실험 하나가 논문의 어느 문장을 바꾸는지 보인다. outline이 없으면 실험은 많아지지만 paper gap은 흐릿해진다. 네 번째 실험이 필요한지, 아니면 첫 번째 실험을 더 정확히 써야 하는지 판단할 수 없다.

글쓰기의 마음가짐도 여기서 갈린다. 논문에는 만점이 없다. 학부 시험처럼 100점을 채우는 글이 아니라, reject 사유를 하나씩 줄이는 글이다. 완벽한 첫 문장을 기다리는 동안 연구는 멈춘다. 덜 틀린 outline을 먼저 만들고, feedback을 받아 더 정확한 구조로 바꾸는 편이 낫다. 글쓰기는 완성품 생산이 아니라 발견 절차다.

시간 배분도 독자 가중치로 해야 한다. 가장 많이 읽히는 곳에 가장 많은 시간을 써야 한다. title, abstract, figure, introduction은 적은 분량이지만 verdict의 큰 부분을 만든다. Method의 한 문장을 다듬는 일보다 abstract의 gap이 정확한지 보는 일이 더 비쌀 수 있다. 학생은 자기가 오래 고생한 부분에 시간을 더 쓰고 싶어 하지만, 독자는 자기 판단에 필요한 부분부터 읽는다.

10년 후의 스타일은 outline에서 드러난다. 어떤 사람은 매번 새 도구와 새 양식으로 시작한다. 어떤 사람은 자기에게 맞는 골격을 갖고 있고, 새 문제를 그 골격에 넣어 보며 어디가 비는지 본다. Knuth가 말한 personal style은 취향의 문제가 아니다. 반복 가능한 사고의 모양이다. 내 outline이 5년, 10년 뒤에도 나를 도와준다면 그것이 스타일이다.

<h1 id="chapter-8">Ch.8 — 문단은 예쁜 문장이 아니라 독자의 기대를 운반한다</h1>

글이 읽히지 않을 때 학생은 대개 영어 실력을 의심한다. 단어가 부족한가. 문법이 틀렸나. 더 academic한 표현을 써야 하나. 물론 그런 문제도 있다. 하지만 과학 글쓰기에서 더 자주 무너지는 것은 문장의 장식이 아니라 독자의 기대다. 독자는 문장 첫머리에서 무엇에 대해 말하는지 알고 싶고, 문장 끝에서 무엇이 새롭고 중요한지 알고 싶다. 이 기대가 계속 어긋나면 쉬운 단어로 써도 글은 어렵다.

문단은 한 가지 일을 해야 한다. 첫 문장이 독자를 들여보내고, 중간 문장들이 같은 방향으로 움직이고, 마지막 문장이 새 정보를 남긴다. 첫 명사구가 매번 바뀌면 독자는 매 문장마다 연결을 새로 만들어야 한다. 접속사가 많다고 흐름이 생기는 것도 아니다. “However”, “Moreover”, “Therefore”가 반복되는데 topic chain이 없으면 접속사는 빈 연결을 가리는 장식이 된다.

CCC는 이 문제를 보는 좋은 렌즈다. Context, Content, Conclusion. 문단에도 있고, section에도 있고, 논문 전체에도 있다. 좋은 문단은 이전 문단에서 넘어온 맥락을 받고, 한 가지 내용을 전개한 뒤, 다음 문단으로 넘어갈 결론을 남긴다. 좋은 section도 마찬가지다. 좋은 논문도 마찬가지다. 작은 단위와 큰 단위가 같은 모양을 가지면 독자는 길을 잃지 않는다.

heading도 claim이어야 한다. “Experiments”는 장소 이름이지 주장 이름이 아니다. “Loop closure failures decrease on rainy sequences”는 독자에게 무엇을 보러 들어가는지 알려 준다. 정보가 담긴 heading은 바쁜 독자에게 길을 준다. conclusion도 summary가 아니다. results를 다시 말하는 것이 아니라 그 결과가 한 단계 위에서 무엇을 의미하는지 적는 자리다.

문장 수준에서는 old-before-new 원칙이 강력하다. 이미 나온 것을 앞에 두고, 새롭고 중요한 것을 뒤에 둔다. 한국어와 영어의 어순은 다르지만 원칙은 같다. 문장 첫머리는 독자의 발판이고, 문장 끝은 독자가 들고 나갈 물건이다. 발판에 새 물건을 놓으면 독자는 넘어지고, 끝자리에 낡은 말을 두면 아무것도 남지 않는다.

좋은 문체는 화려하지 않다. 좋은 문체는 독자에게 일을 떠넘기지 않는다. 10년 후의 내 스타일도 여기서 생긴다. 내가 멋있어 보이는 문장이 아니라, 독자가 덜 헤매는 문장. 내 사고의 순서가 아니라 독자가 따라올 수 있는 순서. 그것을 반복해서 고르는 일이 글쓰기의 style이다.

---

<h1 id="chapter-9">Ch.9 — 제목·초록·서론은 논문의 입구가 아니라 판정의 대부분이다</h1>

논문에서 가장 짧은 부분이 가장 비싼 경우가 많다. 제목, 초록, figure 1, introduction 첫 페이지. 학생은 본문을 다 읽은 뒤에야 평가가 이루어진다고 생각하지만, reviewer는 훨씬 일찍 큰 판단을 만든다. 바쁜 독자는 title에서 분류하고, abstract에서 verdict의 방향을 잡고, introduction에서 gap이 진짜인지 본다. 입구가 아니라 판정의 대부분이다.

제목은 contribution을 한 문장으로 압축해야 한다. “BEV-based Loop Closure”는 명사구일 뿐이다. 무엇을 했는지, 얼마나 바뀌었는지, 어떤 조건에서 의미가 있는지 아무것도 말하지 않는다. 좋은 제목은 분야 keyword와 contribution keyword를 함께 담는다. 자동 추천과 검색도 이 신호를 보고, reviewer도 이 신호를 본다. 자동화에 맞추는 일이 reviewer에 맞추는 일과 크게 다르지 않은 이유다.

Abstract는 자기 안에서 닫혀야 한다. Field gap, paper gap, approach, result, implication이 한 paragraph 안에 들어간다. 여기서 자주 생기는 실패는 context가 길고 result가 없는 abstract다. 분야 일반론으로 시작해 마지막에 “we propose”만 두면, 독자는 왜 이 paper가 필요한지 알 수 없다. 수치 하나, 비교 하나, 실패 조건 하나가 abstract를 실제 주장으로 만든다.

Introduction은 gap funnel이다. 넓은 분야 문제에서 시작해 기존 방법의 한계를 좁히고, 본 논문이 들어갈 정확한 자리를 만든다. 이때 중요한 것은 비판의 강도다. 관련 연구를 무시해서도 안 되고, 모두 좋다고만 해서도 안 된다. “기존 방법이 못했다”가 아니라 “기존 방법은 어떤 조건에서는 잘 작동하지만, 내가 다루는 조건에서는 이 가정을 둔다”가 되어야 한다. 좋은 related work은 예의 바른 비판이다.

Figure 1은 contribution 목록이 아니다. 논증의 한 컷이다. abstract 마지막 문장과 figure 1이 서로 맞물려야 한다. abstract에서 말한 입력, 접근, 출력, 효과가 figure 1의 박스와 화살표에 대응하면 독자는 빠르게 들어온다. 대응하지 않으면 figure 1은 예쁜 그림일 뿐이다.

10년 후에도 남는 글쓰기 스타일은 첫 페이지에서 드러난다. 내 연구를 과장하지 않고도 중요하게 만드는 능력, 기존 연구를 존중하면서도 빈 곳을 정확히 가리키는 능력, 짧은 폭 안에 내가 책임질 claim을 놓는 능력. 제목과 초록과 서론은 포장지가 아니다. 그 세 곳은 내가 내 연구를 얼마나 정확히 이해하는지 가장 먼저 드러나는 자리다.

---

<h1 id="chapter-10">Ch.10 — 방법·결과·그림·표는 주장 하나를 나눠 증명한다</h1>

논문은 여러 section으로 나뉘지만, 좋은 논문은 한 주장으로 묶인다. Method는 그 주장을 가능하게 한 선택을 설명하고, Results는 그 선택이 실제로 효과가 있었는지 보이고, Figures와 Tables는 독자가 한눈에 판단할 수 있게 만든다. 이 네 부분이 따로 놀면 논문은 길어지기만 하고 설득력은 늘지 않는다.

Method는 recipe가 아니다. 재현 가능해야 하지만, 모든 구현 디테일을 늘어놓는다고 좋은 method가 되지는 않는다. 독자가 알아야 하는 것은 어떤 선택이 contribution을 만들었는가다. 핵심 알고리즘은 pseudocode로, notation은 table로, hyperparameter는 비교 가능한 표로 정리한다. 중요한 것은 Results와의 짝이다. Method의 subsection 하나가 Results의 evidence 하나와 대응해야 한다.

Results는 숫자 전시장이 아니다. 실험 하나마다 “그래서 무엇이 증명되는가”가 있어야 한다. main result는 claim을 직접 받쳐야 하고, ablation은 어떤 component가 그 효과를 만들었는지 보여 줘야 한다. baseline 비교는 같은 dataset, 같은 split, 가능한 같은 hardware 조건에서 이루어져야 한다. 다른 논문의 숫자를 그대로 가져오면 조건이 다를 때 바로 공격 지점이 된다.

Discussion은 Results의 반복이 아니다. Results가 “무엇이 일어났는가”라면 Discussion은 “왜 그렇게 읽어야 하는가”다. 실패 사례도 이때 필요하다. 좋은 실패 사례는 논문을 약하게 만드는 것이 아니라 claim의 경계를 정확하게 만든다. 경계를 모르는 주장은 과장으로 읽히고, 경계를 아는 주장은 신뢰로 읽힌다.

Figure와 Table은 장식이 아니다. Figure는 구조와 qualitative difference를 보여 주는 데 강하고, Table은 비교와 숫자의 질서를 보여 주는 데 강하다. 같은 결과를 둘 다로 반복하면 하나는 잉여가 된다. table에서는 bold와 underline 같은 강조 규약이 논문 전체에서 같아야 한다. figure에서는 caption 첫 문장이 message를 말해야 한다. 독자가 본문을 읽기 전에도 무엇을 봐야 하는지 알 수 있어야 한다.

결국 방법, 결과, 그림, 표는 모두 같은 질문에 답한다. “내가 한 주장 하나가 실제로 버틸 수 있는가.” 10년 후의 스타일은 여기에서도 절제다. 보여 주고 싶은 것을 다 넣는 것이 아니라, 주장 하나를 정확히 받치는 것만 남기는 능력. 연구의 깊이는 자료의 양이 아니라 증거 배치의 정확성에서 보인다.

<h1 id="chapter-11">Ch.11 — 수정과 rebuttal은 방어가 아니라 논문을 더 정확하게 만드는 절차다</h1>

리뷰를 받으면 첫 반응은 대개 방어다. reviewer가 오해했다, 실험을 제대로 안 봤다, 이미 본문에 썼다. 그 반응은 자연스럽지만 바로 답장에 들어가면 안 된다. rebuttal의 첫 단계는 반박이 아니라 분류다. 어떤 코멘트가 구체적인가. 어떤 코멘트가 논문 구조의 문제를 가리키는가. 어떤 코멘트가 reviewer의 오해처럼 보이지만 사실은 글이 길을 잘못 낸 결과인가.

좋은 response letter는 감정이 아니라 위치로 움직인다. 감사 한 문장 뒤에 major change를 번호로 묶고, 각 코멘트에 대해 무엇을 바꿨는지 본문 위치를 붙인다. “We clarified”만으로는 부족하다. 어디를 어떻게 바꿨는지 보여 줘야 한다. reviewer가 변경을 찾게 만들면 response는 이미 실패하고 있다.

Revision에서 중요한 것은 모든 요구를 다 들어주는 일이 아니다. 논문의 contribution과 맞는 요구를 받아들이고, 맞지 않는 요구는 정중하게 범위를 설명한다. 추가 ablation을 요구받았을 때도 마찬가지다. 내 모델이 baseline 대비 무엇을 개선했는지 보이려면 어떤 ablation이 필요한가를 먼저 묻는다. 자동화 도구로 답변 초안을 만들 수는 있지만, 최종 판단은 contribution claim과 맞물려야 한다.

거절 메일도 자료다. reject는 인격 평가가 아니라 문서에 대한 반응이다. 물론 며칠은 아프다. 하지만 다시 읽을 때는 comment를 세 부류로 나눈다. 바로 고칠 수 있는 구체적 지적, 구조를 다시 봐야 하는 지적, 다음 venue에서는 감수해야 하는 취향의 차이. 이 분류가 되면 다음 행동이 생긴다.

수정의 목표는 논문을 무조건 통과시키는 것이 아니다. 더 정확한 논문으로 만드는 것이다. reviewer가 틀린 말을 했더라도, 그런 오해가 가능했다는 사실은 글의 정보를 준다. 좋은 글은 똑똑한 독자만 이해하는 글이 아니라, 바쁜 독자도 크게 오해하지 않게 만든 글이다.

10년 후의 스타일은 리뷰 앞에서 보인다. 방어적인 사람은 매번 reviewer와 싸운다. 성급한 사람은 모든 요구를 다 받아들여 논문을 흐린다. 좋은 연구자는 comment를 자기 논문의 경계와 claim을 더 정확히 만드는 재료로 쓴다. rebuttal은 전투가 아니라, 내 주장을 다시 정렬하는 마지막 writing pass다.

<h1 id="chapter-12">Ch.12 — 학회는 발표장이 아니라 다음 질문이 생기는 장소다</h1>

논문을 쓰고 고치는 일은 책상 위에서 끝나지 않는다. 글이 공개되면 이제
다른 사람의 질문, 반박, 관심 속으로 들어간다. 학회는 그 전환이 가장
압축적으로 일어나는 장소다.

학회는 논문이 나온 뒤에 들어오는 행사처럼 보인다. 발표하고, 질문 몇 개 받고, 사람들을 만나고, 돌아온다. 하지만 학회의 진짜 가치는 발표 시간보다 그 전후에 있다. 학회는 끝난 결과를 보여 주는 곳이면서 동시에 다음 질문의 입력을 모으는 곳이다. 왜 가는지가 좁혀져 있지 않으면 비용은 쉽게 날아간다.

학회에 가는 이유는 대개 셋이다. feedback, 동향, 소속. 이 셋 중 하나가 주목적이어야 한다. feedback이 목적이면 내 paper와 가장 가까운 사람을 만나야 하고, 동향이 목적이면 session triage를 해야 하며, 소속이 목적이면 동세대 peer를 찾아야 한다. 모든 것을 다 얻으려 하면 아무것도 깊게 남지 않는다.

사전 준비는 2-3주 전에 시작한다. 학회 program/app을 그대로 들고 가지 않는다. Keshav 1st pass를 program 단위로 적용해 꼭 가야 할 session, 들으면 좋은 session, skip할 session을 나눈다. program과 내 keyword를 넣어 후보를 뽑게 할 수 있지만, 질문은 내가 만든다. “내 future work와 겹치는 발표를 찾아라”, “만나면 좋은 PhD/postdoc 후보를 뽑아라”, “내 paper와 충돌하거나 보완되는 paper를 알려 달라.”

사전 메일은 한 메일 한 질문이다. 자기소개 한 문장, 만남 제안 한 문장, 시간대와 주제. 첨부는 필요 없다. 받는 사람이 그 자리에서 yes/no를 결정할 수 있어야 한다. 정중함은 길이에서 나오지 않는다. 상대의 cognitive load를 줄이는 데서 나온다.

학회장에서 첫 마디는 작아야 한다. “요즘 어떤 연구 하세요?”는 흔하지만 강력하다. peer에게는 열린 질문이 좋고, senior에게는 90초 안에 내 질문과 왜 그 사람에게 묻는지를 말할 수 있어야 한다. poster 앞에서는 30초 설명과 3분 설명을 따로 준비한다. 첫 마디가 준비되어 있으면 그 뒤 대화는 자연스럽게 풀린다.

학회는 화법만으로 버틸 수 없다. 발표할 좋은 연구가 있을 때 화법이 작동한다. 하지만 좋은 연구가 있어도 준비하지 않으면 우연에 맡겨진다. 10년 후의 스타일은 여기서도 같다. 나는 어떤 자리에 왜 가는가. 누구에게 무엇을 묻는가. 돌아와서 어떤 질문이 생겼는가. 학회는 결과의 끝이 아니라 다음 연구의 시작이다.

<script>
(function() {

  var DOC_TITLE = "연구노트";

  var OVERVIEW_SUBTITLE = "연구의 질문을 좁히고, 읽고, 쓰고, 말하는 과정을 하나의 작업 흐름으로 묶었다.";
  var SEARCH_PLACEHOLDER = "챕터/섹션 검색... (Ctrl+K)";

  var GROUP_FIRST = {};
  CHAPTER_GROUPS.forEach(function(group) {
    if (group.items.length) GROUP_FIRST[group.items[0].kind + '-' + group.items[0].num] = group.label;
  });

  marked.setOptions({
    highlight: function(code, lang) {
      if (lang && hljs.getLanguage(lang)) {
        try { return hljs.highlight(code, { language: lang }).value; } catch(e) {}
      }
      try { return hljs.highlightAuto(code).value; } catch(e) {}
      return code;
    },
    breaks: false,
    gfm: true
  });
  marked.use({ renderer: { del: function(token) { return '~' + (token.text || token) + '~'; } } });

  if (window.mermaid) {
    mermaid.initialize({ startOnLoad: false, theme: 'default', securityLevel: 'loose' });
  }

  function protectMath(src) {
    var placeholders = [];
    var idx = 0;
    var codeBlocks = [];
    src = src.replace(new RegExp('\\x60\\x60\\x60[\\s\\S]*?\\x60\\x60\\x60', 'g'), function(m) {
      codeBlocks.push(m);
      return '%%CODEBLOCK' + (codeBlocks.length - 1) + '%%';
    });
    var inlineCodes = [];
    src = src.replace(new RegExp('\\x60[^\\x60\\n]+\\x60', 'g'), function(m) {
      inlineCodes.push(m);
      return '%%INLINECODE' + (inlineCodes.length - 1) + '%%';
    });
    src = src.replace(/\$\$([\s\S]*?)\$\$/g, function(m, math) {
      placeholders.push({ display: true, math: math });
      return '%%MATH' + (idx++) + '%%';
    });
    src = src.replace(/\$([^\s$](?:[^$]*[^\s$])?)\$/g, function(m, math) {
      placeholders.push({ display: false, math: math });
      return '%%MATH' + (idx++) + '%%';
    });
    src = src.replace(/%%CODEBLOCK(\d+)%%/g, function(m, i) { return codeBlocks[parseInt(i, 10)]; });
    src = src.replace(/%%INLINECODE(\d+)%%/g, function(m, i) { return inlineCodes[parseInt(i, 10)]; });
    return { src: src, placeholders: placeholders };
  }

  function restoreAndRenderMath(html, placeholders) {
    return html.replace(/%%MATH(\d+)%%/g, function(m, i) {
      var p = placeholders[parseInt(i, 10)];
      try {
        return katex.renderToString(p.math, { displayMode: p.display, throwOnError: false, trust: true });
      } catch(e) {
        return p.display ? '$$' + p.math + '$$' : '$' + p.math + '$';
      }
    });
  }

  var state = { observer: null, scrollHandler: null };
  var contentEl = document.getElementById('content');
  var loadingEl = document.getElementById('loading');
  var tocContainer = document.getElementById('toc-container');

  function applyChrome() {
    document.documentElement.lang = 'ko';
    document.title = DOC_TITLE;
    document.getElementById('topbar-title').textContent = TOPBAR_TITLE;
    document.getElementById('search-input').placeholder = SEARCH_PLACEHOLDER;
    document.getElementById('toc-no-results').textContent = '검색 결과 없음';
    document.getElementById('loading-text').textContent = '가이드 렌더링 중...';
    document.querySelectorAll('#lang-toggle a').forEach(function(a) { a.classList.add('active'); });
    try { localStorage.setItem(STORAGE_KEY, 'ko'); } catch(e) {}
  }

  function parseHeading(text) {
    var ch = text.trim().match(/^Ch\.?\s*(\d+)\s*[\u2014\u2013-]\s*(.+)$/);
    if (ch) return { kind: 'chapter', num: parseInt(ch[1], 10), title: ch[2].trim(), label: 'Ch.' + parseInt(ch[1], 10) };
    var ex = text.trim().match(/^E\.?\s*(\d+)\s*[\u2014\u2013-]\s*(.+)$/);
    if (ex) return { kind: 'excerpt', num: parseInt(ex[1], 10), title: ex[2].trim(), label: 'E.' + parseInt(ex[1], 10) };
    return null;
  }

  function render() {
    applyChrome();
    contentEl.style.display = 'none';
    loadingEl.style.display = 'flex';

    requestAnimationFrame(function() {
      var src = document.getElementById('md-source-ko').value;
      src = src.replace(/\*\*([^*\n]+)\*\*(?=[가-힣])/g, '<strong>$1</strong>');
      var mathData = protectMath(src);
      var html = marked.parse(mathData.src);
      html = restoreAndRenderMath(html, mathData.placeholders);
      contentEl.innerHTML = html;

      if (window.mermaid) {
        var mermaidBlocks = contentEl.querySelectorAll('pre > code.language-mermaid');
        mermaidBlocks.forEach(function(code, i) {
          var pre = code.parentElement;
          var container = document.createElement('div');
          container.className = 'mermaid';
          container.id = 'mermaid-ko-' + i;
          container.textContent = code.textContent;
          pre.replaceWith(container);
        });
        try { mermaid.run({ querySelector: '.mermaid' }); } catch(e) {}
      }

      tocContainer.innerHTML = '';
      buildOverview();
      buildTOC();
      contentEl.style.display = 'block';
      loadingEl.style.display = 'none';
      setupScrollTracking();

      if (window.location.hash) {
        var initId = window.location.hash.slice(1);
        var initTarget = document.getElementById(initId);
        if (initTarget) window.scrollTo(0, initTarget.getBoundingClientRect().top + window.scrollY - 60);
      }
    });
  }

  render();
  setupSearch();
  setupProgressBar();
  setupMobileMenu();
  setupKeyboard();
  setupTocDelegation();

  function setupTocDelegation() {
    tocContainer.addEventListener('click', function(e) {
      if (e.target.closest('.toc-item')) closeMobileSidebar();
    });
  }

  function buildOverview() {
    var h1s = contentEl.querySelectorAll('h1');
    var entries = {};

    h1s.forEach(function(h1) {
      var parsed = parseHeading(h1.textContent);
      if (!parsed) return;
      if (!h1.id) h1.id = parsed.kind + '-' + parsed.num;
      var sections = [];
      var node = h1.nextElementSibling;
      while (node && node.tagName !== 'H1') {
        if (node.tagName === 'H2') {
          if (!node.id) node.id = slugify(node.textContent);
          sections.push({ text: node.textContent.trim(), id: node.id });
        }
        node = node.nextElementSibling;
      }
      entries[parsed.kind + '-' + parsed.num] = {
        kind: parsed.kind,
        num: parsed.num,
        label: parsed.label,
        title: parsed.title,
        id: h1.id,
        sections: sections
      };
    });

    if (Object.keys(entries).length === 0) return;

    var overview = document.createElement('section');
    overview.className = 'guide-overview';
    var header = document.createElement('div');
    header.className = 'overview-header';
    var oTitle = document.createElement('h1');
    oTitle.className = 'overview-title';
    oTitle.textContent = OVERVIEW_TITLE;
    header.appendChild(oTitle);
    var oSub = document.createElement('p');
    oSub.className = 'overview-subtitle';
    oSub.textContent = OVERVIEW_SUBTITLE;
    header.appendChild(oSub);
    overview.appendChild(header);

    CHAPTER_GROUPS.forEach(function(group) {
      var valid = group.items.map(function(item) { return entries[item.kind + '-' + item.num]; }).filter(Boolean);

      var groupEl = document.createElement('div');
      groupEl.className = 'overview-group';
      var label = document.createElement('div');
      label.className = 'overview-group-label';
      label.textContent = group.label;
      groupEl.appendChild(label);

      valid.forEach(function(entry) {

        var link = document.createElement('a');
        link.className = 'overview-chapter-link';
        link.href = '#' + entry.id;
        var num = document.createElement('span');
        num.className = 'overview-chapter-num';
        num.textContent = entry.label;
        link.appendChild(num);
        link.appendChild(document.createTextNode(entry.title));
        wrap.appendChild(link);

        if (entry.sections.length) {
          var secs = document.createElement('div');
          secs.className = 'overview-sections';
          entry.sections.forEach(function(section, i) {
            if (i > 0) {

          wrap.appendChild(secs);

        groupEl.appendChild(wrap);

      overview.appendChild(groupEl);
    });

    contentEl.insertBefore(overview, contentEl.firstChild);

  function buildTOC() {
    var headings = contentEl.querySelectorAll('h1, h2');
    var fragment = document.createDocumentFragment();
    headings.forEach(function(heading) {
      if (!heading.id) heading.id = slugify(heading.textContent);
      if (heading.classList.contains('overview-title')) return;

      if (heading.tagName === 'H1') {
        var parsed = parseHeading(heading.textContent);
        if (parsed) {
          var key = parsed.kind + '-' + parsed.num;
          if (GROUP_FIRST[key]) {
            var label = document.createElement('div');
            label.className = 'toc-group-label';
            label.textContent = GROUP_FIRST[key];
            fragment.appendChild(label);
          }
        }
      }

      var link = document.createElement('a');
      link.className = 'toc-item toc-' + heading.tagName.toLowerCase();
      link.href = '#' + heading.id;
      link.textContent = heading.textContent;
      link.dataset.headingId = heading.id;
      fragment.appendChild(link);
    });
    tocContainer.appendChild(fragment);
  }

  function slugify(text) {
    return text.toLowerCase().trim()
      .replace(/<[^>]+>/g, '')
      .replace(/[^\w\s가-힣-]/g, '')
      .replace(/\s+/g, '-')
      .substring(0, 80) || 'section';
  }

  function setupScrollTracking() {
    var headings = contentEl.querySelectorAll('h1, h2');
    var tocItems = tocContainer.querySelectorAll('.toc-item');
    if (headings.length === 0) return;
    if (state.observer) state.observer.disconnect();

    var tocMap = {};
    tocItems.forEach(function(item) { tocMap[item.dataset.headingId] = item; });
    var currentActive = null;
    var observer = new IntersectionObserver(function(entries) {
      var topHeading = null;
      var topOffset = Infinity;
      entries.forEach(function(entry) {
        if (entry.isIntersecting) {
          var rect = entry.target.getBoundingClientRect();
          if (rect.top < topOffset) { topOffset = rect.top; topHeading = entry.target; }
        }
      });
      if (topHeading) {
        if (currentActive) currentActive.classList.remove('active');
        var item = tocMap[topHeading.id];
        if (item) {
          item.classList.add('active');
          currentActive = item;
          var itemRect = item.getBoundingClientRect();
          var containerRect = tocContainer.getBoundingClientRect();
          if (itemRect.top < containerRect.top || itemRect.bottom > containerRect.bottom) item.scrollIntoView({ block: 'center', behavior: 'auto' });
        }
      }
    }, { rootMargin: '-60px 0px -70% 0px', threshold: 0 });
    headings.forEach(function(h) { observer.observe(h); });
    state.observer = observer;

    if (!state.scrollHandler) {
      var ticking = false;
      state.scrollHandler = function() {
        if (!ticking) {
          requestAnimationFrame(function() {
            var curHeadings = contentEl.querySelectorAll('h1, h2');
            var curTocItems = tocContainer.querySelectorAll('.toc-item');
            var curMap = {};
            curTocItems.forEach(function(item) { curMap[item.dataset.headingId] = item; });
            var found = null;
            var scrollTop = window.scrollY + 80;
            for (var i = curHeadings.length - 1; i >= 0; i--) {
              if (curHeadings[i].offsetTop <= scrollTop) { found = curHeadings[i]; break; }
            }
            if (found) {
              var active = tocContainer.querySelector('.toc-item.active');
              if (active) active.classList.remove('active');
              var item = curMap[found.id];
              if (item) item.classList.add('active');
            }
            ticking = false;
          });
          ticking = true;
        }
      };
      window.addEventListener('scroll', state.scrollHandler);
    }
  }

  function setupSearch() {
    var searchInput = document.getElementById('search-input');
    var noResults = document.getElementById('toc-no-results');
    searchInput.addEventListener('input', function() {
      var query = this.value.trim().toLowerCase();
      var tocItems = tocContainer.querySelectorAll('.toc-item');
      var groupLabels = tocContainer.querySelectorAll('.toc-group-label');
      if (!query) {
        tocItems.forEach(function(item) { item.classList.remove('toc-hidden'); });
        groupLabels.forEach(function(label) { label.classList.remove('toc-hidden'); });
        noResults.style.display = 'none';
        return;
      }
      var matchCount = 0;
      tocItems.forEach(function(item) {
        var text = item.textContent.toLowerCase();
        if (text.includes(query)) { item.classList.remove('toc-hidden'); matchCount++; }
        else item.classList.add('toc-hidden');
      });
      groupLabels.forEach(function(label) { label.classList.add('toc-hidden'); });
      noResults.style.display = matchCount === 0 ? 'block' : 'none';
    });
  }

  function setupProgressBar() {
    var progressBar = document.getElementById('progress-bar');
    var ticking = false;
    function updateProgress() {
      var scrollTop = window.scrollY;
      var docHeight = document.documentElement.scrollHeight - window.innerHeight;
      var progress = docHeight > 0 ? (scrollTop / docHeight) * 100 : 0;
      progressBar.style.width = Math.min(progress, 100) + '%';
    }
    window.addEventListener('scroll', function() {
      if (!ticking) {
        requestAnimationFrame(function() { updateProgress(); ticking = false; });
        ticking = true;
      }
    });
    updateProgress();
  }

  function setupMobileMenu() {
    var toggle = document.getElementById('menu-toggle');
    var sidebar = document.getElementById('sidebar');
    var overlay = document.querySelector('#sidebar-overlay');
    toggle.addEventListener('click', function() {
      sidebar.classList.toggle('open');
      overlay.classList.toggle('visible');
    });
    overlay.addEventListener('click', closeMobileSidebar);
  }

  function closeMobileSidebar() {
    document.getElementById('sidebar').classList.remove('open');
    document.querySelector('#sidebar-overlay').classList.remove('visible');
  }

  function setupKeyboard() {
    document.addEventListener('keydown', function(e) {
      if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'k') {
        e.preventDefault();
        document.getElementById('search-input').focus();
      }
    });
  }
})();
</script>
