# E.12 — Stachniss group Figure 1 — *abstract 한 컷 시각화*의 양식

**출처**: Chen, Vizzo, Läbe, Behley, Stachniss, 2021 — *Range Image-based LiDAR Localization for Autonomous Vehicles*, IEEE International Conference on Robotics and Automation (ICRA) 2021
**위치**: Figure 1 + caption + abstract 마지막 한 문장 (arXiv:2105.12121)
**분야**: 로보틱스 / LiDAR localization

---

## 발췌

Abstract 마지막 문장 (원문 인용):

> The experiments suggest that our approach can reliably localize a vehicle in challenging environments and at high frame rates with respect to a previously generated map of the area.


```
[ figure 1 묘사 — 인용·재현 대신 구조만 적는다 ]

  ┌──────────────┐    ┌────────────────┐    ┌───────────────┐    ┌─────────────┐
  │ 3D LiDAR scan│ →  │ range image    │ →  │ map reference │ →  │ 6-DoF pose  │
  │ (online)     │    │ (2D projection)│    │ scan match    │    │ estimate    │
  └──────────────┘    └────────────────┘    └───────────────┘    └─────────────┘
```

Caption (요지): 본 연구의 입력은 online 3D LiDAR scan, 중간 표현은 range image (2D projection), 매칭 대상은 사전 구축된 map의 reference scan, 출력은 6-DoF pose estimate.


---

## 분석 — 왜 이 figure 1이 좋은가

이 figure 1이 모범인 첫째 이유는 *abstract와의 1:1 대응*이다. abstract 마지막 문장이 *vehicle을 reliably localize한다 / 사전 map과 매칭한다 / 높은 frame rate*라는 세 명제를 담는다. figure 1이 같은 세 명제를 *그림으로 다시 한 번* 던진다 — vehicle = LiDAR scan 입력, 사전 map = reference scan 박스, localize = pose estimate 결과. 독자가 abstract 한 문단을 읽고 figure 1로 눈을 옮기는 순간, *방금 읽은 단어*가 *방금 본 박스*와 정렬된다. cxli233의 *Friends Don't Let Friends* 시리즈가 비판하는 *figure 1과 abstract가 따로 노는* 안티패턴의 정반대다. 후배가 figure 1을 만들 때 가장 먼저 점검할 항목이 이 1:1 대응이다.

둘째 강점은 *그룹 문체의 일관성*이다. Stachniss group의 figure 1은 본 논문 외에도 KISS-ICP, surfel SLAM, OverlapNet, MOS 등에서 모두 *입력 sensor → 핵심 표현 → 출력 결정*의 4-박스 구조를 쓴다. 입력이 LiDAR scan / image / point cloud이고 출력이 pose / map / mask로 바뀌어도 *3-4 박스 + 화살표*의 형태가 유지된다. 그룹의 문체가 한 figure 1 양식에 박혀 있고, 후배가 그 그룹의 새 논문을 펼쳤을 때 *어디가 핵심인지*를 figure 1만 보고 짚을 수 있다. 양식의 일관성이 *읽기 비용*을 낮추는 도구다.

셋째는 *Whitesides §III의 promise-deliver alignment*가 figure 1까지 확장된 사례라는 점이다. title (Range Image-based), abstract (range image projection으로 localize), figure 1 (range image 박스가 중간 위치), contribution bullet (range image 표현의 효율성) — 같은 명제가 네 곳에서 반복된다. *range image*라는 한 명사구가 네 곳에 박혀 있어서 reviewer가 abstract만 읽고도 본 논문의 핵심 한 줄을 즉시 짚는다. 후배 글쓰기에서 *제목·abstract·figure 1·contribution*의 네 곳에 본인의 핵심 명사구가 *모두 같은 단어*로 박혀 있는지 확인하는 단계가 figure 1 점검의 출발점이다.

넷째는 *단순함의 운영*이다. figure 1에 박스 4개 + 화살표 3개. 그 이상 욕심내지 않았다. 본 논문의 시스템 다이어그램은 figure 2로 분리되어 있고 거기에는 module 7-8개가 들어간다. figure 1은 *abstract 1 컷*이고 figure 2는 *시스템 다이어그램*이라는 분리가 명확하다. 후배가 figure 1에 module 7개를 욱여넣으면 *abstract 1 컷*이 깨지고, figure 2가 비어 보이게 된다. *figure 1은 4-5 박스 한도, 그 이상은 figure 2로 분리*가 안전한 기본이다.

다섯째는 caption의 압축이다. Stachniss group의 figure 1 caption은 보통 한 문장 — *입력 → 핵심 표현 → 출력*. 알고리즘 디테일은 들어가지 않는다. 본 논문 figure 1 caption도 같은 양식이다. caption이 길어지면 독자가 *figure 1만으로 시스템을 이해해야 한다는* 신호로 읽히는데, 그 무게는 figure 1이 감당할 몫이 아니다. caption이 *한 문장*이라는 제약 그 자체가 figure 1을 abstract 한 컷에 묶어 두는 도구다.

---

## 따라 쓰기 — 자기 분야에 적용

이 패턴은 *abstract → figure 1*의 1:1 대응을 작업 순서에 박는 일이다. abstract 마지막 한 문장을 먼저 쓰고, 그 문장의 *동사·명사·형용사*를 figure 1의 *박스·화살표·라벨*에 직접 매핑한다. 매핑되지 않는 단어가 abstract에 있다면 그 단어가 *figure 2 자리*의 디테일이거나 *과잉 형용사*다. 매핑되지 않는 박스가 figure 1에 있다면 그 박스가 *abstract에 들어가야 할 정보*가 빠진 자리다. 두 자리를 동시에 다듬는다.

박스 수는 4-5개를 기본으로 둔다. 4-5개에 들어가지 않는 시스템은 figure 1의 자리가 아니라 figure 2의 자리다. figure 1은 *abstract 1 컷*, figure 2는 *시스템 다이어그램*. 두 자리를 분리하지 않으면 figure 1이 너무 무거워지고 figure 2가 비어 보인다. 이 분리가 박사 첫 논문에서 가장 자주 빠지는 자리.

caption은 한 문장으로 끝낸다. *입력 → 핵심 표현 → 출력*의 골격에 본인 분야 명사를 끼워 넣는다. 알고리즘 디테일·hyperparameter·실험 결과는 caption의 자리가 아니다. caption이 두 줄을 넘어가면 figure 2 caption일 가능성이 큰 셈이다.

핵심 명사구가 *제목·abstract·figure 1·contribution bullet* 네 자리 모두에 등장하는지가 마지막 점검이다. 본 논문의 *range image*가 그 사례다. 후배의 *coined term* 또는 *시스템 이름*이 네 자리에 일관되게 박혀 있어야 reviewer의 1차 인상이 단단해진다.

# E.13 — Matt Might — *The Illustrated Guide to a PhD*

**출처**: Matt Might, 2010 — *The Illustrated Guide to a PhD*. https://matt.might.net/articles/phd-school-in-pictures/. CC BY-NC 2.5.
**위치**: 12 panel 시각 비유 (전체 글)
**분야**: 박사 학위 일반 — scope 시각화

---

## 발췌


panel 1 — 인류가 지금까지 쌓아 올린 지식 전체를 한 원으로 그린다. panel 2 — 초등학교를 마치는 시점에 그 원의 중심에 작은 점 하나가 채워진다. panel 3 — 고등학교까지 마치면 그 점이 조금 더 자란다. panel 4 — 학사를 마치면 한 분야 쪽으로 가느다란 부채꼴이 길게 뻗는다. panel 5 — 석사 단계에서 그 부채꼴 끝이 한 점에서 더 깊이 들어간다. panel 6 — 학위 과정의 논문 정독을 통해 부채꼴 끝이 마침내 *원의 경계*에 닿는다. panel 7 — 그 경계 위에서 한 점에 시선을 고정한다. panel 8 — 그 한 점을 향해 몇 년 동안 같은 자리만을 민다. panel 9 — 마침내 경계가 한 줌 바깥으로 *조금* 밀려난다. panel 10 — 그 작은 돌출이 곧 박사 학위다. panel 11 — 그 돌출 자리에서 보면 세계가 다르게 보이지만, panel 12 — 원의 전체 모양은 여전히 거의 그대로라는 점을 잊지 말라는 한 줄로 닫힌다.

원문 마지막 한 줄(짧은 영어구만 인용):

> *"Keep pushing."*

원 이미지는 CC BY-NC 라이선스 자료이므로 여기서는 출처 링크와 한국어 의역만 둔다.

---

## 분석 — 왜 이 비유가 박사 결정의 자리에 자주 쓰이는가

이 비유가 운영되는 첫 번째 결절점은 *scope의 시각화*다. "박사 학위는 무엇인가"를 글로 적으면 한 단락이 필요하지만, 12 panel은 한 장의 그림으로 같은 명제를 박는다 — *작은 점 하나만큼 경계를 민다*. 박사 진학을 결정하는 학생이 학위를 *모든 것을 아는 사람*이나 *최고 전문가*로 그리고 있을 때, 이 그림 한 장이 그 이미지를 단숨에 *작은 돌출* 쪽으로 끌어내린다. 최윤섭 박사의 정의 *경계를 한 발짝 넓힐 능력자*가 같은 관점을 한국어로 적은 형태다. 두 출처가 한 관점을 다른 매체로 박았다.

두 번째는 *학부 → 석사 → 박사*의 단계가 *부채꼴이 길어지는 과정*이라는 점이다. panel 4-6에서 한 분야 쪽으로 가느다란 부채꼴이 깊어지고, panel 7에서 그 끝의 *한 점*에 시선이 고정된다. 박사 진학을 *공부의 연장*으로 그리는 학생에게 이 panel이 짚어 주는 단서가 있다 — 박사는 *부채꼴*이 아니라 *부채꼴 끝의 한 점*에 사는 시간이다. 학부·석사가 분야 *전체*를 점점 깊이 보는 단계라면, 박사는 그중 한 점만 *몇 년* 동안 미는 단계다. 진학을 결정하기 직전, *한 점*에 한 학기쯤 시선을 고정해 본 경험이 있는지가 단서가 된다.

세 번째는 *시간 비대칭*이다. panel 1-6은 약 22-24년에 걸쳐 진행되지만, panel 7-9는 단 몇 년에 같은 시각적 비중으로 그려진다. 시간을 가로축으로 두면 박사 단계의 4-6년이 그 앞 22년과 *비등한 굵기*로 보인다. 박사를 *공부의 연장*으로만 그리면 이 비대칭이 보이지 않는다. 같은 관점을 「대학원노트」 Part 1 ch01의 *9가지 어려움*이 한국어 일상어로 풀어내는 한편, Might의 panel 7-9는 그 어려움이 *시각적*으로 어디에서 오는가 — 같은 한 점을 몇 년 동안 미는 데서 — 를 한 번에 박는다.

네 번째는 *panel 11-12의 한 쌍*이 가지는 운영 의미다. panel 11에서 그 돌출 자리에 선 사람의 시선은 *세계가 다르게* 보이는 시야다 — 자기 분야 한 점 너머의 풍경이 자기 손으로 만든 결과다. panel 12는 한 발짝 물러서 *원의 전체*를 다시 본다 — 그 작은 돌출이 원의 형태를 거의 바꾸지 않았다는 사실을 잊지 말라는 한 줄. 두 panel이 한 쌍으로 같이 있어야 박사가 *자긍심과 겸손*의 좌표에 동시에 놓인다. 졸업 후 첫 1년의 정체성 전환이 자주 흔들리는 이유는 이 한 쌍을 한 panel만 본 결과다 — panel 11만 보면 자기 비중이 너무 커지고, panel 12만 보면 5년의 무게가 너무 작아진다.


---

## 따라 쓰기 — 박사 결정·진로 좌표 자리에 가져다 대는 법

이 비유는 박사를 *결정*하는 단계와 *졸업 직후 좌표를 다시 잡는* 단계 양쪽에 쓰인다. 결정 단계에서는 panel 1-6을 본인의 학사·석사 경로 위에 한 번 겹쳐 본다. 부채꼴이 어디로 길어지고 있는가, 그 끝의 *한 점*이 적혀 있는가. 한 점이 적히면 진학의 단서가 마련된 형태이고, 부채꼴이 *방향*만 있고 *끝의 점*이 비어 있으면 그 빈 점을 채우는 한 학기가 진학 직전의 작업이 된다.

panel 7-9는 *5년의 운영 단위*로 가져다 댄다. 박사 5년을 panel 8 한 장으로 그리면 *같은 한 점만 민다*가 한 줄로 적힌다. 매년 1순위 작업을 정할 때 그 한 줄을 시금석으로 둔다. 새로운 부채꼴을 그리는 일이 1순위로 올라오면 본 panel과 정합이 깨진 형태이고, 같은 한 점에서 *경계를 미는 작업*이 1순위로 남으면 정합이 유지된다.

panel 11-12는 *졸업 직후 첫 1년*에 가져다 댄다. 졸업 후의 호칭·affiliation·자기 관점이 흔들릴 때 두 panel을 한 쌍으로 본다. 자긍심이 너무 커지면 panel 12를, 5년의 무게가 너무 작아지면 panel 11을 가져다 댄다. 두 panel을 따로 두지 않고 한 쌍으로 운영하는 기본이 첫 1년의 정체성 전환을 단단하게 한다.

이미지 그 자체를 빌려 오지는 않는다. 본인의 발표 슬라이드·블로그 글에 panel을 그대로 붙여 쓰는 경우 CC BY-NC 라이선스를 표기하고 비상업 용도임을 명시한다. 가능하면 직접 그린 다이어그램으로 같은 비유를 옮긴다. 원본은 *링크로 안내*하는 기본이 라이선스 마찰이 가장 적다.

<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10.9.1/dist/mermaid.min.js"></script>
<script>
(function() {
  'use strict';

  var DOC_TITLE = "연구노트";
  var TOPBAR_TITLE = "연구노트";
  var OVERVIEW_TITLE = "연구노트";
  var SEARCH_PLACEHOLDER = "챕터/섹션 검색... (Ctrl+K)";
  var STORAGE_KEY = "research-notes-lang";
  var CHAPTER_GROUPS = [
    {
      label: "Part 0 · 연구는 주제보다 질문의 모양에서 시작된다",
      intro: "연구는 분야 이름을 받는 순간이 아니라 질문의 모양을 좁히는 순간에 시작된다. 이 Part는 리뷰 논문, 문제 진술, 주도권, 연구성 판단, 생각의 시간을 하나의 진입 절차로 묶는다.",
      items: [{"kind":"chapter","num":1},{"kind":"chapter","num":2},{"kind":"chapter","num":3},{"kind":"chapter","num":4},{"kind":"chapter","num":5}]
    },
    {
      label: "Part 1 · 읽기는 이해가 아니라 판단을 남기는 절차다",
      intro: "읽기의 목적은 더 많은 PDF를 처리하는 것이 아니라 다음 결정을 남기는 것이다. 이 Part는 한 편을 훑고, 걸러내고, 코드와 노트로 연결해 자기 연구의 판단 자료를 만드는 절차를 다룬다.",
      items: [{"kind":"chapter","num":6},{"kind":"chapter","num":7},{"kind":"chapter","num":8},{"kind":"chapter","num":9},{"kind":"chapter","num":10},{"kind":"chapter","num":11},{"kind":"chapter","num":12},{"kind":"chapter","num":13},{"kind":"chapter","num":14},{"kind":"chapter","num":15}]
    },
    {
      label: "Part 2 · 논문은 독자의 기대를 설계하는 일이다",
      intro: "논문은 끝난 연구를 옮겨 적는 보고서가 아니라 독자의 기대를 설계하는 구조다. 이 Part는 outline에서 문단, 제목, 초록, 서론, 방법, 결과, 표기, rebuttal까지 한 편의 글이 판정되는 순서로 따라간다.",
      items: [{"kind":"chapter","num":16},{"kind":"chapter","num":17},{"kind":"chapter","num":18},{"kind":"chapter","num":19},{"kind":"chapter","num":20},{"kind":"chapter","num":21},{"kind":"chapter","num":22},{"kind":"chapter","num":23},{"kind":"chapter","num":24},{"kind":"chapter","num":25},{"kind":"chapter","num":26},{"kind":"chapter","num":27},{"kind":"chapter","num":28},{"kind":"chapter","num":29},{"kind":"chapter","num":30},{"kind":"chapter","num":31},{"kind":"chapter","num":32}]
    },
    {
      label: "Part 3 · 발표는 끝난 글을 다음 질문으로 돌려보낸다",
      intro: "발표는 글의 끝이 아니라 다음 질문이 생기는 자리다. 이 Part는 학회에 왜 가는지, 무엇을 준비하는지, 첫 마디를 어떻게 여는지를 연구의 다음 입력으로 연결한다.",
      items: [{"kind":"chapter","num":33},{"kind":"chapter","num":34},{"kind":"chapter","num":35}]
    },
    {
      label: "발췌와 사례 · 좋은 글은 원문 위에서 배운다",
      intro: "뒤쪽의 발췌와 사례는 원문 위에서 배운다. 앞의 원칙들이 실제 논문과 글쓰기 예시 안에서 어떤 모양으로 작동하는지 확인하는 자리다.",
      items: [{"kind":"excerpt","num":1},{"kind":"excerpt","num":2},{"kind":"excerpt","num":3},{"kind":"excerpt","num":4},{"kind":"excerpt","num":5},{"kind":"excerpt","num":6},{"kind":"excerpt","num":7},{"kind":"excerpt","num":8},{"kind":"excerpt","num":9},{"kind":"excerpt","num":10},{"kind":"excerpt","num":11},{"kind":"excerpt","num":12},{"kind":"excerpt","num":13}]
    }
  ];

  marked.setOptions({
    highlight: function(code, lang) {
      if (lang && hljs.getLanguage(lang)) {
        try { return hljs.highlight(code, { language: lang }).value; } catch(e) {}
      }
      try { return hljs.highlightAuto(code).value; } catch(e) {}
      return code;
    },
    breaks: false,
    gfm: true
  });
  marked.use({ renderer: { del: function(token) { return '~' + (token.text || token) + '~'; } } });

  if (window.mermaid) {
    mermaid.initialize({ startOnLoad: false, theme: 'default', securityLevel: 'loose' });
  }

  function protectMath(src) {
    var placeholders = [];
    var idx = 0;
    var codeBlocks = [];
    src = src.replace(new RegExp('\\x60\\x60\\x60[\\s\\S]*?\\x60\\x60\\x60', 'g'), function(m) {
      codeBlocks.push(m);
      return '%%CODEBLOCK' + (codeBlocks.length - 1) + '%%';
    });
    var inlineCodes = [];
    src = src.replace(new RegExp('\\x60[^\\x60\\n]+\\x60', 'g'), function(m) {
      inlineCodes.push(m);
      return '%%INLINECODE' + (inlineCodes.length - 1) + '%%';
    });
    src = src.replace(/\$\$([\s\S]*?)\$\$/g, function(m, math) {
      placeholders.push({ display: true, math: math });
      return '%%MATH' + (idx++) + '%%';
    });
    src = src.replace(/\$([^\s$](?:[^$]*[^\s$])?)\$/g, function(m, math) {
      placeholders.push({ display: false, math: math });
      return '%%MATH' + (idx++) + '%%';
    });
    src = src.replace(/%%CODEBLOCK(\d+)%%/g, function(m, i) { return codeBlocks[parseInt(i, 10)]; });
    src = src.replace(/%%INLINECODE(\d+)%%/g, function(m, i) { return inlineCodes[parseInt(i, 10)]; });
    return { src: src, placeholders: placeholders };
  }

  function restoreAndRenderMath(html, placeholders) {
    return html.replace(/%%MATH(\d+)%%/g, function(m, i) {
      var p = placeholders[parseInt(i, 10)];
      try {
        return katex.renderToString(p.math, { displayMode: p.display, throwOnError: false, trust: true });
      } catch(e) {
        return p.display ? '$$' + p.math + '$$' : '$' + p.math + '$';
      }
    });
  }

  var state = { observer: null, scrollHandler: null };
  var contentEl = document.getElementById('content');
  var loadingEl = document.getElementById('loading');
  var tocContainer = document.getElementById('toc-container');

  function applyChrome() {
    document.documentElement.lang = 'ko';
    document.title = DOC_TITLE;
    document.getElementById('topbar-title').textContent = TOPBAR_TITLE;
    document.getElementById('search-input').placeholder = SEARCH_PLACEHOLDER;
    document.getElementById('toc-no-results').textContent = '검색 결과 없음';
    document.getElementById('loading-text').textContent = '가이드 렌더링 중...';
    document.querySelectorAll('#lang-toggle a').forEach(function(a) { a.classList.add('active'); });
    try { localStorage.setItem(STORAGE_KEY, 'ko'); } catch(e) {}
  }

  function parseHeading(text) {
    var ch = text.trim().match(/^Ch\.?\s*(\d+)\s*[\u2014\u2013-]\s*(.+)$/);
    if (ch) return { kind: 'chapter', num: parseInt(ch[1], 10), title: ch[2].trim(), label: 'Ch.' + parseInt(ch[1], 10) };
    var ex = text.trim().match(/^E\.?\s*(\d+)\s*[\u2014\u2013-]\s*(.+)$/);
    if (ex) return { kind: 'excerpt', num: parseInt(ex[1], 10), title: ex[2].trim(), label: 'E.' + parseInt(ex[1], 10) };
    return null;
  }

  function parseGroupLabel(label) {
    var parts = label.split('·');
    if (parts.length < 2) return { kicker: '', title: label.trim() };
    return { kicker: parts[0].trim(), title: parts.slice(1).join('·').trim() };
  }

  function findEntryHeading(item) {
    var h1s = contentEl.querySelectorAll('h1');
    for (var i = 0; i < h1s.length; i++) {
      var parsed = parseHeading(h1s[i].textContent);
      if (parsed && parsed.kind === item.kind && parsed.num === item.num) return h1s[i];
    }
    return null;
  }

  function annotateEntryHeadings() {
    contentEl.querySelectorAll('h1').forEach(function(h1) {
      var parsed = parseHeading(h1.textContent);
      if (!parsed) return;
      if (!h1.id) h1.id = parsed.kind + '-' + parsed.num;
      h1.classList.add(parsed.kind === 'excerpt' ? 'excerpt-heading' : 'chapter-heading');
    });
  }

  function buildPartIntros() {
    annotateEntryHeadings();
    CHAPTER_GROUPS.forEach(function(group, index) {
      var first = null;
      for (var i = 0; i < group.items.length; i++) {
        first = findEntryHeading(group.items[i]);
        if (first) break;
      }
      if (!first) return;

      var meta = parseGroupLabel(group.label);
      var partId = 'part-' + index + '-' + slugify(meta.title);
      if (document.getElementById(partId)) return;

      var section = document.createElement('section');
      section.className = 'part-intro';

      var kicker = document.createElement('div');
      kicker.className = 'part-kicker';
      kicker.textContent = meta.kicker || 'Part';
      section.appendChild(kicker);

      var title = document.createElement('h1');
      title.className = 'part-title';
      title.id = partId;
      title.textContent = meta.title;
      section.appendChild(title);

      if (group.intro) {
        var intro = document.createElement('p');
        intro.textContent = group.intro;
        section.appendChild(intro);
      }

      first.parentNode.insertBefore(section, first);
    });
  }

  function render() {
    applyChrome();
    contentEl.style.display = 'none';
    loadingEl.style.display = 'flex';

    requestAnimationFrame(function() {
      var src = document.getElementById('md-source-ko').value;
      src = src.replace(/\*\*([^*\n]+)\*\*(?=[가-힣])/g, '<strong>$1</strong>');
      var mathData = protectMath(src);
      var html = marked.parse(mathData.src);
      html = restoreAndRenderMath(html, mathData.placeholders);
      contentEl.innerHTML = html;

      if (window.mermaid) {
        var mermaidBlocks = contentEl.querySelectorAll('pre > code.language-mermaid');
        mermaidBlocks.forEach(function(code, i) {
          var pre = code.parentElement;
          var container = document.createElement('div');
          container.className = 'mermaid';
          container.id = 'mermaid-ko-' + i;
          container.textContent = code.textContent;
          pre.replaceWith(container);
        });
        try { mermaid.run({ querySelector: '.mermaid' }); } catch(e) {}
      }

      tocContainer.innerHTML = '';
      buildPartIntros();
      buildOverview();
      buildTOC();
      contentEl.style.display = 'block';
      loadingEl.style.display = 'none';
      setupScrollTracking();

      if (window.location.hash) {
        var initId = window.location.hash.slice(1);
        var initTarget = document.getElementById(initId);
        if (initTarget) window.scrollTo(0, initTarget.getBoundingClientRect().top + window.scrollY - 60);
      }
    });
  }

  render();
  setupSearch();
  setupProgressBar();
  setupMobileMenu();
  setupKeyboard();
  setupTocDelegation();

  function setupTocDelegation() {
    tocContainer.addEventListener('click', function(e) {
      if (e.target.closest('.toc-item')) closeMobileSidebar();
    });
  }

  function buildOverview() {
    var h1s = contentEl.querySelectorAll('h1');
    var entries = {};

    h1s.forEach(function(h1) {
      var parsed = parseHeading(h1.textContent);
      if (!parsed) return;
      if (!h1.id) h1.id = parsed.kind + '-' + parsed.num;
      var sections = [];
      var node = h1.nextElementSibling;
      while (node && node.tagName !== 'H1') {
        if (node.tagName === 'H2') {
          if (!node.id) node.id = slugify(node.textContent);
          sections.push({ text: node.textContent.trim(), id: node.id });
        }
        node = node.nextElementSibling;
      }
      entries[parsed.kind + '-' + parsed.num] = {
        kind: parsed.kind,
        num: parsed.num,
        label: parsed.label,
        title: parsed.title,
        id: h1.id,
        sections: sections
      };
    });

    if (Object.keys(entries).length === 0) return;

    var overview = document.createElement('section');
    overview.className = 'guide-overview';
    var header = document.createElement('div');
    header.className = 'overview-header';
    var oTitle = document.createElement('h1');
    oTitle.className = 'overview-title';
    oTitle.textContent = OVERVIEW_TITLE;
    header.appendChild(oTitle);
    overview.appendChild(header);

    CHAPTER_GROUPS.forEach(function(group) {
      var valid = group.items.map(function(item) { return entries[item.kind + '-' + item.num]; }).filter(Boolean);
      if (!valid.length) return;
      var groupEl = document.createElement('div');
      groupEl.className = 'overview-group';
      var label = document.createElement('div');
      label.className = 'overview-group-label';
      label.textContent = group.label;
      groupEl.appendChild(label);
      if (group.intro) {
        var intro = document.createElement('p');
        intro.className = 'overview-group-intro';
        intro.textContent = group.intro;
        groupEl.appendChild(intro);
      }

      valid.forEach(function(entry) {
        var wrap = document.createElement('div');
        wrap.className = 'overview-chapter';
        var link = document.createElement('a');
        link.className = 'overview-chapter-link';
        link.href = '#' + entry.id;
        var num = document.createElement('span');
        num.className = 'overview-chapter-num';
        num.textContent = entry.label;
        link.appendChild(num);
        link.appendChild(document.createTextNode(entry.title));
        wrap.appendChild(link);
        groupEl.appendChild(wrap);
      });
      overview.appendChild(groupEl);
    });

    var about = contentEl.querySelector('.about-document');
    if (about) contentEl.insertBefore(overview, about.nextSibling);
    else contentEl.insertBefore(overview, contentEl.firstChild);
  }

  function buildTOC() {
    var headings = contentEl.querySelectorAll('h1, h2');
    var fragment = document.createDocumentFragment();
    headings.forEach(function(heading) {
      if (!heading.id) heading.id = slugify(heading.textContent);
      if (heading.classList.contains('overview-title')) return;

      var link = document.createElement('a');
      var parsed = parseHeading(heading.textContent);
      var tocClass = 'toc-section';
      if (heading.classList.contains('part-title')) tocClass = 'toc-part';
      else if (parsed) tocClass = 'toc-chapter' + (parsed.kind === 'excerpt' ? ' toc-excerpt' : '');
      link.className = 'toc-item ' + tocClass;
      link.href = '#' + heading.id;
      if (heading.classList.contains('part-title')) {
        var kicker = heading.parentElement ? heading.parentElement.querySelector('.part-kicker') : null;
        link.textContent = (kicker ? kicker.textContent + ' · ' : '') + heading.textContent;
      } else {
        link.textContent = heading.textContent;
      }
      link.dataset.headingId = heading.id;
      fragment.appendChild(link);
    });
    tocContainer.appendChild(fragment);
  }

  function slugify(text) {
    return text.toLowerCase().trim()
      .replace(/<[^>]+>/g, '')
      .replace(/[^\w\s가-힣-]/g, '')
      .replace(/\s+/g, '-')
      .substring(0, 80) || 'section';
  }

  function setupScrollTracking() {
    var headings = contentEl.querySelectorAll('h1, h2');
    var tocItems = tocContainer.querySelectorAll('.toc-item');
    if (headings.length === 0) return;
    if (state.observer) state.observer.disconnect();

    var tocMap = {};
    tocItems.forEach(function(item) { tocMap[item.dataset.headingId] = item; });
    var currentActive = null;
    var observer = new IntersectionObserver(function(entries) {
      var topHeading = null;
      var topOffset = Infinity;
      entries.forEach(function(entry) {
        if (entry.isIntersecting) {
          var rect = entry.target.getBoundingClientRect();
          if (rect.top < topOffset) { topOffset = rect.top; topHeading = entry.target; }
        }
      });
      if (topHeading) {
        if (currentActive) currentActive.classList.remove('active');
        var item = tocMap[topHeading.id];
        if (item) {
          item.classList.add('active');
          currentActive = item;
          var itemRect = item.getBoundingClientRect();
          var containerRect = tocContainer.getBoundingClientRect();
          if (itemRect.top < containerRect.top || itemRect.bottom > containerRect.bottom) item.scrollIntoView({ block: 'center', behavior: 'auto' });
        }
      }
    }, { rootMargin: '-60px 0px -70% 0px', threshold: 0 });
    headings.forEach(function(h) { observer.observe(h); });
    state.observer = observer;

    if (!state.scrollHandler) {
      var ticking = false;
      state.scrollHandler = function() {
        if (!ticking) {
          requestAnimationFrame(function() {
            var curHeadings = contentEl.querySelectorAll('h1, h2');
            var curTocItems = tocContainer.querySelectorAll('.toc-item');
            var curMap = {};
            curTocItems.forEach(function(item) { curMap[item.dataset.headingId] = item; });
            var found = null;
            var scrollTop = window.scrollY + 80;
            for (var i = curHeadings.length - 1; i >= 0; i--) {
              if (curHeadings[i].offsetTop <= scrollTop) { found = curHeadings[i]; break; }
            }
            if (found) {
              var active = tocContainer.querySelector('.toc-item.active');
              if (active) active.classList.remove('active');
              var item = curMap[found.id];
              if (item) item.classList.add('active');
            }
            ticking = false;
          });
          ticking = true;
        }
      };
      window.addEventListener('scroll', state.scrollHandler);
    }
  }

  function setupSearch() {
    var searchInput = document.getElementById('search-input');
    var noResults = document.getElementById('toc-no-results');
    searchInput.addEventListener('input', function() {
      var query = this.value.trim().toLowerCase();
      var tocItems = tocContainer.querySelectorAll('.toc-item');
      if (!query) {
        tocItems.forEach(function(item) { item.classList.remove('toc-hidden'); });
        noResults.style.display = 'none';
        return;
      }
      var matchCount = 0;
      tocItems.forEach(function(item) {
        var text = item.textContent.toLowerCase();
        if (text.includes(query)) { item.classList.remove('toc-hidden'); matchCount++; }
        else item.classList.add('toc-hidden');
      });
      noResults.style.display = matchCount === 0 ? 'block' : 'none';
    });
  }

  function setupProgressBar() {
    var progressBar = document.getElementById('progress-bar');
    var ticking = false;
    function updateProgress() {
      var scrollTop = window.scrollY;
      var docHeight = document.documentElement.scrollHeight - window.innerHeight;
      var progress = docHeight > 0 ? (scrollTop / docHeight) * 100 : 0;
      progressBar.style.width = Math.min(progress, 100) + '%';
    }
    window.addEventListener('scroll', function() {
      if (!ticking) {
        requestAnimationFrame(function() { updateProgress(); ticking = false; });
        ticking = true;
      }
    });
    updateProgress();
  }

  function setupMobileMenu() {
    var toggle = document.getElementById('menu-toggle');
    var sidebar = document.getElementById('sidebar');
    var overlay = document.querySelector('#sidebar-overlay');
    toggle.addEventListener('click', function() {
      sidebar.classList.toggle('open');
      overlay.classList.toggle('visible');
    });
    overlay.addEventListener('click', closeMobileSidebar);
  }

  function closeMobileSidebar() {
    document.getElementById('sidebar').classList.remove('open');
    document.querySelector('#sidebar-overlay').classList.remove('visible');
  }

  function setupKeyboard() {
    document.addEventListener('keydown', function(e) {
      if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'k') {
        e.preventDefault();
        document.getElementById('search-input').focus();
      }
    });
  }
})();
</script>
