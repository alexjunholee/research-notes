# Ch.13 — 수식·증명 읽기

[Knuth, Larrabee, Roberts 1989](https://www-cs-faculty.stanford.edu/~knuth/klr.html) §1 rule 16에 박힌 *blah 테스트*는 글쓴이의 self-check다. 모든 수식을 단어 'blah'로 치환해도 산문이 흘러야 한다. 이 self-check는 독자에게 한 가지 사실을 던진다. *첫 독서에서 수식을 건너뛰는 것이 정상이다*. 글쓴이가 그렇게 쓰도록 권고를 받는다면, 독자도 그렇게 읽으면 된다.

학생 입장에서 자주 깨지는 대목이 여기다. 모든 패스에서 모든 수식을 손으로 따라가려 들면, 한 페이지에 두 시간이 들어가고 그날의 다른 9편이 죽는다. ch07이 문장 단위 진단이고 ch15가 수식 *쓰기*라면, 이 장은 그 사이에서 *읽는 쪽이 어느 패스에 어디까지 들어가는가*를 정해 둔다.

---

## 13.1 패스에 따라 수식의 처리가 다르다

수식을 *건너뛰는가* *손으로 따라가는가*는 패스에 따라 다르다. Keshav 1st pass에서는 수식을 건너뛴다. 2nd pass에서는 prose를 따라가되 displayed equation은 한 번 훑고 넘어간다. 3rd pass(재구현·reviewer)에서만 손으로 따라간다.

이 분리가 안 잡히면 두 함정 중 하나에 빠진다. 모든 패스에서 *모든 수식을 손으로 따라가려는* 학생은 한 편이 두 시간을 먹고 다음 편을 못 본다. 반대로 *모든 패스에서 모든 수식을 건너뛰는* 학생은 1년 후에도 분야 dense math가 외부에 머문다. Keshav가 권장하는 길은 그 사이에 분리된 운영이다. 어느 패스에서 어떤 수식을 어느 정도 들여다보는가의 결정.

분야 쪽 논의에서 자주 어긋나는 풍경이 있다. SLAM 신입이 ORB-SLAM 한 편을 1st pass에 4시간을 쓰고 자코비안 derivation에서 막혀 있는 그림이다. 1st pass의 출력은 *5 Cs 한 페이지* 쪽이다. 자코비안에 들어가는 시점은 3rd pass이고, 그 시점에는 본인이 *이 한 편을 재구현할 작정*인지의 결정이 먼저 와 있어야 한다.

---

## 13.2 derivation 한 페이지를 읽는 4 단계

dense한 derivation 한 페이지가 손에 들어왔을 때, 다음 네 단계를 *순서대로* 적용한다. 순서를 섞으면 한 페이지에 두 시간이 들어가게 된다.

**단계 1 — 입력·출력 명시.** 그 페이지가 *어떤 양에서 어떤 양으로 가는가*를 한 줄로 적는다. EKF 예측 단계라면 *"이전 step posterior $(\mu_{k-1}, \Sigma_{k-1})$에서 현 step prior $(\bar{\mu}_k, \bar{\Sigma}_k)$로 간다"* 같은 한 줄. 이 한 줄이 적히지 않으면 그 페이지의 목적이 잡히지 않은 것이고, 다음 단계로 넘어가지 않는 편이 마찰이 적다.

**단계 2 — 가정 추출.** 본문에 적힌 가정 + 묵시 가정 두 묶음으로 분리한다. EKF의 경우 본문에 적힌 가정은 *프로세스 노이즈가 가우시안이고 평균이 0*이고, 묵시 가정은 *선형화 점이 진짜 평균에 충분히 가깝다*다. 묵시 가정이 곧 ch05 reviewer 모드의 unstated assumption 후보다. derivation을 읽는 작업과 reviewer 모드가 같은 자료를 두 층위로 본다.

**단계 3 — prose만 따라간다.** 수식을 일단 건너뛰고 *between-equation prose*만 읽어 한 페이지의 흐름이 잡히는지 본다. 잡히면 그 페이지는 글쓴이가 prose를 잘 깐 글이고, 더 이상 손 derivation 없이 한 페이지가 본인 안에 들어온다. 잡히지 않으면 그 페이지는 글쓴이가 *between-equation prose를 비워둔* 글이다. 이 진단이 곧 ch15 R1의 거울이다. 글쓴이가 인접한 수식 사이에 단어를 넣지 않은 결손이, 독자에게 *blah 테스트*가 깨진 결과로 돌아온다.

**단계 4 — 결정적 한두 줄에 깊이 들어간다.** 모든 수식을 손으로 따라가지 않는다. *결과의 운명을 가르는 한두 줄*만 골라 손 derivation을 한다. 보통 가정이 결과로 변환되는 줄, 근사가 들어간 줄, 잔차가 정의되는 줄 쪽이다. EKF라면 *Kalman gain의 정의 한 줄*과 *update 후 covariance가 작아지는 한 줄*이 그 후보다.

4 단계는 순서대로다. 입출력 → 가정 → prose → 결정적 한두 줄. 단계 1을 건너뛰고 단계 4부터 들어가면, *어느 한두 줄이 결정적인가*를 잡지 못한 채 모든 줄을 따라가게 된다.

---

## 13.3 proof block — 통째로 건너뛰는가, 펼치는가

Theorem statement 그 자체가 자기완결적인지 먼저 본다. ch15 R6에서 글쓴이에게 권고되는 항목의 거울이다. statement 안의 모든 기호가 statement에서 정의되거나 명시 참조되어야 하고, 앞 단락을 다시 읽어야 statement가 이해되면 self-contained가 아니다. 본문 위로 거슬러 올라가야 하는 *횟수*가 곧 글쓴이가 statement를 다듬지 않았다는 신호다.

proof block을 통째로 건너뛰는 결정의 시점이 정해져 있다.

| Pass | proof block 정책 |
|------|------------------|
| 1 | 항상 건너뛴다 |
| 2 | 그 정리가 본인 작업에 *직접* 쓰일 때만 펼친다 |
| 3 | 펼친다 |

펼친 proof는 signpost를 따라 읽는다. *"We divide the proof into two parts"* 같은 줄이 들어가 있으면 두 part로 따라가고, 없으면 본인이 만들면서 읽어야 한다. signpost가 비어 있는 proof block에서 막히는 책임은 글쓴이에게 있다. 그러니 본인의 working memory 부족으로 진단을 돌리기 전에 글쓴이가 signpost를 깐 글인지부터 본다.

direct proof가 가능한 곳에 contradiction이 들어가 있는 경우도 같은 결이다. Knuth가 §1에서 환기한 권고는 direct proof가 닿는 자리에서는 direct가 우선이라는 것이다. proof by contradiction은 독자에게 *부정 명제를 working memory에 들고 있을 부담*을 지운다. 본인이 그 부담 앞에서 막힌다면, 그 부담을 *본인의 부족*으로 해석하지 않는다. ch07 §1과 같은 관점이다. 안 읽힘의 1차 책임은 글쓴이에게 있다.

proof block에서 막혔을 때의 진단 질문은 *"글쓴이가 signpost를 깐 글인가, 안 깐 글인가"*다. 안 깐 글이면 reviewer 코멘트 evidence가 거기에 잡힌다 (ch05 양식과 같은 결).

---

## 13.4 SLAM 분야 쪽 논의 — 자코비안·EKF·MAP

분야의 dense math 영역이 셋 정도로 정해져 있다.

**자코비안 derivation.** SE(3)·SO(3) 위의 perturbation 자코비안이 첫 영역이다. *prose만 따라가기*에서 흔히 막히는 지점은 chain rule의 어느 항이 spatial 관점이고 어느 항이 body 관점인지가 글쓴이마다 다른 데서 갈라진다. 진단 질문은 *"첫 등장에서 관점 convention이 명시되었는가"*이고, 명시 안 되어 있으면 한 자료를 끝까지 따라가기보다 관점 convention이 정해진 다른 자료(예: $\mathfrak{se}(3)$ 표기를 통일한 교과서)를 정전으로 두고 시작하는 편이 마찰이 적다.

**EKF predict/update.** 한 페이지에 수식이 8-10줄 들어가는 본보기다. 단계 1(입출력)이 잘 잡히면 한 페이지가 흐른다. 다만 ResearchGate·교과서·논문마다 표기가 다른 만큼, 한 표기로 통일된 자료를 본인 안의 정전으로 두고 *그 표기 안에서만* 비교하는 편이 흔들림을 줄인다. 다른 자료에서 표기가 다르게 나오면 *번역* 단계를 먼저 거친다.

**MAP estimation 유도.** Bayes rule → log → 최적화 → Newton step의 사이클이다. 가정(가우시안 prior·likelihood)이 *어디에서* 들어가는지 추적하는 작업이 본 작업의 본체다. 같은 derivation이 maximum likelihood로 굴러갈 때와 maximum a posteriori로 굴러갈 때의 차이가 *prior 항 한 줄*에서 갈린다. 그 한 줄이 본인의 단계 4(결정적 한두 줄) 후보다.

분야 dense math는 한 번에 잡히지 않는다. 같은 자료를 *반복해서* 읽되, 매번 *어디서 막혔는지*를 적어둔다. 막힘 좌표가 본인의 학습 곡선의 본체다. 분야 senior가 자기 블로그에 *해설형 자료*를 남기는 동기도 같은 데 있고, paper의 between-equation prose가 비어 있을 때 senior의 해설이 그 prose 층위를 보강한다 (ch09에서 코드 동반 읽기로 자세히).

---

## 13.5 막힘 좌표 노트 — 학습 곡선의 기록

한 페이지 막힘은 진단 분류가 가능하다. 본인의 *어휘 부족*인가, *분야 prior 부족*인가, *글쓴이의 prose 부족*인가의 세 갈래로 갈라진다. 진단이 잡히면 다음 액션이 달라진다. 어휘 부족이면 그 어휘를 노트에 박고, 분야 prior 부족이면 core paper 한 편 더, 글쓴이 prose 부족이면 그 부분을 *건너뛰거나* reviewer 코멘트 evidence로 둔다.

막힘 좌표 노트의 양식은 단순하다.

```
[자료 + page · line] | [막힌 줄 원문 인용] | [진단 분류] | [다음 액션]
```

같은 진단 분류가 5회 이상 누적되면, 그 항목이 본인의 학습 곡선에 한 마디로 들어간다. 분야 senior에게 *한 질문을 묶어서* 던지는 시점이 그때 따라붙는다. 「대학원노트」 [Part 3 ch04 「하나의 질문 메일」](../grad-notes/chapter_10_one_question_email.md)이 그 출구다.

막힘 좌표 노트는 *학습 곡선*인 동시에 *후배 멘토링 자료*가 된다. 본인이 막혔던 곳은 다음 후배도 막힐 곳이고, 노트에 박힌 좌표가 그대로 후배의 학습 좌표가 된다. 5년 후 본인이 같은 분야의 신입에게 무엇을 던질지의 자료가, 5년 동안 누적된 막힘 좌표에서 만들어진다.

---

**출처.** [Knuth, Larrabee, Roberts 1989](https://www-cs-faculty.stanford.edu/~knuth/klr.html) §1 rule 16 (blah test, between-equation prose) · §1 rule 4 (self-contained statement) · §1 (direct proof 우선). Part 2 [ch15 (수식·정리·증명 쓰기)](./chapter_30_math_and_proofs.md) — 이 장의 거울. 「대학원노트」 [Part 3 ch04 (하나의 질문 메일)](../grad-notes/chapter_10_one_question_email.md) — 막힘 좌표 노트의 출구. 4단계 derivation 절차, proof block 패스 결정, 막힘 좌표 노트 양식, SLAM 3 영역(자코비안·EKF·MAP) 진단은 이 장에서 정리했다.

# Ch.14 — 코드 동반 읽기

SLAM·CV 분야는 코드 공개가 기본값이다. arXiv 첫 페이지에 GitHub 링크가 박혀 있는 분야 표준인 만큼, *paper만 읽은 학생*과 *코드까지 본 학생*의 격차가 벌어진다. 같은 한 편이 두 학생에게 다른 깊이로 남는다.

ch08이 dense math를 어느 패스에 어디까지 펼치는가를 정했다면, 이 장은 그 옆에 한 층위를 더 둔다. paper가 못 잡은 디테일이 GitHub repo·issue tracker·PR comment에 자주 풀려 있는 만큼, 재구현 작정의 읽기는 paper만으로 끝낼 수 없다. paper는 *what*을 적고, GitHub은 *how*를 담는다.

---

## 14.1 paper와 repo의 거리

Keshav 3rd pass — virtual re-implementation — 은 paper만으로 끝낼 수 있는 작업이 아니다. paper §3 method가 *알고리즘의 골격*을 적는다면, 같은 알고리즘이 어떤 hyperparameter에서 안정적이고 어디서 무너지는가는 코드와 issue tracker 안에 놓여 있다.

학생이 자주 빠지는 함정은 paper만 읽고 *그게 전부*라고 결론을 내리는 결정이다. 한 편을 1st·2nd pass로 끝낸 후 GitHub repo를 한 번도 안 열고 다음 편으로 넘어가면, 그 한 편은 *abstract 수준*에서만 본인 안에 남는다. 6개월 후 자기 thesis에서 baseline으로 다시 그 한 편을 부르려는 시점에, 본인이 들고 있는 정보가 그 baseline을 돌리기에 부족하다.

분야 senior가 자기 블로그에 *해설형 자료*를 남기는 동기가 같은 결에 놓여 있다. 김기섭 교수의 SLAM 14편 블로그 — *FAST-LIO Fast 한 이유*·*Pose-graph SLAM Tutorial* 같은 형식 — 가 한 본보기다. paper만으로는 안 잡히는 *왜 이 코드가 이렇게 빠른가*를 issue·코드·본인 빌드 + paper 셋의 교차에서 풀어 적은 형식이다. 같은 결의 자료를 한 편에 두 시간 들여 합치는 작업이 senior의 층위로 굳었다.

---

## 14.2 코드 동반 사이클 — 4단계 일주일

한 편을 *재구현·실행* 단계까지 끌고 가는 사이클은 4단계다. 한 세션에 다 끝내려 들면 한 단계마다 막혀 다음 단계로 못 넘어간다. 한 편 = 일주일 분량의 작업이라는 관점이 깔려 있다.

**단계 1 — paper Keshav 1st·2nd pass (1-2시간).** GitHub은 아직 안 연다. 5 Cs 한 줄이 잡히고 abstract의 broad-narrow-broad가 통과하는지 확인한 후 다음 단계로 넘어간다. 이 단계에서 paper가 막히면 다음 단계는 미루는 편이 마찰이 적다.

**단계 2 — repo 둘러보기 (30분).** README·디렉토리 구조·entry script 위치를 한 번 훑는다. 이 단계의 출력은 *어디서 시작해서 어디로 가는가*의 한 줄 답이다. SLAM 코드라면 *"main에서 sequential하게 관점을 받아 odometry 모듈로 넘기고 mapping이 받아 keyframe을 뽑는다"* 같은 한 줄이 들어간다.

**단계 3 — 직접 빌드 + 한 번 돌려본다 (2-4시간).** docker 또는 native에서 빌드한다. 첫 build error에서 두 시간이 들어가는 일이 흔한데, 이는 *예상 작업이지 예외가 아니다*. CMake 버전·OpenCV 버전·CUDA 호환·ROS distribution이 어긋나는 지점이 build error의 본체이고, issue tracker에 *대부분의 함정*이 이미 올라와 있다.

**단계 4 — paper와 코드 1:1 대응 (2-4시간).** paper §3 method의 한 단락이 코드의 어느 함수에 있는가? 매핑 노트를 만든다. paper 안의 *수식 2*와 코드의 *line 47-83*이 짝지어지면 그 한 점이 본인 안에 박힌다. 다만 모든 단락·수식을 매핑하지 않는다. 단계 4의 매핑은 ch08 §2의 *결정적 한두 줄*이 코드에서 어디에 놓이는지 찾는 작업이고, 그 한두 점이 본인의 thesis가 돌아갈 좌표가 된다.

단계 1-4를 한 세션에 다 끝내려 들지 않는다. 한 편 = 일주일 분량의 작업이고, 분야 senior가 한 분야의 정전 repo *한 편*에 한 달을 쓰는 풍경이 흔한 이유가 같은 관점에 놓여 있다.

---

## 14.3 issue·PR을 *읽기 자료*로 본다

GitHub issue tracker는 *이 코드의 알려진 함정*의 저장소다. 본인이 build에서 막혔을 때 *대부분의 함정*은 issue에 이미 올라와 있다. 같은 자료가 *코드의 design 결정*까지 함께 담는다. *왜 이 모듈을 multi-thread로 안 했는가*가 issue 한 토론에서 한 단락으로 풀리는 일이 흔하다.

PR comment에는 paper에 없는 디테일이 들어간다. *왜 hyperparameter A를 0.05가 아니라 0.1로 바꿨는가*가 PR에서 한 줄로 풀려 있으면, paper §4 experiment의 한 줄 *"set α = 0.1"*보다 더 많은 정보를 던진다. paper가 실험 결과를 *적은* 글이라면, PR은 그 결과에 도달하기까지 들었던 시도 중 *살아남은 한 결정*을 적은 글이다.

issue·PR을 *읽기 자료*로 둔다. 본인이 막혔을 때만 보는 게 아니라, 단계 4 매핑 작업의 한 축으로 둔다. 정독의 양식은 단순하다.

| 항목 | 출력 |
|---|---|
| 닫힌 issue 상위 5개 | 자주 막히는 함정 + 처방 |
| merge된 PR 상위 5개 | 결정적 design 변경 이유 |
| open issue 상위 3개 | 현재 알려진 한계 |

이 세 출력이 paper §6 limitation에 적힌 한 단락보다 더 정확한 *분야 쪽 논의의 한계*를 본인 안에 남긴다. paper의 limitation 섹션이 *저자가 인지한* 한계라면, issue tracker의 open issue는 *사용자가 부딪힌* 한계다.

---

## 14.4 분야 쪽 논의 — 정전 repo 1편이 우선

분야의 정전 repo가 robotics-practice ch20 § 20.6 *유용한 GitHub 저장소*에 정리되어 있다. SLAM 쪽이라면 ORB-SLAM3, FAST-LIO2, LIO-SAM, RTAB-Map이 머리에 놓이고, CV 쪽이라면 SAM, DINOv2, NeRF Studio, COLMAP가 같이 들어간다.

한 분야 신입의 권장 작업은 정전 repo *1-2편*을 4단계 사이클로 끝내고, 분야의 standard test dataset (KITTI·TUM·EuRoC)으로 trajectory를 비교하는 작업이다. robotics-practice ch20 § 20.7 *중급 마일스톤*과 같은 결이다. *"ORB-SLAM3를 직접 빌드하고 데이터셋으로 돌려서 trajectory를 ground truth와 비교할 수 있으면 중급 단계 졸업이다."*

신입이 자기 코드를 처음부터 짜기 전에, 정전 repo 1편을 끝까지 따라가는 작업이 우선이다. 분야 표준 셋업·디버깅 패턴·logging 양식이 그 한 편 안에 들어 있는 만큼, 이 한 편을 거친 후 자기 셋업을 만드는 학생과 거치지 않고 자기 셋업을 짠 학생의 5년 누적 격차가 벌어진다. 「대학원노트」 [Part 3 ch05 「도구 함정」](../grad-notes/chapter_11_tool_trap.md)의 *작게 시작하라* 관점과 같은 결이다. 처음부터 자기 코드를 모두 짜려 들지 않고, 한 편을 끝까지 따라간 후 *어디를 바꿀지*를 결정하는 순서다.

---

## 14.5 AI 보조 도구 — 코드 동반 읽기의 가속

paper와 코드의 1:1 매핑은 AI에 잘 위임된다. *"이 paper의 'we apply pre-integration on IMU measurements between keyframes' 줄이 코드의 어느 함수에 있는지 찾아줘"* 같은 질문을 던지면, AI가 후보 함수 2-3개를 짚어 준다. 본인이 그 후보를 검증하면, 본인이 코드를 처음부터 grep하던 한 시간이 줄어든다.

PR comment의 분야 표현 직역이 막혔을 때도 AI가 한 번에 풀어 준다. PR comment의 영어가 분야 jargon이 dense하고 informal한 톤이 섞여 있어, 본인이 한 단락을 다섯 번 읽고도 안 잡힐 때가 있다. AI에 *"이 PR comment의 핵심 결정 + 그 이유를 한 단락으로 풀어 줘"*를 던지면, 본인이 그 결정의 위치를 한 번에 잡는다.

AI가 만든 *paper-코드 매핑*을 본인이 한 번 더 검증한다. line 번호가 hallucinate되는 일이 흔하고, AI가 *비슷해 보이는* 함수를 짚지만 실제로는 다른 함수인 일도 흔하다. 검증 없이 매핑을 노트에 박아두면, 6개월 후 본인의 thesis에서 잘못된 line 번호로 자기 작업이 무너진다.

분야 쪽 논의에서 같은 관점이 참조로 한 번 더 들어간다.

> 코드 작성 도구가 널리 쓰이는 지금도, 만 줄짜리 문서를 읽고 맥락을 파악하는 일은 사람에게 남아 있다. 잘 읽는 사람이 도구도 잘 다룬다.
>
> — robotics-practice ch22 § 22.5

paper-코드 매핑이 *사람이 읽고 결정해야 하는 작업*인 본질이 같은 곳을 가리킨다. 코드는 AI가 짜고, 그 코드와 paper가 *어떻게 짝지어지는가*의 결정은 본인이 들어간다. 그 결정의 누적이 5년 후 본인의 분야 senior 위치를 만든다.

---

**출처.** [Keshav 2007](https://web.stanford.edu/class/ee384m/Handouts/HowtoReadPaper.pdf) §2.3 (3rd pass · virtual re-implementation), robotics-practice ch20 § 20.4 (필독 논문 리스트)·§ 20.6 (유용한 GitHub 저장소)·§ 20.7 (중급 마일스톤)·ch22 § 22.5 (AI 시대 참조). [김기섭 교수 SLAM 14편 블로그](https://gisbi-kim.github.io/) — 분야 정독+구현 사례. 「대학원노트」 [Part 3 ch05 (도구 함정)](../grad-notes/chapter_11_tool_trap.md) — *작게 시작하라* 관점 연결. 4단계 사이클, issue·PR 정독 자세, AI 보조 도구 정책은 이 장에서 정리했다.

# Ch.15 — AI 시대의 노트와 인용 관리

본인이 어제 읽은 한 편의 본문은 3개월 후에 잊는다. 6개월 후에는 abstract도 흐릿하다. 이 사실은 여전히 맞다. 달라진 것은 저장 방식이다. 노트는 나중에 다시 돌아왔을 때 *왜 이 논문을 남겼는가*를 바로 알게 하는 결정 기록이다.

AI가 논문을 다시 열어 요약해 줄 수 있는 시대에는 긴 요약의 가치가 줄어든다. 대신 세 가지가 중요해진다. 어떤 claim이 있었는가. 그 claim의 근거가 논문 어디에 있었는가. 그 claim이 내 작업에서 어떤 결정을 바꾸는가. 이 세 가지는 AI가 대신 보관해 주지 않는다. 사람이 확인하고 적어 둬야 한다.

ch04가 입력 pipeline의 *흘러 들어오는 곳*이었다면, 이 장은 그 자료를 *저장하고 재호출하는* 단계에 들어간다. ch03의 5 Cs가 1st pass의 출력 양식이라면, 이 장은 그 위에 *근거 위치와 결정* 층위를 더 얹는다.

---

## 15.1 노트 양식 — 5 Cs + 3 추가 칸

ch03의 5 Cs (종류·맥락·타당성·기여·명료성)가 한 편의 1st pass 출력이라면, 노트로 박을 때는 그 위에 세 칸이 더 붙는다.

**5+1 — 근거 위치.** 자기 글에서 쓸 만한 claim 하나와 그 claim의 위치를 적는다. page·section·figure·table·equation 번호 중 하나가 붙어야 한다. 직접 인용할 문장이 있을 때만 짧은 원문을 남기고, 대부분은 *내 말로 쓴 claim + 위치*로 충분하다. 6개월 후 introduction을 쓸 때 필요한 것은 "이 주장을 어느 표가 받쳤는가"의 한 줄이다.

**5+2 — 본인 작업과의 거리.** 이 한 편이 자기 thesis와 어떤 관계인가? 네 분류가 있다. *baseline 후보*, *related work*, *반박 대상*, *무관*. 무관도 분류의 한 항목이다. 무관임을 적어두는 작업이 6개월 후 *왜 이 한 편을 cite 안 했는가*에 답하는 자료가 된다.

**5+3 — 다음 액션.** 중단·보류·진행 (ch01의 결정 게이트). 진행이면 *언제* 다시 돌아올지 한 줄. 보류 큐에는 다시 돌아올 시점이 함께 적혀야, 그제서야 그 시점이 되었을 때 weekly digest 블록에서 그 자료가 잡힌다.

노트는 한 편당 한 페이지 상한이다. 긴 요약을 만들수록 나중에 안 읽힌다. 정독 자료가 필요하면 별도 파일을 만들고, 한 페이지 노트에는 claim·근거 위치·내 작업과의 거리만 남긴다. 노트와 정독 자료가 같은 파일에 섞이면, 6개월 후 *어느 한 편을 정독했는가*가 안 잡히는 함정에 빠진다.

노트 파일명은 *저자-연도-키워드* 형식이 검색 가능성이 높다. ASCII 키워드를 박는 편이 grep·검색에서 마찰이 적다. 분야 쪽 논의라면 `mur-artal-2015-orbslam.md` 같은 식의 키가 흔히 쓰인다.

---

## 15.2 인용 관리 — reference manager는 본체가 아니다

인용 관리는 paper의 진실을 보관하는 일이 아니다. 진실의 본체는 DOI·arXiv·OpenReview·venue page·publisher page에 있고, reference manager는 그 정보를 논문 양식에 맞게 내보내는 호환 계층에 가깝다.

손으로 BibTeX를 typing하지 않는다. 자동 생성 출처는 DOI, arXiv, CrossRef, Semantic Scholar, OpenAlex, venue page다. Google Scholar의 export는 빠르지만 필드가 비거나 venue 정보가 거칠게 들어오는 일이 있으므로 최종본의 기준으로 두지 않는다.

자동 생성된 항목도 한 번은 본인이 통과한다. 확인할 것은 많지 않다.

| 항목 | 확인할 것 |
|---|---|
| ID | DOI 또는 arXiv ID가 맞는가 |
| 저자 | 첫 저자·마지막 저자·철자가 맞는가 |
| venue | conference/journal 이름과 연도가 맞는가 |
| 버전 | arXiv preprint인지, peer-reviewed version인지 구분되는가 |
| key | 같은 paper가 두 key로 중복되지 않았는가 |

reference manager는 lab 관행이나 공동저자 환경에 맞춰 쓰면 된다. 다만 그것이 노트 시스템의 본체가 되면 곤란하다. PDF 파일과 annotation을 많이 모았다는 사실은 지식이 쌓였다는 뜻이 아니다. 지식은 *확인한 claim*과 *내 작업에서 바뀐 결정*으로 남는다.

100편을 넘기는 라이브러리에서도 핵심은 도구 이름이 아니다. 같은 paper가 하나의 canonical key로만 존재하고, citation metadata가 source-of-truth URL과 연결되어 있고, build 단계에서 reference 오류를 잡을 수 있으면 충분하다. reference manager는 그 조건을 만족시키는 여러 방법 중 하나다.

---

## 15.3 paper packet + AI 질의

한 편을 저장할 때의 단위는 PDF가 아니라 paper packet이다. packet에는 논문 URL, DOI/arXiv ID, PDF, code repository, project page, supplementary, OpenReview thread, dataset link가 들어간다. PDF는 그중 하나일 뿐이다. PDF 위에 표시를 남기는 일은 임시 읽기 흔적일 수는 있지만, 6개월 뒤의 재호출 단위로는 약하다.

AI 보조 도구는 세 갈래로 붙는다.

**갈래 1 — 0차 5 Cs 후보.** paper packet을 AI에 넣고 *"5 Cs를 채우되 각 항목마다 근거 위치를 붙이고, 근거가 없으면 없음이라고 적어라"*를 묻는다. 본인은 그 결과를 통과시키는 작업으로 1st pass를 시작한다.

**갈래 2 — reference 후보.** reference 목록과 forward citation graph를 AI에 주고 *"내 thesis 키워드와 가까운 5편을 고르되, 왜 가까운지 한 줄씩 적어라"*를 묻는다. 다음 입력 pipeline의 후보가 거기서 만들어진다. 후보를 고르는 일은 AI에 맡길 수 있지만, 후보를 *읽을지 말지*의 결정은 본인이 한다.

**갈래 3 — related work 비교표.** paper A와 paper B의 차이점을 한 표로 정리해 달라고 AI에 요청한다. 표의 칸은 방법·가정·데이터셋·metric·한계·내 작업과의 거리 정도면 충분하다. 본인이 source 위치를 확인한 후에만 그 표가 자기 글의 related work 단락의 골격이 된다.

AI가 만든 5 Cs 노트는 저장물이 아니라 초안이다. 그대로 보관하지 않는다. 최종 노트에는 AI 문장을 남기는 대신, 본인이 확인한 claim과 위치를 남긴다. hallucination의 가장 위험한 형태는 틀린 요약이 아니라 *그럴듯한 citation 위치*다. section·table·equation 번호가 맞지 않으면 그 항목은 버린다.

---

## 15.4 검색과 재호출 — 태그보다 질문

노트는 *시간이 지날수록 가치가 오르는* 자료다. 그러자면 검색 가능성이 1순위에 놓인다. 2026년의 검색은 태그만으로 굴러가지 않는다. plain text, citation key, DOI/arXiv ID, embedding search, grep이 같이 작동한다. 그래서 태그를 많이 다는 것보다 문장을 검색 가능하게 쓰는 편이 더 중요하다.

태그는 최소한으로 둔다.

| 축 | 값 |
|---|---|
| 분야 | slam · cv · dl · vfm · vla |
| 모드 | skim · read · implement · cite |
| 거리 | baseline · related · rebuttal · out |

세 축의 조합으로 한 편을 분류하면, *내 thesis의 baseline 후보 SLAM 논문 5편*이 한 검색으로 잡힌다. 더 세밀한 분류는 related work 비교표에서 처리한다.

정기 청소의 목적도 바뀐다. 한 달에 한 번, 30분 블록을 두고 claim ledger를 정리한다. 이번 달 노트에서 서로 충돌하는 claim, 같은 baseline을 공유하는 paper, 내 hypothesis를 바꾼 paper를 각각 한 줄씩 뽑는다. *paper A·paper B 모두 가정 X에서 시작하지만 metric Y에서 갈라진다* 같은 한 줄이, 본인의 thesis가 놓일 곳을 만들어 간다.

흥미로운 한 편이 노트에 박힌 채 사용되지 않으면 *그 한 편이 없는 것*과 같다. Whitesides가 글쓰기 관점에서 적은 한 줄 — *"어떤 프로젝트도 결코 '완료'되지 않는다. 흥미롭지만 미발표인 것은 존재하지 않는 것과 같다"* — 이 노트 시스템에서도 같은 명제가 된다. 읽은 것을 글로 옮기지 않으면, 읽기는 금방 사라진다.

노트 → 글쓰기로의 흐름은 단순하다. 자기 paper의 related work 한 단락은 노트에서 *6편을 골라 한 표로 묶는* 작업이다. 그 표가 글의 한 단락의 골격이 되고, 표의 각 칸 — *방법·가정·한계·본인 작업과의 거리* — 이 단락의 한 문장씩으로 풀려 나간다. 이 흐름은 [Part 2 ch08 (Introduction)](./chapter_23_introduction.md)·[ch09 (Related Work)](./chapter_24_related_work.md)에서 다시 쓰인다.

노트가 자료의 *외장 working memory*에서 자기 thesis의 *글의 골격*으로 옮겨간다. 6개월 동안 누적된 100편의 노트가 본인의 첫 paper의 related work 단락 한 줄 한 줄로 풀려 나가는 풍경이, 이 장이 가리킨 끝점이다.

---

**출처.** [Whitesides 2004](https://onlinelibrary.wiley.com/doi/10.1002/adma.200400767) §V (in-progress vs published — *"흥미롭지만 미발표인 것은 존재하지 않는 것과 같다"*) — 노트 시스템의 관점 거울. Part 2 [ch08 (Introduction)](./chapter_23_introduction.md) — 노트 → 글쓰기 흐름의 출구. 5 Cs + 3 추가 칸 양식, paper packet, AI 보조 도구의 검증 원칙, claim ledger 운영은 이 장에서 정리했다.

# Ch.16 — 마음가짐

논문을 처음 쓰는 학생이 가장 먼저 깨야 할 마인드 — 학부 시험 채점 마인드다. 학부 시험에는 100점이라는 천장이 있었지만, 논문에는 그 천장이 없다. 만점이 없는 글에 만점을 노리면 수정이 한없이 길어진다.

같은 권고를 다른 각도에서 풀어낸 글이 [최윤섭 박사 G4 「첫 번째 논문을 최대한 빨리 써라」](https://gradschoolstory.chkwon.net/yoonsup/first-paper/)다. 핵심 명제는 *실험 능력 ≠ 논문 출판 능력*. 두 능력이 분리되어 있으므로 출판 능력은 조기 경험으로만 길러진다. 박사 말년에 첫 논문을 처음 시도하면 졸업 지연 위험이 그대로 따라온다.

> *"방귀도 자꾸 뀌어야 똥이 나온다."*

최윤섭 박사가 같은 글에 박은 한 줄이 이 장의 톤을 정한다. 첫 논문을 *작은 단위로* 자주 시도해 글쓰기 회로를 트라는 권고다. 같은 글에 적힌 일화 — 첫 논문 수락까지 계획보다 2년 초과, 3회 리젝, 6개월 리비전 — 가 *완성된 첫 논문*이 어떤 시간 곡선 위에 놓이는지 보여 준다. 이 곡선이 만점 채점 마인드와 정면으로 부딪힌다. 리비전 기간(약 2개월)에 추가 실험이 들어가는 대목은 ch17에서 다룬다.

---

## 16.1 Reject의 complement

한 venue가 받는 논문 5편 중 보통 4편이 reject 된다. 리뷰어는 reject할 이유를 먼저 찾는다. accept할 이유를 모은 뒤 그 합으로 판단하는 구조가 아니다.

이 비대칭이 글쓴이의 우선순위를 정한다. 완성도를 끌어올리는 것보다 reject 사유를 줄이는 쪽이 먼저다. [임형태 박사](https://github.com/LimHyungTae/paper-writing-checklist)는 이 마인드를 "accept을 노리는 것이 아니라 reject의 complement를 노리는 것"이라 정리했다.

reject 사유는 거창하지 않다. notation 불일치, baseline 비교 누락, figure 1이 한 눈에 message를 전달하지 못함, "ensure consistency" 같은 vague phrasing 반복. 이 중 하나만 있어도 그대로 reject 사유로 잡힌다.

[김기섭 교수 「연구길의 초입에서」](https://gsk1m.github.io/productivity/2024/05/25/entering-research.html)가 같은 권고를 *견고한 기초*의 관점으로 적었다.

> *"첫 논문에서 Nature를 노리는 것보다, '리젝 이유가 없는 논문'을 목표로 하는 편이 현실적이다."*

화려한 novelty와 빈틈없는 완성도는 *대립*이 아니라 *순서*다. 첫 논문에서 둘을 동시에 노리면 reject 사유가 늘어나고, 빈틈없는 완성도부터 잡은 학생은 다음 논문에서 novelty를 더 위에 올릴 수 있다. 같은 글에 박힌 *하나의 논문에는 하나의 핵심 메시지만*이라는 권고가 같은 관점 위에 있다 — 두 메시지가 한 논문에 섞이면 두 곳에서 reject 사유가 동시에 자란다.

---

## 16.2 form 안에서 작업한다

논문은 form의 비중이 큰 글이다. 새로운 형식 그 자체가 가치가 되는 소설·시와 다르다. 첫 논문에서 figure 디자인이나 문장 구조에 새로운 시도를 한 학생이 reject 사유를 스스로 만든 사례가 흔하다.

해결책은 모방이다. 자기 분야 인용 100 이상 논문을 한 편 골라 표현부터 figure 레이아웃까지 따라 쓴다. 임형태 박사는 박사 시절 [He et al. 2016](https://arxiv.org/abs/1512.03385) ResNet 논문의 모든 문단을 거의 외우다시피 필사하며 영어 글쓰기를 익혔다고 적었다.

분야별 추천도 있다. 로보틱스라면 [Cyrill Stachniss 그룹](https://scholar.google.com/citations?user=8vib2lAAAAAJ&hl=en) 논문이 자주 추천된다. "논문은 이야기책처럼 술술 읽혀야 한다"가 그 그룹의 신조이고, 이 신조가 구조와 문장 양쪽에 일관되게 적용된다.

[엄태웅 대표 G2 「영어 못해도 논문 잘 쓰는 법」](https://gradschoolstory.chkwon.net/terry/englishpaperwriting/)는 같은 권고를 이렇게 옮겼다.

> *"일단 쓰기부터. 영어가 어렵다면 한글로라도."*

Whitesides §1의 "start writing early" 권고가 한국어 문맥에 그대로 옮겨진 한 줄이다. 영어 문장을 다듬느라 *내용 그 자체를 적는* 단계가 늦어지는 것 — 한국 L2 writer가 가장 자주 빠지는 함정이다. 한글 초고를 거쳐도 좋다는 권고가 그 함정 앞에 놓인다.

---

## 16.3 proofread는 도구가 한다

manuscript에 오타·수일치·인덱스 오류·인용 누락·깨진 연결erence 같은 결함은 본인이 꼼꼼하다는 자기 평가만으로 잡히지 않는다. 한두 종류씩 결함이 새는 일이 흔하므로 한 사람의 눈만 믿어서는 안 된다.

그래서 도구로 분담한다. LaTeX는 표기 일관성을, Grammarly는 문법을, ChatGPT는 line-by-line proofread를 맡는다. ChatGPT를 쓸 때는 통째로 던지지 않고 한 섹션씩 raw LaTeX 코드로 던지는 방식이 정확도가 높다. 임형태 박사가 공유한 prompt가 그 패턴이다.

```
아래는 논문의 ${SECTION} 부분이야

(본문 내용)

위 문장들에서 오탈자, 수일치, 문법 오류만 line-by-line으로 알려 줘.
%로 시작하는 줄은 주석이므로 무시.
```

공동 저자가 manuscript를 받기 전에 본인이 먼저 proofread를 한 번 거치는 것이 분야의 합의된 기본이다. 이 단계를 건너뛰면 같은 결함이 교수의 손에서 잡히고, 그 결과가 학생의 시간 평가에 그대로 반영된다.

---

## 16.4 영어 수준과 글쓰기 스타일

modern English science writing의 권장 방향은 active 문체와 "we" 사용에 가깝다. [Knuth, Larrabee, Roberts 1989](https://www-cs-faculty.stanford.edu/~knuth/klr.html) §1 R7, [Whitesides 2004](https://onlinelibrary.wiley.com/doi/10.1002/adma.200400767) §6, [Mensh & Kording 2017](https://doi.org/10.1371/journal.pcbi.1005619) rule 4가 모두 이 방향을 권한다. 한국 영어 교육에서는 passive를 강조해 온 시기가 길었고, 두 흐름이 학생 입장에서 충돌한다.

해결은 영어 수준에 따라 갈린다. native급에 가깝지 않다면 지도교수 스타일을 따르는 쪽이 마찰이 적다. 지도교수의 스타일은 본인이 시행착오 끝에 굳힌 결과이므로 학생의 영어 직관이 그 결정을 뒤집을 단계는 아니다. native급에 도달한 시점부터 의견을 낼 수 있다. 그 전에는 의미가 명백히 달라지거나 reviewer 공격 빌미가 보이는 부분에서만 정중히 의견을 내는 편이 안전하다.

---

## 16.5 맥락-Content-Conclusion 단락 구조

[Mensh & Kording 2017](https://doi.org/10.1371/journal.pcbi.1005619) rule 3은 단락의 표준 구조를 맥락-Content-Conclusion으로 정식화한다. 첫 문장은 맥락, 본문은 내용, 마지막 문장은 결론. 같은 패턴이 단락 → 섹션 → 논문 전체로 fractal하게 반복된다 (Ch.4에서 자세히).

진단법은 단락 길이로 갈음한다. 한 문단이 10문장을 넘거나 3문장 미만이면 key sentence가 잡히지 않았을 가능성이 높다. 한 줄로 message를 답할 수 없는 단락은 두 message가 섞인 상태이므로 쪼개야 정리된다.

---

## 16.6 읽히는 빈도와 시간 배분

논문에서 가장 많이 읽히는 부분은 제목·초록·figure·conclusion 순이고, methods가 가장 적게 읽힌다. [Mensh & Kording 2017](https://doi.org/10.1371/journal.pcbi.1005619) rule 9는 글쓰기 시간을 이 순서에 비례해 배분하라고 권한다. 제목에 한 시간, 초록에 두 시간, figure 1에 다섯 시간이 권장 비율로 제시된다.

신입생들이 흔히 하는 실수는 정반대 비율이다. methods에 90%, 제목·초록·figure에 10%. 그 결과 가장 적게 읽히는 부분에 시간이 가장 많이 들어가고, reject 사유가 가장 많이 잡히는 제목과 초록은 가장 적게 다듬어진 채 남는다.

# Ch.17 — 아웃라인부터 시작하기: Whitesides 방법

[George Whitesides의 "Writing a Paper" (2004)](https://onlinelibrary.wiley.com/doi/10.1002/adma.200400767)는 글쓰기를 *연구의 기획 도구*로 정의한다. 데이터가 다 모인 뒤에야 논문을 쓰기 시작하는 학생을 두고 Whitesides가 적은 진단은 단순하다 — 그 시점이면 이미 늦었다는 한 줄.

---

## 17.1 Outline은 텍스트가 아니라 데이터다

Whitesides가 글쓰기의 시작점으로 잡는 단계는 "mostly plan"이다. 가설은 있고 데이터는 거의 없는 단계. 이 시점에 outline을 처음 쓰고, 데이터가 들어올 때마다 outline을 다듬는다. "mostly outline"에 도달했을 때 비로소 본문을 시작한다.

이 과정에서 outline은 *연구의 구조 자체*가 된다. Whitesides는 outline 항목이 짧은 phrase로 남아 있어야 한다고 적었다. 완전한 문장으로 쓰기 시작하면 이미 글쓰기 모드에 진입한 것이고, 그 시점부터 구조 변경의 비용이 갑자기 올라간다.

그래서 데이터를 채워 넣을 칸에는 `[DATA NEEDED]`나 `[HYPOTHESIS]` 같은 마커를 그대로 남긴다. 빈 칸이 보여야 어떤 실험이 빠졌는지 드러난다. outline-as-data라는 표현이 이 점을 가리킨다.

---

## 17.2 7-슬롯 골격

Whitesides가 §I에 제시하는 outline 슬롯의 순서는 다음과 같다.

1. Title
2. Authors
3. Abstract — *나중에*
4. Introduction
5. Results & Discussion (combined)
6. Conclusions
7. Experimental

Abstract가 마지막에 놓이는 이유를 Whitesides는 직접 적었다. 본문이 안정되기 전에 쓴 abstract는 "이 논문이 무엇을 말하는지"에 대한 *거짓말*이 되기 쉽다는 진단이다. 본문이 두 번 이상 크게 흔들릴 수 있는 단계라면 abstract는 보류하는 쪽이 안전하다.

Introduction에는 다섯 가지 요소가 들어간다. (a) objectives, (b) justification, (c) background, (d) reader guidance, (e) summary preview. Whitesides는 첫 단락 또는 두 번째 단락까지는 outline 단계에서도 *완성된 문장으로* 쓰라고 권했다. 본문 전체의 톤이 여기서 정해진다.

Results & Discussion은 합쳐 쓰되, 시간순이 아닌 *중요도순*으로 배치한다. "독자는 당신이 거기에 어떻게 도달했는지에 관심이 없다"는 표현이 §I에 박혀 있다. 시간순은 lab notebook의 순서고, 논문의 순서가 아니다.

Conclusions는 Results의 요약이 아니라 *한 단계 위의 분석*이다. 이 정의는 [Ch.5](./chapter_20_subheadings_and_conclusions.md)에서 자세히 다룬다.

---

## 17.3 4-5회 iteration cycle

Whitesides가 권하는 outline 반복 횟수는 4-5회다. 한 번에 다듬으려 하면 *데이터 수집 단계의 자기 편향*이 outline에 그대로 박힌다는 관찰이 깔려 있다.

회차마다 다루는 결정의 종류가 다르다.

- **1회차.** 가설과 핵심 결과를 7-슬롯에 거칠게 박는다. 대부분의 칸은 `[DATA NEEDED]` 또는 `[HYPOTHESIS]` 마커로 남는다.
- **2-3회차.** 그림과 표를 슬롯에 끼워 넣는다. 이 단계에서 *빠진 실험*이 자주 드러난다. 추가 실험을 결정하는 시점이 보통 여기다.
- **4-5회차.** subheading을 claim-style로 다듬고, 슬롯 사이의 흐름을 점검한다.

회차 사이에 24시간 이상 간격을 둔다. 같은 날 두 번 다듬으면 *직전 결정의 잔상*이 새 결정에 끼어든다. 거리 두기가 outline iteration의 일부라는 입장이다.

---

## 17.4 미발표 결과는 존재하지 않는 것과 같다

Whitesides가 §I에 적은 표현은 강하다. "Interesting and unpublished is equivalent to nonexistent." 흥미롭지만 발표되지 않은 결과는 존재하지 않는 것과 같다는 선언이다.

이 진단의 함의는 outline 단계에 직접 작용한다. 모든 데이터를 한 논문에 우겨넣으려는 충동을 줄이라는 권고다. outline에서 *이번 논문에 들어가지 않을 결과*를 명시적으로 빼내고, 다음 논문의 씨앗으로 따로 보관한다.

기준은 단순하다. 핵심 가설과 가장 잘 맞물리는 결과만 남기고, 나머지는 다음 outline의 1회차로 미룬다. Whitesides는 이를 "good science is opportunistic and revisionist"로 적었다.

---

## 17.5 Whitesides와 Schimel — 층위가 다르다

Whitesides의 outline-first 방법과 [Joshua Schimel의 *Writing Science* (2012)](https://global.oup.com/academic/product/writing-science-9780199760244)의 story-first 방법이 충돌한다는 인상을 받는 학생이 있다. Whitesides는 데이터에서 올라오는 bottom-up scaffold를, Schimel은 narrative arc(OCAR/ABDCE)를 먼저 권한다는 차이에서다.

둘은 경쟁 관계가 아니라 층위가 다르다. Whitesides는 골조(slot 단위)를 짜고, Schimel은 그 골조 위에 올라가는 hook과 흐름을 설계한다. outline 1-2회차는 Whitesides의 7-슬롯으로 시작하고, 4-5회차에 들어갈 때 Schimel의 narrative arc 관점으로 점검하는 순서가 합리적이다.

층위가 다르다는 입장의 근거는 Whitesides 자신이 §II에서 "good papers tell stories"를 인정했다는 점이다. 다만 그가 권하는 시작점이 outline scaffold라는 차이일 뿐이다.

---

## 17.6 KISS-ICP의 도입을 따라 써 보기

[KISS-ICP (Vizzo et al., RA-L 2023)](https://arxiv.org/abs/2209.15397)의 Introduction 첫 단락은 Whitesides의 5요소가 어떻게 채워지는지 보여 주는 사례다. (a) objective는 "robust LiDAR odometry without learning", (b) justification은 "단순함이 generality를 낳는다", (c) background는 ICP 계열의 기존 한계, (d) reader guidance는 "we show that point-to-point ICP, configured carefully, suffices", (e) summary preview는 KITTI/MulRan에서 SOTA에 근접한다는 한 줄.

Part 3의 [`kiss_icp_intro_hook.md`](./excerpts/excerpt_01_kiss_icp_intro_hook.md)에 발췌와 분석이 들어 있다. outline scaffold가 글로 변환되는 사례를 한 번 따라 써 보는 것 — 이 장의 마지막 권고다.

---

**출처.** [Whitesides 2004](https://onlinelibrary.wiley.com/doi/10.1002/adma.200400767) §I outline structure, §II actionable rules. [Mensh & Kording 2017](https://doi.org/10.1371/journal.pcbi.1005619) rule 9 (연결). [Schimel 2012](https://global.oup.com/academic/product/writing-science-9780199760244) (사이드바 비교용). 24h cooldown과 KISS-ICP 적용은 본문에서 정리.

# Ch.18 — 시간 배분과 피드백 루프

Method 섹션을 두 달 다듬은 학생이 reviewer로부터 abstract만 보고 reject된 코멘트를 받는 일은 흔하다. 가장 많이 읽히는 부분과 가장 많이 다듬은 부분이 어긋난 결과다. [Mensh & Kording 2017](https://doi.org/10.1371/journal.pcbi.1005619)의 rule 9와 rule 10이 이 어긋남을 정면으로 다룬다.

---

## 18.1 가장 많이 읽히는 것에 가장 많이 투자한다

논문 한 편이 받는 독자 수를 거칠게 풀어 보면 다음과 비슷하다. 1000명이 title을 보고, 그중 100명이 abstract로 내려가고, 다시 50명이 figure 1까지 내려간다. method까지 도달하는 인원은 5명 안팎이다. Mensh-Kording rule 9는 글쓰기 시간을 이 깔때기에 비례해 배분하라고 적었다.

시간 우선순위는 다음 순서로 잡힌다.

> Title > Abstract > Figure(특히 Fig 1) > Outline > Introduction > Results > Discussion > Method > Related Work

Method가 가장 적게 읽히는 부분이라는 사실이 Method를 *부정확하게* 써도 된다는 뜻은 아니다. 정확성은 유지하되 윤문에 시간을 쓰지 말라는 권고에 가깝다. Method의 목적은 재현이지 설득이 아니다.

---

## 18.2 비율 가이드

논문 한 편의 글쓰기 시간을 100%로 보면 다음 비율이 작업 가능한 출발점 하나다.

| 항목 | 비율 |
|---|---|
| Title + Abstract | 15-20% |
| Figures (특히 Fig 1과 main result figure) | 25-30% |
| Outline iteration ([Ch.2](./chapter_17_outline_first.md)) | 15-20% |
| Introduction | 15% |
| Results & Discussion | 10-15% |
| Method + 부록 | 5-10% |

한국 대학원생에게서 흔히 잡히는 패턴은 Method에 50% 이상이 들어가고 Title·Abstract·Figure에 합쳐 10%가 들어가는 정반대 비율이다. 학부 글쓰기 훈련의 후유증인 부분이 있다. 학부 시험 답안에서는 풀이 과정이 점수를 받았다. 논문은 다르다 — 풀이 과정은 결과를 정당화하는 보조 자료로 들어간다.

---

## 18.3 Test reader 프로토콜

rule 10은 "reduce, reuse, recycle"의 reduce 쪽에 무게를 둔다. 같은 사람에게 여러 번 보여 주지 말라는 권고다. 한 번 본 사람의 머릿속에는 이미 *글쓴이가 의도한 구조*가 박혀 있고, 두 번째 읽기에서는 그 구조를 채워 넣으면서 읽는다. 신선한 독자가 잡아내는 결함을 두 번째 reader는 잡지 못한다.

단계별로 reader를 분리한다.

- **Outline 단계** — 같은 분야 동료 1명. 구조가 말이 되는지를 검증한다.
- **초고 단계** — 다른 세부 분야 동료 1명. gap funnel이 자기 분야 밖에서도 작동하는지 검증한다.
- **수정 단계** — 비전공 대학원생 1명. abstract만 보여 주고 "이 논문이 무엇을 푸는지 한 문장으로 말해 달라"고 요청한다.

reader에게 던지는 질문이 *닫힌 질문*("이 부분 괜찮아?")이면 답변도 닫힌 채로 돌아온다. *재구성 요청*("이 논문이 무슨 문제를 푸는지 한 문장으로 말해 주세요")이 진단에 훨씬 정보가 많다.

---

## 18.4 "Non-specific feedback"의 진단

reader에게서 막연한 답("좋네요", "뭔가 어렵다", "잘 모르겠다")이 돌아오면 *큰 그림 실패* 신호다. 단어 수준이 아니라 구조 수준에서 결함이 있다는 뜻이다. 이 경우 단어를 고치는 대응이 가장 흔한 함정이다. 단어를 다듬어도 구조가 그대로면 다음 reader도 같은 막연한 답을 돌려준다.

진단 분기는 다음과 같다.

- "abstract만 보고 무슨 논문인지 모르겠다" — Title·Abstract 전면 재작업. [ch07](./chapter_22_title_abstract.md)에서 다룬다.
- "왜 이게 중요한지 모르겠다" — Introduction의 gap funnel 결함. [ch08](./chapter_23_introduction.md)에서 진단법을 다룬다.
- "Method는 알겠는데 결과가 와닿지 않는다" — Results의 declarative subheading 결함. [ch11](./chapter_26_results_discussion.md)에서 처방한다.

각 분기는 *구조 단위의 재작업*을 요구한다. 단어 수준에서 멈추면 같은 reject가 반복된다.

---

## 18.5 피드백 루프의 빈도와 cooldown

Outline iteration 사이 24시간 cooldown은 [Ch.2 §3](./chapter_17_outline_first.md)에 적었다. 같은 원리가 초고 → 수정 사이에도 작동한다 — 최소 48시간을 권한다. 그제서야 글쓴이의 머리가 *직전에 쓴 문장의 잔상*에서 풀려난다.

마감 직전에 *새로운 reader*를 투입하지는 않는다. 신선한 reader는 신선한 결함을 잡아내지만, 마감 시점에 그 결함을 모두 처리할 시간이 없다. 처리하지 못한 결함은 글쓴이의 머리에 남아 공황을 만든다. 마감 일주일 전부터는 *이미 한 번 본 reader*에게 같은 글을 다시 보여 줘서 마이너 결함만 잡는 방식이 안전하다.

---

## 18.6 점검 가능한 부분

이 장의 권고 중 일부는 체크리스트로 반복 점검할 수 있다. 섹션별 수정 횟수의 불균형, abstract보다 Method만 계속 고치는 패턴, 피드백이 단어 수준에만 머무는 패턴은 §1 우선순위 위반의 신호다. 단락 수준 결함은 비교적 빨리 보이지만, 섹션·논문 스케일의 결함은 반드시 reader를 바꿔 다시 봐야 한다.

---

**출처.** [Mensh & Kording 2017](https://doi.org/10.1371/journal.pcbi.1005619) rule 9 (시간 배분), rule 10 (피드백 루프). [Whitesides 2004](https://onlinelibrary.wiley.com/doi/10.1002/adma.200400767) (cooldown 정신 차용). 비율 수치, 단계별 reader 분리, 진단 분기, 마감 cooldown은 이 장에서 정리했다.

# Ch.19 — CCC: 단락·섹션·논문의 fractal

한 단락도 잘 닫지 못하는 학생이 논문 전체를 닫아야 한다는 요구를 받는다. 닫는 문제가 같은 형태로 세 번 반복된다는 점만 보이면 처방은 한 가지로 줄어든다. [Mensh & Kording 2017](https://doi.org/10.1371/journal.pcbi.1005619) rule 3이 그 한 가지를 맥락-Content-Conclusion(CCC)으로 정식화했다.

---

## 19.1 독자의 두 질문

독자가 한 단락 또는 한 섹션을 읽기 시작할 때 두 가지 질문을 동시에 던진다. "왜 이걸 읽고 있지?"와 "그래서 어쩌라고?"다. 앞 질문은 context의 부재가 만들고, 뒤 질문은 conclusion의 부재가 만든다. CCC가 두 질문에 동시에 답하는 최소 골격이다.

신입생들이 자연스럽게 따라가는 구조는 시간순(chronological)이다. "처음에 A를 시도했는데 실패했고, 그래서 B로 갔는데 이건 또 다른 문제가 있어서, 결국 C에 도달했다." 이 구조는 lab notebook에는 적합하지만 논문에는 main failure mode다. Mensh-Kording이 §"chronological structure is the main failure mode"에 적은 표현 그대로다. 독자는 글쓴이가 결과에 도달한 시간 순서를 신경 쓰지 않는다.

CCC가 시간순의 대안으로 들어선다. 첫 문장에서 context를 박고, 본문에서 novel content를 풀고, 마지막 문장에서 takeaway를 닫는다. 시간순이 *과정*을 그대로 노출한다면, CCC는 *과정의 결과*만 전달한다.

---

## 19.2 3-scale fractal

같은 패턴이 단락·섹션·논문 세 스케일에 그대로 반복된다.

- **단락.** 첫 문장 = topic/context. 가운데 문장들 = novel content. 마지막 문장 = takeaway.
- **섹션.** 도입 1단락 = 섹션의 목적과 위치. 본문 단락들 = develop. 마무리 단락 = land.
- **논문 전체.** Introduction = context. Results = content. Discussion = conclusion.

세 스케일 어느 한 곳이라도 깨지면 fractal이 무너진다. 단락이 잘 닫혀 있어도 섹션이 시간순이면 독자는 길을 잃는다. 섹션이 CCC를 따라가도 단락마다 첫 문장이 결과로 시작하면 독자는 매번 "왜 이걸 읽지?"를 다시 묻는다.

3-scale은 단순한 비유가 아니다. 같은 골격을 세 번 반복하면 독자의 working memory가 같은 패턴 인식만으로 논문 전체를 따라간다. 패턴이 매 스케일에서 일치할 때 인식 비용이 가장 낮다.

---

## 19.3 Abstract — full CCC self-contained

Abstract는 세 요소 모두를 한 단위 안에 담는 유일한 섹션이다. 한 문단 안에 context와 content와 conclusion이 모두 있어야 한다. Mensh-Kording rule 5는 이를 "key fits its lock" 비유로 적었다. 결과(key)가 갭(lock)에 정확히 들어맞아야 abstract가 완성된다는 뜻이다.

이 비유의 함의는 작업 순서에 있다. abstract를 처음에 쓰면 lock(갭)이 흔들리는 동안 key를 깎는 일이 된다. 본문이 안정된 뒤에 abstract를 쓰는 [Whitesides의 권고](./chapter_17_outline_first.md)와 같은 결론에서 만난다.

Abstract의 self-contained 성격은 다른 섹션과의 차이도 만든다. 섹션 단위에서는 다음 섹션의 도입이 이전 섹션의 결론을 이어받지만, abstract는 자기 안에서만 닫혀야 한다. 외부 참조가 abstract에 들어가면 self-contained 조건이 깨진다.

---

## 19.4 Tension — 문장 stress vs 단락 CCC

[Gopen & Swan 1990](https://www.americanscientist.org/sites/americanscientist.org/files/20053191534_306.pdf)이 §stress position에 적은 규칙은 *새 정보는 문장 끝*이다. Mensh-Kording rule 3은 *takeaway는 단락 끝*이다. 같은 "끝"을 다른 두 스케일에서 노린다. 학생들이 충돌처럼 받아들이는 지점이지만 충돌은 아니다.

같은 원리가 두 스케일에 적용된 결과로 보는 쪽이 정확하다. 독자의 기대가 *끝에서 충족된다*는 한 원리가 sentence와 paragraph 양쪽에 작동한다. 단락의 마지막 문장 안에서도 stress position 규칙은 그대로 살아 있고, 그 마지막 문장의 끝에 단락 전체의 takeaway가 놓인다.

이 책의 입장은 둘 다 끝을 노린다는 한 줄로 정리된다. 스케일이 다르고 끝이 가리키는 단위도 다르지만, 독자의 기대 방향은 같다 — 충돌하지 않는 두 규칙이 같은 문장 끝에서 만난다.

---

## 19.5 흔한 실수 5종

CCC가 깨지는 패턴은 비교적 정형화되어 있다.

- 단락 첫 문장에 결과부터 박는 경우 — context 슬롯이 비어 있고, 독자는 "왜 이걸 읽지?"를 묻는다.
- 단락 마지막 문장이 다음 단락의 도입으로 새는 경우 — conclusion 칸에 transition을 두면 takeaway가 사라진다. 가장 빈번한 결함이다.
- 섹션 도입 단락 없이 §2.1로 바로 진입하는 경우 — 섹션 스케일의 context가 비어 있다.
- Discussion에 새 결과가 등장하는 경우 — content 스케일과 conclusion 스케일이 섞인다. Discussion은 새 결과를 두는 곳이 아니다.
- Conclusion이 Results의 요약인 경우 — [Ch.5](./chapter_20_subheadings_and_conclusions.md)에서 따로 다룬다.

이 다섯은 체크리스트로 반복 점검할 수 있다. 단락 단위 결함은 비교적 빨리 보이지만, 섹션·논문 스케일의 결함은 결국 사람의 진단이 필요하다.

---

**출처.** [Mensh & Kording 2017](https://doi.org/10.1371/journal.pcbi.1005619) rule 3·4·5. [Gopen & Swan 1990](https://www.americanscientist.org/sites/americanscientist.org/files/20053191534_306.pdf) (stress position). tension 화해 입장은 이 장에서 정리했다.

# Ch.20 — 정보가 담긴 소제목과 결론 ≠ 요약

논문 본문을 끝까지 읽는 독자는 소수다. 다수는 소제목만 훑고 figure로 내려간다. 그래서 그 다수에게 논문의 main message가 전달되려면 소제목 자체에 주장이 박혀 있어야 한다. [Whitesides 2004](https://onlinelibrary.wiley.com/doi/10.1002/adma.200400767) §III가 이 점을 정면으로 짚는다.

---

## 20.1 헤딩이 claim을 가져야 하는 이유

skim 패턴의 독자는 본문을 읽지 않고 소제목과 figure caption만 본다. 이 독자에게 "Loop Closure Experiments"라는 헤딩은 정보가 0이다. 같은 곳에 "Loop closure recall improves 14% with multi-scale BEV"가 들어가면, 그제서야 그 한 줄로 main message가 전달된다.

heading은 자동 생성되는 TOC다. 그리고 그 TOC가 곧 논문의 골격이다. Whitesides가 §III에 적은 권고를 다른 표현으로 옮기면 *heading만 읽어도 논문의 main message가 재구성되어야 한다*가 된다. 이 조건이 깨진 논문은 skim 단계에서 reject 사유를 만든다.

topic-style heading("Network Architecture", "Ablation Study")은 분야의 관행으로 굳어 있어 거부감이 적다. 다만 그 관행이 정보 전달의 기회를 놓치고 있다는 진단이 Whitesides의 입장이다.

---

## 20.2 Before / After 5쌍

로보틱스 분야 헤딩 5쌍을 비교하면 패턴이 보인다.

| Before (topic) | After (claim) |
|---|---|
| Loop Closure Experiments | **Loop closure recall improves 14% with multi-scale BEV** |
| Ablation Study | **Removing geometric prior degrades RTE by 38% on KITTI-08** |
| Comparison with Baselines | **Our method matches LIO-SAM accuracy at 1/3 the runtime** |
| Network Architecture | **A two-branch encoder separates appearance from geometry** |
| Dataset and Metrics | **We evaluate on KITTI-360 and VIVID with rotation/translation error** |

After 쪽 다섯 헤딩의 공통점은 동사·숫자·대상이 명시되어 있다는 점이다. "improves 14%", "degrades RTE by 38%", "matches at 1/3 runtime", "separates appearance from geometry"가 한 줄에 박혔다. 동사가 빠진 명사구만 남으면 헤딩은 정보를 잃는다.

---

## 20.3 작성 절차 3단계

claim-style 헤딩 한 줄을 만드는 절차는 다음과 같다.

1. 본문 핵심 결론을 한 문장으로 적는다.
2. 명사구가 아니라 SVO로 다듬는다. Whitesides §III의 *no nouns as adjectives* 규칙이 여기에 작동한다. "ATP formation"이 아니라 "formation of ATP"가 권장 형태다.
3. 길이를 60-80자 사이로 자른다. 90자가 넘으면 헤딩이 단락처럼 읽히고, 30자 아래로 내려가면 정보량이 부족하다.

이 절차는 outline iteration 4-5회차에 들어가는 작업이다. 1-3회차에서는 헤딩이 placeholder로 남아 있어도 된다. claim-style로 다듬는 작업은 본문 결론이 안정된 뒤에야 비로소 의미가 있다.

---

## 20.4 Conclusions ≠ Summary

Conclusions 섹션에 Results의 숫자를 다시 나열하는 패턴이 가장 흔한 결함이다. "In summary, we showed A, B, and C."로 시작하는 Conclusions는 abstract와 Results에 이미 있는 정보를 한 번 더 반복한다. 독자에게 새 정보가 0이다.

Whitesides가 §III에 적은 정의는 명확하다. Conclusions는 *higher-level analysis*다. 결과들이 합쳐 무엇을 말하는지, 분야에 어떻게 기여하는지, 어떤 가설이 살아남고 어떤 가설이 죽었는지가 들어간다. 형태는 "목록 of short phrases"고, 각 phrase는 새로운 통찰이어야 한다.

Discussion 섹션이 별도로 있는 논문이라면 Conclusions는 더 짧아진다 — 3-5 phrase 정도가 적정선이다. Discussion이 없는 venue 형식이라면 Conclusions가 그 역할을 흡수해 길어진다. 어느 쪽이든 Results의 요약이 들어가서는 안 된다는 점은 같다.

---

## 20.5 흔한 실수

Conclusions·heading 양쪽에서 반복되는 실수는 다음과 같다.

- "In summary, we showed A, B, and C." — A·B·C는 이미 abstract와 Results에 있다. 한 단계 위로 올라가지 않았다.
- Conclusions에 future work 한 줄만 달랑 쓰는 경우 — higher-level analysis가 비어 있다. future work는 Conclusions의 *마지막 phrase*지 *전부*가 아니다.
- 헤딩 길이가 들쭉날쭉한 경우 — 한 섹션 안에 10자 헤딩과 90자 헤딩이 섞이면 평행성이 깨진다. 같은 스케일의 헤딩은 길이가 비슷해야 skim에서 리듬이 살아난다.
- claim-style 헤딩에서 동사가 빠지는 경우 — "BEV-based Loop Closure"는 명사구다. claim이 되려면 동사가 들어가야 한다.

---

## 20.6 점검 절차

claim-style 헤딩은 본문 한 섹션에서 결론 문장을 먼저 추출한 뒤 만든다. 그 문장을 SVO로 다듬고, 길이 제약 안에서 잘라 내며, 같은 섹션 안의 헤딩 길이와 문장 구조를 맞춘다. outline iteration 후반부에서 사람이 손으로 반복해야 하는 절차다.

---

**출처.** [Whitesides 2004](https://onlinelibrary.wiley.com/doi/10.1002/adma.200400767) §III (information-rich subheadings, conclusions as higher-level analysis). [Mensh & Kording 2017](https://doi.org/10.1371/journal.pcbi.1005619) rule 7 (declarative statements, 보조). 로보틱스 5쌍은 이 장에서 정리했다.

# Ch.21 — 문단 흐름

문장 단위는 다듬었는데 한 문단을 읽으면 흐름이 끊긴다고 느끼는 학생이 있다. 같은 단락의 문장 다섯을 따로따로 보면 다 멀쩡한데, 이어 붙이면 어딘가가 어긋난다. 그 어긋남의 정체가 ch14가 다룬 stress·topic 5원칙의 *paragraph 층위*다.

[Gopen & Swan 1990](https://www.americanscientist.org/article/the-science-of-scientific-writing) §III가 한 줄로 박아 둔다. *old before new*. 한 문장 안에서 작동하는 이 원칙이 한 문단 안에서도 같은 형태로 작동한다는 진단이다. ch04의 CCC가 *어디에* 무엇이 들어가는가의 자리표라면, 이 장은 *어떻게 흐르는가*의 흐름표다.

---

## 21.1 두 층위가 동시에 작동한다

한 문단을 읽는 독자의 working memory는 두 층위를 동시에 받는다. 문장 층위에서는 topic position(첫 자리)이 backward link를 걸고 stress position(끝 자리)이 새 정보를 받는다. 문단 층위에서는 첫 문장이 단락의 진입점이 되고 마지막 문장이 takeaway를 받는다.

두 층위가 같은 패턴(old → new)을 공유한다. 잘 굴러가는 문단은 두 곳에서 *같은* 인지 부담만을 요구한다. 한 층위가 깨지면 독자는 매 문장에서 *왜 이 정보가 지금 들어오는지*를 다시 추측해야 한다. 그 추측이 누적되면 문단 끝에 도달했을 때 *takeaway가 무엇이었는지*가 흐려진다.

학생들이 가장 자주 어기는 곳이 paragraph 층위다. 문장 단위는 ch14의 5원칙으로 어느 정도 다듬어지지만, 문장 사이를 *어떻게 묶는가*는 별도의 작업으로 인식되지 않은 채 남는 경우가 많다.

---

## 21.2 Topic chain — 문장 간 backward link

**각 문장의 *첫 명사구*가 앞 문장의 어딘가와 연결되어야 한다.** 직전 문장의 stress position에 등장한 명사구가 다음 문장의 topic position을 받는 패턴이 가장 자연스럽다.

> ❌ The proposed method achieves 14% improvement on KITTI. Many sequences are challenging due to dynamic objects. Loop closure is critical.
>
> ✓ The proposed method achieves 14% improvement on KITTI. The improvement holds across sequences with dynamic objects, where loop closure is most critical.

❌ 쪽은 세 문장의 첫 명사구가 *the proposed method · many sequences · loop closure*로 끊긴다. 연결이 0이다. ✓ 쪽은 *the proposed method → the improvement → where loop closure*로 backward link가 한 줄로 이어진다.

**첫 명사구는 새 명사가 아니라 직전에 등장한 명사·대명사·요약 명사구로.** "this", "the result", "such configurations" 같은 요약 명사구가 backward link를 만드는 도구다.

---

## 21.3 Stress chain — 새 정보의 누적

**문장 끝(stress position)의 새 정보가 다음 문장 첫 자리(topic position)로 흘러간다.** 이 *받기*가 깨지면 단락 안에서 정보가 누적되지 않는다.

> ✓ Geometric ICP failed on textureless walls. These walls dominate indoor scans, where photometric gradients are weak. Weak gradients motivate hybrid methods.

세 문장의 stress가 각각 *textureless walls · weak gradients · hybrid methods*. 다음 문장의 topic이 직전 stress를 받아 단락이 한 방향으로 흐른다. 단락의 마지막 stress에 *hybrid methods*가 도달했을 때, 그 끝점이 단락 전체의 takeaway 후보로 잡힌다 — ch04 §1의 conclusion 위치와 정확히 일치한다.

**매 문장 끝에 보일러플레이트가 들어서면 stress chain이 비어 있다.** "in this paper", "of our approach" 같은 표현이 매 문장 stress를 차지하면 *어느 자리에 새 정보가 박혔는지*가 흐려진다. ch14의 stress position 진단과 같은 축.

---

## 21.4 흔한 결함 4종

**Topic 끊김.** 문장 첫 자리에 새 명사가 연속으로 등장. backward link 0. 진단법 — 한 단락의 첫 명사구만 추출해 한 줄로 나열, 그 줄이 흐르는지 본다.

**Stress 흩뿌리기.** 매 문장 끝에 보일러플레이트가 점유. 새 정보가 어디에 있는지 흐릿. 진단법 — 한 단락의 마지막 명사구만 추출해 한 줄로, 새 정보가 누적되는지 본다.

**메시지 둘.** 한 단락에 takeaway 후보가 둘. ch04 §5의 흔한 실수 첫 항과 같은 결함. 쪼갠다.

**접속사 남발.** "However", "Moreover", "Therefore"를 매 문장 첫 자리에 박는 패턴. backward link를 *접속사*가 대체하면 topic chain이 비어 있다는 증거. 접속사는 한 단락에 한두 번이 상한.

---

## 21.5 자기 진단 — 두 줄 추출법

자기 단락 한 토막을 가지고 다음 두 작업을 돌려 본다.

1. 각 문장의 *첫 명사구*만 추출해 한 줄로 나열. 이 줄이 topic chain.
2. 각 문장의 *마지막 명사구*만 추출해 한 줄. 이 줄이 stress chain.

두 줄을 나란히 놓는다. topic chain이 끊기지 않고 흐르는가. stress chain이 새 정보를 누적하는가. 둘 중 하나라도 깨지면 그곳이 흐름 결함이 박힌 곳이다.

ch14의 reverse-read 진단(자기 문장 단위)이 paragraph 층위로 격상된 도구. 같은 도구를 *읽기* 측면에서 적용한 글이 [Part 1 ch07 reader expectations 진단](./chapter_12_reader_expectations_diagnosis.md)이다. 쓰기와 읽기 양쪽에서 같은 두 줄 추출이 작동한다.

---

## 21.6 CCC와의 관계

ch04의 CCC가 *자리표*라면 ch06은 *흐름표*다. 두 관점이 충돌하지 않고 보완한다.

CCC 골격이 잡힌 단락도 topic chain·stress chain이 무너질 수 있다. 첫 문장에 context가 잘 박혀 있어도, 그다음 문장의 topic이 첫 문장 stress를 *받지 않으면* 흐름이 깨진다. CCC가 깨진 단락은 두 줄 추출에서 stress chain의 마지막이 *takeaway가 아닌 단어*에 도달한다.

두 진단은 순서로 적용한다. CCC 자리표를 먼저 확인하고, 칸이 채워졌으면 두 줄 추출로 흐름을 검증한다. 칸이 비어 있는데 흐름부터 다듬으면 빈 칸이 그대로 남는다.

---

**출처.** [Gopen & Swan 1990](https://www.americanscientist.org/article/the-science-of-scientific-writing) §III — *old before new*가 paragraph 층위에도 작동. [Mensh & Kording 2017](https://doi.org/10.1371/journal.pcbi.1005619) rule 3 연결. 두 층위 통합 관점과 두 줄 추출 진단법은 이 장에서 정리했다.

# Ch.22 — 제목과 초록

한 reviewer가 한 학회에서 받는 manuscript 5-10편 중 다수가 *제목만으로* 1차 분류된다. 그 분류를 통과한 paper는 다음 단계에서 abstract 한 paragraph 안에서 verdict의 큰 뼈대를 받는다. 제목과 초록은 본문에 도달하기 위한 *입장권*이다.

[Whitesides 2004](https://onlinelibrary.wiley.com/doi/10.1002/adma.200400767) §IV가 둘을 한 묶음으로 다룬 이유도 이 비대칭에서 나온다. [Mensh & Kording 2017](https://doi.org/10.1371/journal.pcbi.1005619) rule 1과 rule 5가 각각 제목과 초록의 골격을 정의해 둔다. ch01 §6의 readership-weighted budget이 둘에 가장 큰 시간 비중을 할당하라고 권하는 것도 같은 이유다.

---

## 22.1 Title — contribution 한 문장

**제목은 한 문장으로 압축한 contribution이다.** Mensh-Kording rule 1의 정식화. 본인 논문이 분야에 *무엇을 더했는가*가 제목 한 줄로 추출되어야 한다.

**동사가 들어가야 contribution이 산다.** "BEV-based Loop Closure"는 명사구일 뿐이다. 그 명사구가 *무엇을 했는가*는 본문을 읽어야 알 수 있다. "BEV-based loop closure halves recall failures on KITTI"는 동사·숫자·대상이 박혀 있다. ch05 §3의 헤딩 작성 절차와 같은 축.

**길이 권고는 12-15 단어.** 너무 짧으면 contribution이 압축되지 않은 상태로 남고, 너무 길면 인덱싱·인용·자동화 분류기에서 손실이 생긴다. 분야 관행과 venue 한도 안에서.

**Keyword density.** contribution과 직결되는 keyword 2-3개가 제목에 들어가야 한다. 검색·인덱싱·자동 추천이 이 keyword를 입력으로 받는다.

---

## 22.2 Abstract — full CCC self-contained

**Abstract는 자기 안에서 닫혀야 한다.** Mensh-Kording rule 5가 *key fits its lock* 비유로 박았다. 결과(key)가 정확히 갭(lock)에 들어맞아야 abstract가 완성된다. ch04 §3에서 다룬 self-contained 조건과 같은 축.

**다섯 칸이 한 paragraph 안에 들어간다.**

1. **Field gap** — 분야 전체의 큰 빈틈 한 줄.
2. **Paper gap** — 본 논문이 메우는 정확한 자리 한 줄.
3. **Approach** — 그 자리를 어떻게 메우는가 한두 줄.
4. **Result** — 핵심 숫자. *수치 하나*가 강하게 박혀야 reviewer가 verdict의 뼈대를 받는다.
5. **Implication** — 분야에 무엇을 의미하는가 한 줄.

**외부 참조 금지.** "Fig. 3 shows …", "in Sec. 4 we …" 같은 본문 참조가 abstract에 들어가면 self-contained 조건이 깨진다. abstract만 떼어 *별도 manuscript*로 읽혔을 때 자족적이어야 한다.

**길이 권고는 150-250 단어.** venue별 한계 안에서. 너무 짧으면 다섯 칸이 압축 안 되고, 너무 길면 reviewer 입장에서 *본문을 미리 보는* 글이 된다.

---

## 22.3 작성 순서 — 본문이 안정된 뒤

**Abstract는 맨 마지막에 쓴다.** Whitesides §IV의 강한 권고. 본문이 흔들리는 동안 abstract를 깎으면 lock이 흔들리는 동안 key를 깎는 일. 본문 outline 4-5회차가 안정된 뒤, 그제서야 abstract 작업의 첫 칸이 열린다.

제목도 같은 시점에 있다. outline iteration 1-3회차에서는 placeholder로 남아 있어도 된다. claim style로 다듬는 작업은 본문 결론이 안정된 뒤에야 의미가 자란다 — ch05 §3의 작성 절차와 같은 관점.

**시간 배분.** ch01 §6의 readership-weighted budget을 그대로 따른다 — 제목에 한 시간, abstract에 두세 시간이 권장 비율이다. 본문 한 섹션에 8-10시간을 들이는 학생이 abstract에 30분을 쓰는 패턴이 흔하다. 그 비율이 reject 사유의 비율과 거의 정확히 반대로 작동한다.

---

## 22.4 arXiv 시대 — 자동화 pipeline의 first filter

[김기섭 교수 「연구길의 초입에서」](https://gsk1m.github.io/productivity/2024/05/25/entering-research.html)가 같은 문제를 *arXiv 자동화*의 관점으로 적었다.

> *"제목이 입력 pipeline의 first filter다. arXiv·alphaxiv·Google Scholar의 자동 추천·검색 분류기가 제목·초록 token을 보고 paper를 push할지 말지 결정한다."*

이 진단이 §1·§2의 권고에 한 층위를 더 얹는다. reviewer만이 first filter가 아니라는 입장이다. 자동화 분류기가 제목의 keyword density를 입력으로 받아 *어디로 push할지*를 결정한다. contribution keyword와 분야 keyword가 제목에 들어가야 자동화 층위를 통과한다.

**Abstract의 첫 1-2 문장은 자동 요약기·LLM 추천기의 입력 slice.** 그 첫 두 문장에 paper gap과 contribution이 와야 자동화 추천에서 *왜 이 paper가 추천되는가*가 살아남는다. abstract의 마지막에 contribution을 두고 첫 문장을 *분야 일반론*으로 시작하는 패턴이 가장 자주 손실되는 결함.

자동화 층위는 분야 reviewer가 작동하는 층위와 *방향이 같다*. 둘 다 first filter에서 contribution keyword와 paper gap을 본다. 자동화에 맞추는 작업이 reviewer에 맞추는 작업과 정렬된다.

---

## 22.5 흔한 실수 4종

**제목이 명사구만.** "A New Method for Loop Closure"는 동사가 없어 contribution이 *암시*만 된다. reviewer가 본문을 읽어야 contribution이 추출되는 결함.

**Abstract가 본문 도입처럼.** context만 길게 늘이고 result number가 들어가지 않는 패턴. *수치 하나*가 abstract에 박히지 않으면 self-contained 조건이 깨진다.

**Abstract에 외부 참조.** 본문의 figure·section을 가리키는 reference가 들어가면 곧 self-contained 위반.

**제목에 두 contribution.** 첫 논문이면 contribution이 한 줄로 압축되지 않은 시점. ch01 §1의 *하나의 논문에는 하나의 메시지* 권고와 같은 관점. contribution 둘이 제목에 동시에 박히면 두 곳에서 reject 사유가 자란다.

---

**출처.** [Whitesides 2004](https://onlinelibrary.wiley.com/doi/10.1002/adma.200400767) §IV — abstract 작성 순서·자기완결성. [Mensh & Kording 2017](https://doi.org/10.1371/journal.pcbi.1005619) rule 1 (제목 = contribution 한 문장) + rule 5 (abstract = key fits its lock). [김기섭 교수 「연구길의 초입에서」](https://gsk1m.github.io/productivity/2024/05/25/entering-research.html) — arXiv 자동화·제목 first filter. 흔한 실수 4종은 이 장에서 정리했다.

# Ch.23 — Introduction 해부: gap funnel과 Whitesides 5요소

논문 1차 심사에서 reviewer가 verdict의 큰 뼈대를 잡는 곳 — Introduction이다. [Keshav (2007)](https://web.stanford.edu/class/ee384m/Handouts/HowtoReadPaper.pdf)이 정리한 1st pass에서 reviewer가 읽는 페이지는 첫 한 장이고, 그 한 장의 대부분이 Introduction이다. 이 사실이 Introduction의 비중을 정한다. Introduction이 흔들리면 method가 정확해도 verdict는 reject 쪽으로 기운다.

학생들이 가장 자주 하는 실수는 Introduction을 *Related Work의 축약본*으로 채우는 것이다. 인용을 줄줄 늘어놓고, 끝에서 "we propose …"로 점프한다. 이 형식은 reviewer 입장에서 *왜 이 논문이 존재하는지*에 답을 못 얻은 채로 contribution 문장에 도달하게 만든다.

해소는 두 프레임을 겹쳐 쓰는 데서 시작한다. [Whitesides 2004](https://onlinelibrary.wiley.com/doi/10.1002/adma.200400767) §III가 정리한 5요소 — 무엇이 들어가야 하는가의 자리표 — 와 [Mensh & Kording 2017](https://doi.org/10.1371/journal.pcbi.1005619) rule 6의 gap funnel — 어떤 순서로 좁혀 가는가의 흐름표 — 두 가지를 겹친다.

---

## 23.1 Whitesides 5요소 — slot 점검

Whitesides가 §III에 박은 다섯 칸은 다음과 같다.

1. **Objectives** — 무엇을 했는가. 한 문장으로 답할 수 있어야 한다.
2. **Justification** — 왜 했는가. objective의 동기.
3. **Background** — 독자가 알아야 하는 *최소* 사전 지식. textbook이 아니라 footnote 분량.
4. **Reader guidance** — 이 논문에서 무엇을 만나게 되는지. "In Sec. 2 we describe …".
5. **Summary preview** — 핵심 결과의 한 줄. abstract와 다른 함의로 작동.

다섯 칸 모두를 첫 1-2 단락에 욱여넣으라는 것이 Whitesides의 권고다. 그가 §II에서 "first paragraph in full early"를 강조한 이유도 첫 두 단락의 정보 밀도가 높기 때문이다. Introduction의 나머지는 이 5요소의 *부연*이지 새 정보가 아니다.

5요소 점검은 reviewer 시점에서 reverse-read로 한다. 자기 Introduction 첫 두 단락에서 다섯 칸이 한 줄씩 추출되는가. 추출이 안 되는 칸이 있다면 그 칸이 비어 있다는 뜻이다. 그중 가장 자주 빠지는 칸 — Reader guidance다.

---

## 23.2 Gap funnel — 3-tier nesting

5요소가 정적인 자리표라면, gap funnel은 동적인 깔때기다. Mensh & Kording rule 6이 Introduction의 흐름을 세 계단의 빈틈으로 정의했다.

- **Field gap**. 분야 전체가 풀지 못한 큰 문제. 한 줄.
- **Subfield gap**. 그 분야의 specific 영역에서의 한계. 한두 줄.
- **Paper gap**. 본 논문이 정확히 메우는 빈틈. 한 줄.
- **→ 기여**. 그 빈틈을 어떻게 메웠는가.

핵심은 빈틈이 *좁아진다*는 사실이다. field gap은 broad하게 시작하고, paper gap에서 한 점으로 수렴한다. reviewer가 이 깔때기를 따라 내려오면서 "이 논문이 정확히 어디를 메우는가"를 자연스럽게 받는다.

학생들이 가장 흔하게 어기는 칸 — paper gap이다. subfield gap에서 곧장 contribution으로 점프하면 깔때기 한 단이 비고, reviewer는 "왜 *이 방법*으로 메웠는가"를 본문 어디서도 못 얻는다. 가장 좁은 단이 비면 깔때기 전체가 무너진다.

---

## 23.3 한국어 mirror — 엄태웅 대표 6단

같은 흐름을 한국어 설명로 풀어낸 글이 [엄태웅 대표 G2 「영어 못해도 논문 잘 쓰는 법」](https://gradschoolstory.chkwon.net/terry/englishpaperwriting/)의 Introduction 6단이다.

> 1. 큰 문제 — 분야 전체가 푸는 문제.
> 2. 점진적 스코프 축소 — 그 분야 안에서 본 논문이 향하는 자리.
> 3. 선행 연구 — 그 자리에서 쌓인 시도들.
> 4. 한계 — 선행 연구가 풀지 못한 자리.
> 5. 본 연구 기여 — 한계를 메우는 본 논문의 시도.
> 6. 논문 구성 — 다음 섹션 안내.

이 6단이 §2의 gap funnel 3-tier(field → subfield → paper)와 §1의 Whitesides 5요소를 한 절차에 합친 한국어 적용 사례는다. 1·2·3·4가 gap funnel을 점진적으로 좁히고, 5가 contribution + summary preview를 채우고, 6이 Whitesides의 reader guidance 칸을 명시적으로 박는다. 한국어 문체가 빠뜨리지 않는 6번(논문 구성)이, 영어권 학생이 자주 누락하는 reader guidance와 정확히 같다.

엄태웅 대표가 같은 글에서 강조하는 비율이 *Intro에 노력의 40-50% 투자*다. 90%의 reviewer가 abstract와 Introduction에서 verdict의 큰 뼈대를 잡는다는 관찰이 그 비율의 근거다. ch01 §6에서 다룬 readership-weighted budget(Mensh-Kording R9)의 한국어 mirror로 읽으면 된다.

---

## 23.4 두 프레임의 매핑

5요소와 gap funnel은 경쟁이 아니라 중첩으로 작동한다.

| Whitesides 5요소 | Gap funnel 위치 |
|---|---|
| Background | Field gap + Subfield gap |
| Justification | Subfield gap → Paper gap |
| Objectives | Paper gap을 메우려는 시도의 명시 |
| Summary preview | 기여 |
| Reader guidance | (구조적 도움말, funnel과 별개 축) |

이 매핑이 작업 순서를 정한다. outline 단계에서 gap funnel로 *흐름*을 결정하고, draft 단계에서 5요소로 *칸*을 점검한다. 두 단계를 합치면 한쪽이 다른 쪽을 가린다.

---

## 23.5 사례 — KISS-ICP의 첫 단락

[KISS-ICP (Vizzo et al., RA-L 2023)](https://arxiv.org/abs/2209.15397)의 Introduction 첫 단락이 두 프레임을 한 호흡에 통과시킨다. field gap은 "LiDAR odometry는 풀린 문제처럼 보인다"로 열고, subfield gap은 "튜닝 지옥이다"로 좁힌다. 그러고는 paper gap이 "단순한 baseline이 부재하다"로 한 점에 모인다. 그 단락의 마지막 문장이 summary preview를 겸한다 — "we show that simple ICP is sufficient when carefully configured."

5요소도 같은 단락에서 다 채워진다. 칸도 정연하다. (a) objective는 "단순한 LiDAR odometry baseline 제시", (b) justification은 "단순함이 generality를 낳는다", (c) background는 ICP 계열의 기존 한계, (d) reader guidance는 다음 단락 시작에서, (e) summary preview는 첫 단락 마지막 문장에서.

발췌와 줄별 분석은 Part 3 [`kiss_icp_intro_hook.md`](./excerpts/excerpt_01_kiss_icp_intro_hook.md)에 있다.

---

## 23.6 흔한 실수 4종

**첫 문장이 trend 나열로 시작.** "Recently, deep learning has revolutionized …" 류. field gap이 아니라 *분야 분위기*로 시작하면 깔때기가 열리지 않는다. 첫 문장은 *문제*에서 연다.

**Background가 textbook 분량.** 3 단락 이상이면 background가 아니라 mini-survey다. Related Work 섹션이 따로 있다. Introduction의 background는 *paper gap을 이해하기 위한 최소량*만.

**Reader guidance 누락.** "In Sec. 2 we …" 한 단락이 통째로 빠진 Introduction이 흔하다. Whitesides가 5요소에 명시적으로 박아 둔 칸이다. 한 단락 또는 한 문장이라도 들어가야 한다.

**Objective와 기여이 같은 표현으로 반복.** 첫 단락의 objective 문장과 기여 절의 첫 항이 동일한 어구이면 둘 중 하나가 잉여다. objective는 *시도*를, contribution은 *결과*를 적는다.

---

**출처.** [Mensh & Kording 2017](https://doi.org/10.1371/journal.pcbi.1005619) rule 6 — gap funnel 3-tier nesting. [Whitesides 2004](https://onlinelibrary.wiley.com/doi/10.1002/adma.200400767) §II–§III — 5요소와 first-paragraph-in-full 권고. [Keshav 2007](https://web.stanford.edu/class/ee384m/Handouts/HowtoReadPaper.pdf) — 1st pass에서 Introduction의 비중. [엄태웅 대표 G2 「논문 잘 쓰는 법」](https://gradschoolstory.chkwon.net/terry/englishpaperwriting/) — Introduction 6단과 *노력의 40-50% Intro 투자* 비율. 두 프레임의 연결과 KISS-ICP 적용은 본문에서 정리.

# Ch.24 — Related Work: 분류와 비판의 자리

ch08의 Introduction이 *왜 이 논문이 존재하는가*에 답한다면, Related Work는 그 주변에 *누가 무엇을 시도했는가*에 답한다. 두 섹션이 함께 reviewer의 1차 verdict를 받는다. 두 섹션의 분담이 무너지면 한쪽이 *분야 분위기*만 늘어놓는 결함으로 수렴한다.

학생들이 가장 자주 빠지는 결함은 Related Work를 *연도순 인용 나열*로 채우는 것이다. "Smith et al. 2018 did A. Lee et al. 2019 did B. ..." 식으로 단락이 흐르면 reviewer 입장에서 *어떤 차원에서 비교하는가*가 안 보인다. 본인 방법이 어디에 위치하는지가 끝까지 안 잡히고, 이 결함이 단일 reject 사유로 잡힌다.

ch01 §1의 *reject의 complement* 관점이 여기에 직결된다. laundry 목록과 핵심 baseline 누락은 reject 사유로 가장 자주 잡히는 두 결함.

---

## 24.1 분류 axis — laundry 목록 회피

**Related Work의 골격은 분류 axis다.** 본인이 정한 axis 위에 prior work를 *위치*시키는 작업이 Related Work의 본 작업이다. axis가 잡히지 않은 채 인용을 나열하면 그것이 곧 laundry 목록.

**Axis 후보.** 분야마다 다르지만 로보틱스·CV에서 자주 등장하는 axis는 다음 네 종류다.

- 입력 modality — LiDAR · RGB · RGB-D · IMU 융합
- 표현 방식 — sparse · dense · neural field
- 학습 의존도 — geometric · learned · hybrid
- 적용 scenario — 실내 · 야외 · 동적 환경

**이차원 표.** axis 둘로 표를 잡는 것이 분야의 표준 적용 사례는다. 행이 한 axis(예: modality), 열이 다른 axis(예: 학습 의존도). 본인 방법이 표 위에서 *비어 있던 칸*에 들어가면 paper gap이 시각적으로 드러난다. ch08 §2의 paper gap이 표의 한 칸으로 보인다.

이차원 표를 Related Work 섹션에 한 컷 박는 패턴이 분야 reviewer 입장에서 가장 빠르게 *분류 완성도*를 받는다. 표 없이 본문만으로 axis를 전달하면 reviewer가 axis를 *추출*해야 한다.

---

## 24.2 비판의 강도 — 정확하되 정중히

**비판은 *방법의 한계*에 한정한다.** 저자에 대한 비난·저평가 금지. "Smith et al.'s approach is naive"는 reviewer 입장에서 *저자 비난*으로 읽힌다. "Smith et al.'s approach assumes static environments"가 *방법의 한계*에 한정한 표현이다.

**Vague phrasing 금지.** "may suffer from", "is limited in some scenarios", "could be improved" 같은 표현은 reject 사유로 가장 자주 잡히는 결함. 어떤 dataset의 어떤 시퀀스에서 어떤 metric이 얼마나 깨지는지 *수치*로 박는다.

> ❌ Method X may suffer from drift in long sequences.
>
> ✓ Method X reports 8.3% drift on KITTI sequence 09 (length 1700m), compared to 1.1% on shorter sequences.

✓ 쪽은 *어떤 sequence에서 얼마의 drift*가 박혀 있다. reviewer가 이 한 줄을 받으면 비판의 *근거*가 함께 들어온다.

**비판이 강할수록 근거가 강해야.** 본인 실험 또는 prior work의 보고된 한계를 인용. 근거 없이 비판이 강하면 reviewer가 *본인 방법의 우위를 만들기 위한 비뚤음*으로 의심한다.

---

## 24.3 핵심 baseline 누락의 비용

**본인 방법과 가장 가까운 baseline을 빠뜨리면 단일 reject 사유.** ch01 §1의 reject complement 축에서 가장 자주 잡히는 결함이다. Related Work에 등장하지 않은 baseline은 실험 섹션에서도 등장하지 않는 패턴이 함께 따라온다.

**최소선.** 본 분야에서 인용 많은 5편(분야 합의의 anchor)과 최근 1-2년 SOTA 3-5편이 기본. 두 그룹 다 다뤄야 reviewer가 *완성도*를 받는다. 한 그룹만 다루면 *고전 무시* 또는 *최신 무관심*으로 비뚤어 보인다.

**본인 lab self-citation 편중.** 본인 lab 논문만 골라 인용하는 패턴이 외부 reviewer 입장에서 *분야 합의*가 비뚤어 보이는 결함. self-citation은 *전체의 30% 미만*이 안전선.

분야별 사례는 [robotics-practice ch20 § 20.8.1](https://alexjunholee.github.io/robotics-practice/guide.html#2081-논문-쓰기-link)의 분야별 baseline catalog에 링크로 둔다. SLAM·detection·segmentation 분야별 핵심 5편 + 최근 SOTA 3편 목록이 그 링크에 있다.

---

## 24.4 흔한 실수 4종

**Laundry 목록.** 연도순 인용 나열. 분류 axis 부재. reviewer가 *어떤 차원에서 비교하는가*를 추출 못 함.

**핵심 baseline 누락.** 본인 방법과 1차 비교 대상이 빠짐. desk reject 사유.

**과대 비교.** "we outperform all prior work"를 Related Work에서 선언. 결과 섹션의 몫을 미리 가져온 형태. ch04 §5의 *content와 conclusion 스케일이 섞인다* 결함과 같은 축.

**Self-citation 편중.** 본인 lab 논문만 골라 인용. 분야 합의가 비뚤어 보임.

---

## 24.5 ch08과의 분담

ch08의 Introduction에서 paper gap이 한 줄로 박혔다면, Related Work는 그 paper gap의 *주변*을 본격적으로 펼친다. 두 섹션의 분담이 다음과 같이 작동한다.

| 항목 | Introduction (ch08) | Related Work (ch09) |
|---|---|---|
| 길이 | 1-2 단락 | 1-2 페이지 |
| 인용 수 | 5-10편 | 30-50편 |
| 골격 | gap funnel 3-tier | 분류 axis 이차원 |
| 비판 | 한 줄, 빈틈 명시만 | 본격, 수치 근거 |
| 본인 방법 | 한 문장 contribution | 표 위의 한 칸 |

이 분담이 무너지는 가장 흔한 패턴이 Introduction에 prior work 30편을 인용하는 결함이다. ch08 §6의 흔한 실수 *Background가 textbook 분량*과 같은 결함. Related Work를 별도 섹션으로 분리하지 않고 Introduction에 합치면 양쪽이 함께 무너진다.

---

**출처.** [Gopen & Swan 1990](https://www.americanscientist.org/article/the-science-of-scientific-writing) — paragraph 층위 흐름 (간접). 분야 standard 관점 — 이차원 axis 표·SOTA + 인용 5편 minimum. [robotics-practice ch20 § 20.8.1](https://alexjunholee.github.io/robotics-practice/guide.html#2081-논문-쓰기-link) — 분야별 baseline catalog. 흔한 실수 4종, 비판 강도 권고, 이차원 axis 표 합성은 이 장에서 정리했다.

# Ch.25 — 방법 섹션

[Mensh & Kording 2017](https://doi.org/10.1371/journal.pcbi.1005619) rule 9의 readership 순서에서 Method는 가장 적게 읽히는 섹션이다. 다만 그 적은 readership에 *재현성·정확성·공정성*에 대한 reviewer 검증이 집중된다. Method는 읽힐 때 작동한다 — 읽힐 준비가 안 되어 있으면 곧 reject 사유로 굳는다.

학생들이 가장 자주 빠지는 결함은 Method를 *시간순 lab notebook*으로 쓰는 것이다. ch04 §1의 chronological structure 결함과 같은 결, "처음에 X를 시도했는데 안 돼서 Y로 갔고, Y가 또 한계가 있어서 Z에 도달했다"가 본문에 그대로 나오는 패턴. 이 구조는 lab notebook에는 적합하지만 Method에는 main failure mode다.

---

## 25.1 Results-driven structure — 결과를 받기 위한 골격

**Method 섹션의 골격은 Results 섹션의 골격을 거꾸로 받는다.** [Whitesides 2004](https://onlinelibrary.wiley.com/doi/10.1002/adma.200400767) §V·§VI의 강한 권고. Results의 각 figure·table을 만든 procedure가 Method의 각 sub-section으로 이어진다.

이 관점이 작업 순서를 정한다. Results outline을 먼저 잡고, 그 outline에서 Method outline을 *역으로 추출*한다. ch11에서 다룰 main result table·ablation table·qualitative figure 각각이 Method 어느 sub-section과 짝지어지는지가 outline 단계에서 결정된다.

**Method의 sub-heading.** ch05의 claim style은 Method에서는 살짝 약화된다. "Section 3.1 Feature Extraction"보다 "Section 3.1 Multi-scale BEV feature extraction"이 정보 밀도가 높지만, Results의 sub-heading만큼 *결과*가 박힐 곳은 아니다. 명사·기법명 위주로.

---

## 25.2 Notation table — 추적 가능한 표기

**Method 도입에 notation table 한 컷.** 본문에 등장하는 모든 기호가 그 표 안에서 한 번 정의되어야 한다. 본문에 흩뿌려진 정의는 reviewer가 *처음 등장한 자리*를 backtrack하게 만든다.

**표 구성.** 다음 네 column이 기본이다.

| Symbol | Meaning | Dimension/Unit | First introduced |
|---|---|---|---|
| $\mathbf{T}_k$ | sensor pose at time $k$ | $SE(3)$ | §3.1 |
| $\mathbf{r}_i$ | reprojection residual for measurement $i$ | $\mathbb{R}^2$ | §3.2 |
| $\lambda$ | regularization weight | scalar | §3.3 |

**한 기호의 두 의미 금지.** $R$이 회전행렬·residual·reward로 동시에 쓰이는 논문이 흔하다. 한 기호 한 의미가 ch15 §1 R8에서 다룬 원칙이고, 강제력 있는 통일은 ch16의 매크로 위생에서 본격적으로 다룬다.

---

## 25.3 Algorithm pseudocode — 재현성을 받는 도구

**본 알고리즘은 pseudocode로.** algorithm2e LaTeX 환경이 분야 표준 — 자세한 LaTeX 도구는 [robotics-practice ch20 § 20.8.5](https://alexjunholee.github.io/robotics-practice/guide.html#2085-도구)에 링크로 둔다.

**Pseudocode 구조.**

- **Input** 한 줄. *어떤 데이터·어떤 hyperparameter*를 받는가.
- **Output** 한 줄. *어떤 결과·어떤 형태*로 반환하는가.
- **본문 step** 줄별로. 본문 수식이 등장하는 step에는 식 번호로 연결erence.

**계산 복잡도.** pseudocode 끝 또는 caption에 명시. $O(N)$인지 $O(N \log N)$인지 $O(N^2)$인지가 빠지면 reviewer가 *언급되지 않은 곳*에서 의심한다. runtime 보고가 빠른데 complexity가 안 적혀 있으면 *정말 빠른가*가 검증 불가로 남는다.

---

## 25.4 Hyperparameter table — 변인의 명시

**Hyperparameter는 모두 표로.** 본문에 흩뿌리면 reviewer가 추적 못 한다. "we use learning rate 1e-4 ... batch size 32 ... 그리고 또 ..."가 본문에 분산되어 있는 패턴이 가장 자주 결함으로 잡힌다.

**표 구성.** parameter · 값 · 의미 · 변경 시 영향 (sensitivity). 마지막 column이 ablation 섹션과 직결한다 — ch11의 ablation 표가 sensitivity column을 *검증한다*.

**Dataset별로 다른 hyperparameter.** dataset × parameter 이차원 표로. 한 hyperparameter가 dataset에 따라 다르면 *어떤 dataset에서 어떤 값이 기본인가*가 명시되어야 한다.

---

## 25.5 흔한 실수 5종

**시간순 흐름.** "처음에 X 시도, 실패, Y로 변경, 또 실패, Z 도달". lab notebook이지 Method가 아니다.

**Notation 흩뿌리기.** 본문에서 처음 등장한 자리에서만 정의. 다시 찾으려면 backtrack해야 한다. notation table 부재의 결함과 같은 축.

**Hyperparameter 본문 흩뿌리기.** 표 부재. reviewer가 셀 수 없다.

**Pseudocode 부재.** 본문 수식만으로 알고리즘 재현 시도. step 순서·loop 구조가 모호해진다.

**계산 복잡도 누락.** runtime 보고는 있는데 complexity가 없으면 reviewer가 *왜 빠른가*를 못 받는다.

---

## 25.6 ch11과의 짝짓기

Method의 each sub-section이 Results의 each sub-section과 짝지어진 형태에 도달하면, 두 섹션의 일관성이 reviewer 1차 검증을 통과하는 첫 조건으로 잡힌다. 짝짓기가 어긋나는 두 패턴이 가장 자주 결함으로 잡힌다.

- **Method에는 있는데 Results에는 없는 component.** "we use multi-scale fusion"이 Method §3.2에 있는데 Results의 어느 figure에서도 검증되지 않은 결함. ablation 부재로 이어진다 — ch11 §3.
- **Results에는 있는데 Method에는 없는 component.** Results §4에서 ablation 표에 "w/o geometric prior" row가 등장했는데 Method에는 geometric prior 정의가 없는 결함. notation·정의 누락.

두 패턴 모두 outline 단계에서 Method ↔ Results 짝짓기를 명시적으로 해 두면 사라진다. outline 4-5회차에서 각 sub-section 옆에 *짝* 표시를 다는 작업이 분야 reviewer가 작동하는 1차 검증을 *미리* 통과시키는 일이다.

---

# Ch.26 — 결과와 논의

Results와 Discussion이 별도 섹션이라는 사실이 신입생 입장에서 가장 자주 흐려지는 관점이다. *결과의 명시*와 *결과의 해석*이 한 섹션에 섞이면 reviewer 입장에서 어느 줄이 새 정보이고 어느 줄이 해석인지 추적이 안 된다. ch04 §5의 *content와 conclusion 스케일이 섞인다* 결함이 두 섹션 사이에서 가장 자주 발현한다.

[Mensh & Kording 2017](https://doi.org/10.1371/journal.pcbi.1005619) rule 5와 rule 8이 두 섹션의 분담을 정식화한다. Results는 figure·table·숫자가 박히는 곳, Discussion은 *왜 그런 결과가 나왔는가*와 *어디까지가 한계인가*를 받는 곳. 결국 새 결과는 Discussion에 들어가지 않는다는 한 줄이 두 섹션을 가르는 분기점이다.

---

## 26.1 Results의 골격 — Method를 거꾸로

**Results의 각 sub-section은 Method의 각 sub-section을 거꾸로 받는다.** ch10 §1에서 본 짝짓기의 출구. Method의 procedure가 Results의 figure·table을 만들고, 그 figure·table이 다시 Results의 sub-section 골격을 정한다.

**Default 골격 4단.**

1. **Main result vs SOTA 비교** — 핵심 비교 표. 본인 방법이 분야 SOTA 대비 어디에 있는가.
2. **Qualitative figure 1-2개** — 정량적 비교가 못 보여 주는 부분(궤적 시각화·실패 사례 비교 등).
3. **Ablation** — component별 효과 검증.
4. **Failure case** — 본인 방법이 깨지는 지점. limitation 섹션과 짝짓기.

**Sub-heading은 claim style.** ch05의 권고가 가장 강하게 작동하는 곳이 Results다. "Loop closure recall improves 14% with multi-scale BEV"가 sub-heading 한 줄에 박혀 있으면 skim 단계에서 main message가 그대로 전달된다.

---

## 26.2 Ablation — 변인 통제

**Ablation 부재는 단일 reject 사유.** 어떤 component가 어떤 효과를 만드는가가 검증되지 않은 채 결과만 던지면 reviewer 입장에서 *어떤 부분이 진짜 작동하는가*를 추적 못 한다. ch01 §1의 reject complement 항목에서 가장 자주 잡히는 결함 중 하나다.

**Ablation 표 구성.** row = 제거된 component (또는 변경된 변인), column = 결과 metric. Full method (baseline)가 첫 행 또는 마지막 행. 표 한 컷 예시.

| Variant | KITTI ATE (m) ↓ | KITTI RTE (%) ↓ | Runtime (ms) ↓ |
|---|---|---|---|
| **Ours (full)** | **0.42** | **0.61** | **18** |
| w/o geometric prior | 0.58 | 0.84 | 15 |
| w/o multi-scale fusion | 0.51 | 0.73 | 14 |
| w/o loop closure | 0.71 | 1.12 | 12 |

**Component 한 번에 하나씩.** 두 component를 동시에 제거하면 reviewer가 *어느 쪽 효과인가*를 추적 못 한다. component 둘의 *상호작용*을 보고 싶으면 별도 행 (w/o A + B)으로 추가.

---

## 26.3 통계 유의성과 공정 비교

**Main result 표에 std 또는 95% CI.** 단일 run은 reviewer 입장에서 *우연일 수 있다*. seed 3-5회 average + std가 분야 기본. seed 값까지 명시.

**Hyperparameter 검색 budget 동일.** 본인 방법은 grid search 100회 돌리고 baseline은 기본 1회만 돌린 비교는 desk reject 사유. 두 방법에 같은 budget을 할당했음을 명시.

**Dataset split·evaluation protocol 일치.** KITTI sequence 00-10 train, 11-21 test 같은 standard split을 *옮기면* reviewer가 의심한다. split을 옮길 이유가 있으면 *왜 옮겼는가*를 본문에 한 줄.

**본인 방법의 best column 갯수.** 분야 reviewer가 받아들이는 강도는 *본인 방법이 best 또는 second-best를 차지하는 column 비율*에 비례한다. 모든 column에서 best일 필요는 없다. 한두 column에서 second-best여도 *왜 second-best인가*가 Discussion에서 받아지면 강도가 살아남는다.

---

## 26.4 Discussion — 결과의 해석

**Discussion 골격 4단.** Mensh-Kording rule 8 근거.

1. **핵심 발견의 *왜***. 결과가 *왜* 그런 형태로 나왔는가.
2. **분야 합의와의 관계.** Related Work의 분류 axis 위에서 본인 결과가 어디에 위치하는가.
3. **한계.** 방법의 가정·실험 범위·계산 복잡도.
4. **다음 단계.** 짧게.

**Limitation 섹션 누락 또는 *한계 없음* 선언은 desk reject.** 모든 방법은 한계가 있다. 명시하지 않으면 reviewer가 *공격 빌미*로 잡는다. ch17 rebuttal에서도 limitation 언급이 미리 박혀 있으면 review의 비판이 *이미 답변된 항목*으로 흡수된다.

**한계 기본 세 항목.** 방법의 *가정*(예: static environment 가정), 실험 *범위*(예: 실내 dataset만 검증), *계산 복잡도*(예: $O(N^2)$ memory). 분야별로 추가.

**Discussion에 새 결과 등장 금지.** 새 숫자, 새 figure, 새 ablation은 Results의 몫이다. Discussion이 *해석*이 아니라 *추가 결과*가 되면 두 섹션의 분담이 무너진다.

---

## 26.5 분야 standard — 벤치마크 표 작성

분야별로 기본 벤치마크 dataset과 metric이 정해져 있다. 그 기본값을 따르지 않으면 reviewer가 *왜 standard에서 벗어나는가*를 본문 어디서도 받지 못한다.

| 분야 | Default dataset | Default metric |
|---|---|---|
| Visual SLAM | KITTI · TUM RGB-D · EuRoC | ATE · RTE |
| LiDAR SLAM | KITTI · MulRan · Newer College | ATE · RTE · Loop closure recall |
| 3D 재구성 | ScanNet · Tanks and Temples · Replica | F-score · 정확도 · 완전성 |
| Object detection | COCO · LVIS · Open Images | mAP · AP@[0.5:0.95] |

**표 직전 paragraph가 표를 읽는 법을 한 줄로.** "Bold marks the best in each column. Underline the second best." 한 줄이 빠지면 reviewer가 매번 caption을 backtrack한다. ch13 §3에서 더 자세히.

**본인 방법 row 강조.** 음영 또는 별표. 표 아래 footnote에 *Our method* 라벨. reviewer skim 단계에서 *어느 row가 본인 방법인가*가 한 눈에 잡혀야 한다.

분야별 사례는 [robotics-practice ch20 § 20.8.2](https://alexjunholee.github.io/robotics-practice/guide.html#2082-실험-설계와-ablation)에 링크로 둔다. ablation·변인 통제·통계 유의성·공정 비교의 분야별 사례가 거기에 있다.

---

## 26.6 흔한 실수 5종

**Ablation 부재.** component별 효과 검증 안 됨. 단일 reject 사유.

**단일 run.** std/CI 부재. 우연성 미통제.

**불공정 비교.** hyperparameter budget·dataset split 비대칭.

**Discussion에 새 결과.** content와 conclusion 스케일 혼합.

**Limitation 누락.** 공격 빌미 자가 노출.

---

**출처.** [Mensh & Kording 2017](https://doi.org/10.1371/journal.pcbi.1005619) rule 5·8 — Results·Discussion 골격. 분야 standard — KITTI·TUM·ScanNet 벤치마크 표. [robotics-practice ch20 § 20.8.2](https://alexjunholee.github.io/robotics-practice/guide.html#2082-실험-설계와-ablation) — ablation·통계 유의성·공정 비교 분야 적용 사례 (link). 흔한 실수 5종과 ablation·통계 권고는 이 장에서 정리했다.

# Ch.27 — Figures: 안티패턴과 좋은 패턴

[Keshav 2007](https://web.stanford.edu/class/ee384m/Handouts/HowtoReadPaper.pdf)의 1st pass에서 reviewer가 본문은 건너뛰어도 figure는 본다. 본문보다 figure에 시간을 쓰라는 [Mensh & Kording 2017](https://doi.org/10.1371/journal.pcbi.1005619) rule 9의 권고가 이 비대칭에서 나왔다. figure가 한 컷에서 message를 못 전달하면, 본문이 그 빈 곳을 못 채운다.

[Whitesides 2004](https://onlinelibrary.wiley.com/doi/10.1002/adma.200400767) §V는 figure 한 컷을 5-10회 다시 그리는 것을 작업 표준으로 잡았다. 처음 그린 figure는 거의 항상 약하므로, 가장 약한 버전을 버리고 가장 강한 한 컷을 남기는 절차를 따로 둔다는 입장이다.

학생들이 첫 figure를 matplotlib 기본 설정 그대로 PDF에 박는 패턴이 흔하다. 안티패턴 카탈로그는 [cxli233 (GitHub)의 *Friends Don't Let Friends Make Bad Graphs*](https://github.com/cxli233/FriendsDontLetFriends)에 정리되어 있다. 이 장은 그 카탈로그를 로보틱스·CV 사례로 재작성하고 Whitesides의 process 규칙과 합쳐 둔다.

---

## 27.1 차트 안티패턴

**Mean separation에 bar plot.** 평균 차이를 막대로 그리면 분포가 안 보인다. 두 막대의 차이가 sample size 때문인지, variance 때문인지, 진짜 평균 차이 때문인지 구별이 안 된다. KITTI 시퀀스별 RTE 평균을 method A·B로 두 막대로 그리는 figure가 흔한 사례다. 처방은 시퀀스별 점을 strip plot으로 깔고, 위에 평균 막대 또는 box plot을 얹는 것.

**Small n에 violin plot.** Violin은 KDE 위에 깔린다. KDE는 n≥10에서 의미 있는 매끈함을 만들고, n=3-5에서는 *거짓 매끈함*을 만든다. KITTI 4-5 시퀀스만으로 violin을 그리면 분포처럼 보이지만 분포가 아니다. 4-5 시퀀스 비교는 strip plot + 평균 막대로 충분하다.

**Unidirectional 데이터에 bidirectional color.** RdBu, coolwarm 같은 발산형 colormap은 *0을 중심으로 의미 있는 양/음*에만 쓴다. 0-100% recall에 RdBu를 쓰면 50%가 "중립"으로 보이는데, recall 50%는 중립이 아니다. 단방향 양수 데이터에는 viridis, magma 같은 perceptually uniform sequential colormap을 쓴다.

**Pie chart.** 인간이 가장 정확도가 떨어지는 비교 작업이 *각도 비교*다. 실패 모드 분류를 pie로 그리지 말고 가로 막대로. 항목이 5개를 넘으면 막대도 정렬이 필요하다.

**Rainbow scale (jet).** 비단조 luminance, 색맹에 hostile, 경계에서 인지적 불연속이 생긴다. matplotlib 2.0 이후 기본이 viridis로 바뀐 것이 이 합의의 결과다. depth map, error map 모두 viridis 계열을 기본으로.

---

## 27.2 라벨·축·통계 안티패턴

**Axis label 누락 또는 단위 누락.** 가로축이 시간인지 관점 index인지, 단위가 second인지 millisecond인지 figure만 보고 답이 안 나오면 desk reject 사유가 될 수 있다. 세로축도 동일. drift가 m인지 %인지, RTE가 m/s인지 m/관점인지.

**Error bar 정의 누락.** 막대 위에 ± 표시만 있고 그게 std인지 sem인지 95% CI인지 caption에서 안 밝히면 figure가 통계적으로 무의미해진다. caption 한 줄이 빠져서 figure 전체가 반박 불가가 되는 경우다.

**Significance 표기 정의 누락.** `*`, `**`, `***`이 어떤 test의 어떤 p-threshold인지 caption에 명시. 학생들이 별표만 그리고 test 이름을 빼는 일이 흔하다.

---

## 27.3 Caption은 self-explanatory해야 한다

Whitesides §V의 강한 규칙 하나는 caption이 본문을 다시 펼치지 않고도 figure를 이해시켜야 한다는 것이다. reviewer가 본문을 안 읽고 figure만 훑을 때 caption이 *takeaway*를 전달해야 한다. 그래서 본문에 기댄 caption은 1st pass에서 무용지물로 돌아간다.

caption의 권장 구조는 세 부분으로 나뉜다.

1. **한 줄 takeaway.** "Method A는 KITTI 시퀀스 00-10 전반에서 method B 대비 RTE 14% 낮다." 같은 declarative.
2. **데이터·축·기호 정의.** 점이 무엇이고, 색이 무엇이며, error bar가 무엇인지.
3. **통계·n.** sample size, test, p-threshold.

ORB-SLAM (Mur-Artal et al., 2015) 논문의 figure 1이 system overview + caption 한 줄 takeaway를 결합한 사례다. 발췌와 분석은 Part 3 [`orb_slam_contribution.md`](./excerpts/excerpt_02_orb_slam_contribution.md)에.

---

## 27.4 Figure 제작 process

**5-10회 스케치, 가장 약한 버전을 버린다.** Whitesides의 규칙. 한 번에 final이 나오는 figure는 거의 없다. 종이에 거칠게 그린 sketch부터 시작하고, matplotlib 코드는 가장 마지막 두 회차에 들어간다.

**Figure 먼저, 본문 나중.** figure가 message를 못 정하면 본문도 못 정한다. Results 절을 쓰기 전에 figure 후보 3-4개를 종이에 먼저 그려본다.

**Panel 간 색·기호·선 종류 일관.** 한 논문 안에서 method A는 늘 같은 색과 기호로 등장. figure 3에서 파란 동그라미였다가 figure 7에서 빨간 세모이면 reviewer가 두 번 읽어야 한다.

---

## 27.5 좋은 figure 체크리스트

draft가 끝난 figure 한 컷에 다음 여섯 항목을 적용해 둔다.

- Axis label과 단위 명시
- Error bar 정의 caption에
- Colorblind-safe palette (viridis 계열, 또는 ColorBrewer 종류)
- Caption 첫 줄이 declarative takeaway
- Panel 간 색·기호 일관
- Vector format (PDF/SVG), embedded font

여섯 항목 모두 통과하지 못하면 figure는 아직 draft다.

---

**출처.** [cxli233 (GitHub), *Friends Don't Let Friends Make Bad Graphs*](https://github.com/cxli233/FriendsDontLetFriends) — 차트 안티패턴 카탈로그. [Whitesides 2004](https://onlinelibrary.wiley.com/doi/10.1002/adma.200400767) §V — 5-10회 스케치, self-explanatory caption. [Mensh & Kording 2017](https://doi.org/10.1371/journal.pcbi.1005619) rule 9 — figure에 시간 배분. 로보틱스·CV 사례 재작성과 체크리스트는 이 장에서 정리했다.

# Ch.28 — Tables: 비교의 자리

ch12의 figure가 *분포·궤적·qualitative*를 보여 준다면, table은 *수치 비교*를 받는다. 두 영역의 결정 기준이 다른 만큼, figure를 표로 옮기거나 표를 figure로 옮기는 작업이 항상 한쪽을 약화시킨다. 분포가 중요한 곳에 표를 박으면 분포가 사라지고, 정확한 수치 비교가 중요한 곳에 figure를 박으면 reviewer가 *bar 길이*에서 수치를 추출해야 한다.

[cxli233 (GitHub)의 *Friends Don't Let Friends Make Bad Graphs*](https://github.com/cxli233/FriendsDontLetFriends)가 figure 안티패턴을 카탈로그한 것처럼, table 안티패턴도 분야에서 정형화된 형태로 반복된다. 이 장은 ch12와 같은 방식으로 table의 안티패턴과 좋은 패턴을 정리한다.

---

## 28.1 안티패턴 5종

**강조 표시 일관성 부재.** 본인 방법은 bold, baseline은 plain. 그런데 ablation 표에서는 best component가 underline. 한 논문 안에서 강조의 의미가 표마다 바뀌면 reviewer가 매번 caption을 backtrack해야 한다. 한 논문 한 규약 — bold = best, underline = second best가 분야에서 가장 안전한 기본.

**너무 많은 column.** KITTI 11 시퀀스를 모두 column으로 박으면 표가 한 페이지를 넘는다. 시퀀스를 row로, metric을 column으로 (또는 그 반대) 일관되게. 표 하나에 5-15 row × 3-7 column이 가독성 한계.

**Vertical line 남발.** LaTeX 기본 `|`가 모든 column 사이에 들어가는 패턴. booktabs(`\toprule`, `\midrule`, `\bottomrule`만)가 분야 표준이고, vertical line 0개가 권고.

**Default 폰트 크기.** 표가 본문 폰트와 같은 크기면 cell 여백이 부족해 답답하게 읽힌다. `\small` 또는 `\footnotesize`로 한 단계 줄이면 cell 호흡이 살아난다.

**숫자 정렬 부재.** 0.143과 0.07이 한 column에 섞여 있는데 소수점 위치가 안 맞으면 시각적 비교가 깨진다. `siunitx` package 또는 `\phantom{0}`으로 자릿수 맞추기. 한 column 안에서 모든 숫자의 소수점이 같은 위치에 와야 한다.

---

## 28.2 좋은 패턴

**Booktabs.** `\toprule` (표 상단), `\midrule` (header와 body 사이), `\bottomrule` (표 하단). vertical line 0개. column 그룹이 필요하면 `\cmidrule{2-4}`로 부분 horizontal line. 분야 reviewer 입장에서 가장 빠르게 *완성도*를 받는 패턴이다.

**강조 규약 명시.** caption 첫 줄 또는 표 하단 footnote에 명시. *Bold marks the best, underline the second best in each column.* 한 논문의 모든 표가 같은 규약을 공유한다.

**Caption 구조 3단.**

1. **한 줄 takeaway.** "Method A consistently outperforms baselines on KITTI sequences 00-10."
2. **표 읽는 법.** bold/underline 의미·dataset split·평균 횟수.
3. **통계.** std 또는 95% CI·n·seed.

**본인 방법 row 강조.** 음영(`\rowcolor{gray!15}`) 또는 별표. 표 아래 footnote에 *Our method* 라벨. reviewer skim 단계에서 *어느 row가 본인 방법인가*가 한 눈에 잡혀야 한다 — ch11 §5와 같은 권고.

---

## 28.3 세 종류 — 비교 표·ablation 표·hyperparameter 표

**비교 표.** row = method, column = dataset/sequence × metric. 본인 방법 한 줄, baseline 5-10줄. 분야 standard SOTA가 빠지면 desk reject — ch11 §3 항목. column이 많아지면 dataset별로 표를 나눈다.

| Method | KITTI 00 ATE ↓ | KITTI 09 ATE ↓ | TUM fr1 ATE ↓ | Runtime ↓ |
|---|---|---|---|---|
| ORB-SLAM3 | 0.51 | 1.34 | 0.018 | 22 ms |
| LIO-SAM | 0.42 | 0.91 | — | 28 ms |
| **Ours** | **0.38** | <u>0.73</u> | **0.012** | **18 ms** |

**Ablation 표.** row = removed component, column = metric. 첫 행 또는 마지막 행이 full method (baseline). 한 component씩 제거. ch11 §2의 표 예시가 같은 형태.

**Hyperparameter 표.** row = parameter, column = value · meaning · sensitivity. 마지막 column이 ablation 섹션과 직결 — *변경 시 RTE 0.84 → 0.61*처럼 sensitivity가 박혀 있으면 reviewer가 *ablation에서 검증된 항목*을 한 눈에 받는다.

---

## 28.4 흔한 실수 4종

**강조 일관성 부재.** bold/underline의 의미가 표마다 다름. 한 논문 한 규약을 어김.

**Column 폭주.** row와 column 축이 잘못 잡힘. 시퀀스가 column에 가서 표가 가로로 넘침.

**숫자 정렬 부재.** 소수점이 어긋남. 시각적 비교가 깨짐.

**Caption 한 줄 takeaway 부재.** 표만 보고 결론을 못 잡음. ch12 §3의 figure caption 권고와 같은 권고.

---

## 28.5 ch12와의 결정 기준

figure와 table 중 어느 쪽에 정보를 박을지 결정하는 기준은 다음과 같다.

- **분포가 중요하면** figure (strip plot · violin · box). row 5개 column 3개 표는 분포를 못 보여 준다.
- **정확한 수치 비교가 중요하면** table. figure의 bar 길이에서 reviewer가 수치를 추출해야 하면 비교 정확도가 떨어진다.
- **Trajectory·spatial 정보면** figure (궤적 시각화·heatmap·error map). 표가 spatial 정보를 못 받는다.
- **Method 간 다차원 비교면** table. 5-7 dimension의 비교는 figure로 표현하기 어렵다.

두 매체가 같은 결과를 *중복*해서 보여 주면 한쪽을 빼는 것이 권고. 같은 KITTI 결과를 figure 하나와 표 하나로 동시에 박으면 한쪽이 잉여로 남는다. figure는 *qualitative trajectory*, 표는 *quantitative metric 비교*로 분담.

LaTeX 도구(booktabs·algorithm2e)의 자세한 사용법은 [robotics-practice ch20 § 20.8.5](https://alexjunholee.github.io/robotics-practice/guide.html#2085-도구)에 링크로 둔다.

# Ch.29 — 문장 구조와 독자 기대

영어 논문이 안 읽힌다는 직감을 가진 학생이 어휘를 더 어렵게 바꾸려 든다. [Gopen & Swan 1990](https://www.americanscientist.org/article/the-science-of-scientific-writing)의 진단은 정반대 방향을 가리킨다. 글의 어려움은 *어휘*가 아니라 *구조*에서 온다. 단어를 바꾸는 작업은 헛수고에 가깝고, 고쳐야 하는 곳은 문장 안에서 정보가 놓이는 *위치*다.

Gopen-Swan이 같은 논문에서 박은 다른 명제는 도구적 함의가 더 크다. "글의 질을 개선하면 사고의 질이 개선된다." 구조를 다듬다 보면 *개념의 빈틈*이 드러난다는 관찰이다. 그러니까 문장 구조 점검은 사고의 점검 도구로 작동한다.

다만 이들은 규칙이 아니라 원칙이라는 단서가 같이 붙는다. 잘 쓰는 사람은 잘 어긴다. 어기는 위치가 일관되고, 어겨도 되는 이유를 안다.

---

## 29.1 문장 안의 위치 — 5대 원칙

**Stress position — 문장 끝에는 새 정보를.** 문장 끝, 또는 `;` `:` 직전이 *강조 위치*다. 독자는 거기에 도달할 때 닫힘(closure)을 느끼고 가장 강하게 기억한다. 보일러플레이트가 거기에 오면 강조가 무로 돌아간다.

> ❌ The proposed method achieves 14% improvement in this paper.
>
> ✓ In this paper, the proposed method achieves a 14% improvement.

"in this paper"는 backward link라서 topic position에 둔다. stress position은 14%가 받는다.

**Topic position — 문장 머리에는 이미 등장한 것.** 문장 첫 단어는 *관점을 정하고 backward link를 건다*. 새 명사를 첫머리에 던지면 독자가 앞 단락과 연결할 단서를 잃는다.

**Subject-Verb proximity — 주어와 동사 사이는 짧게.** 주어와 동사 사이에 단어 15개를 넘기면 red flag. 한국 학생이 관계절·전치사구를 끼워 넣다가 가장 자주 어기는 원칙이다. 독자는 동사를 받기 전까지 주어를 working memory에 들고 있어야 한다.

**Old-before-New.** topic = old, stress = new. Gopen-Swan이 "미국 전문 글쓰기 1번 문제"라고 박은 원칙. 정보 흐름이 거꾸로 가면 독자가 매 문장에서 *왜 이 정보가 지금 들어오는지*를 추론하느라 인지자원을 쓴다.

**Action-in-verb.** action은 verb 자리에 둔다. 명사화하면 verb 자리가 헐겁다.

> ❌ We performed an evaluation of the algorithm on KITTI.
>
> ✓ We evaluated the algorithm on KITTI.

명사화는 *공식적 톤*을 만들지만 stress position을 약화한다. evaluation이 stress position에 갇히고, 정작 새 정보인 KITTI가 끝에서 밀린다.

---

## 29.2 단위 하나, 메시지 하나

한 문장 = 한 메시지가 Gopen-Swan의 다섯 번째 원칙이다. 진단법은 단순하다. stress position 자격 후보가 둘 이상이면 그 문장이 너무 길다.

> "딸기 쇼트케이크로 시작해 브로콜리로 끝내는 식사는 없다."

stress position에 들어갈 만큼 무게 있는 명사구가 한 문장 안에 둘 이상 등장하면 식사 메뉴가 어긋난다. 끊어서 두 문장으로 만든다.

길게 갈 수밖에 없는 곳에서는 `:`나 `;`가 *secondary stress*를 만든다. punctuation이 만드는 medial closure다. 거기에도 무게 있는 명사구가 받게 배치해 둔다.

---

## 29.3 한국어 → 영어 — 모국어가 만드는 함정 4가지

Gopen-Swan은 영어 모국어 독자만 다룬다. 한편 한국 학생에게는 모국어 구조가 만드는 추가 함정이 있다.

**SOV → SVO 전환 실패.** 한국어는 동사가 끝에 온다. 머릿속에서 동사를 마지막까지 미루는 습관이 영어 작문에서도 살아남고, 그 결과가 *주어와 동사 사이를 늘리는* 문장이다.

> ❌ The proposed method, which combines geometric ICP with a learned residual network trained on 100 KITTI sequences, achieves SOTA.
>
> ✓ The proposed method achieves SOTA. It combines geometric ICP with a learned residual trained on 100 KITTI sequences.

처방은 단순하다. *주어 다음에 바로 동사*. 부연은 다음 문장으로 분리해 둔다.

**"은/는" topic 표지 ≠ 영어 topic position.** 한국어의 "은/는"은 *주제*와 *대조*를 동시에 표시한다. 한편 영어 topic position은 backward link만 한다. "On the other hand"를 매 단락 첫 자리에 두는 학생이 흔한데, 보통 거기에는 *대조*가 아니라 *연속*이 들어가야 한다. 그러지 않으면 backward link가 끊어진다.

**Nominalization 함정.** "~의 수행", "~의 분석" 같은 한국어 학술체가 영어로 옮길 때 `the performance of`, `the analysis of`로 굳어진다. 거의 매번 action-in-verb 원칙을 어긴다. 그래서 한국어 초고에서 명사형이면 영어로 옮길 때 동사형으로 풀어 본다.

**There-구문 남발.** "there are several methods that …"가 topic position을 *유령*으로 채운다. backward link를 거는 자리가 비고, several methods가 sentence body에서 떠다닌다. 그 대신 "Prior work explores several methods …"로 시작해 prior work가 backward link를 받게 한다.

추가로 — old/new 정보 순서가 한국어와 같지 않다. 한국어는 종결어미와 어순이 강조를 만들고, 영어는 *위치만이* 강조를 만든다. 그래서 한국식 "이 결과는 중요한데 …"의 강조를 그대로 옮기면 stress position이 사라진다.

---

## 29.4 자기 진단 — 자기 문장 reverse-read

한 단락을 다 쓴 뒤 다음 두 작업으로 자기 진단을 돌려 본다.

**Topic-flow 추적.** 각 문장의 *첫 명사구*만 추출해 한 줄로 나열한다. 그 체인이 끊기지 않고 이어져야 한다. 첫 명사구가 매 문장마다 새로운 것이라면 backward link가 무너졌다.

**Stress 점검.** 각 문장의 *마지막 명사구*만 추출한다. "this paper", "the proposed method", "our approach" 같은 보일러플레이트가 stress position을 차지하고 있으면 모두 재배치해 둔다.

**소리 내어 읽기.** 주어-동사 거리가 멀면 호흡이 끊긴다. Knuth가 *Mathematical Writing*에서도 같은 처방을 권한 만큼, 자기 글을 큰 소리로 읽는 작업이 두 사람의 권고에서 같은 위치를 차지한다.

URF/ATPase 단락의 before/after rewrite, Gopen-Swan이 같은 논문 §III에 박은 정전 사례의 발췌와 줄별 분석은 Part 3 [`gopen_swan_urf_rewrite.md`](./excerpts/excerpt_03_gopen_swan_urf_rewrite.md)에.

---

# Ch.30 — 수식·정리·증명 쓰기

수식이 들어간 문단을 reviewer가 어떻게 읽는지에 대한 [Knuth, Larrabee, Roberts 1989](https://www-cs-faculty.stanford.edu/~knuth/klr.html)의 관찰 — 이 장의 출발점이다. 첫 독서에서 독자는 수식을 *건너뛴다*. 두 번째 독서에서야 수식을 들여다본다. 그래서 수식이 빠져도 산문이 흘러야 한다는 'blah' 테스트가 §1 rule 16에 박혀 있다. 모든 수식을 단어 'blah'로 치환해도 문장이 이어져야 한다는 입장이다.

학생들이 가장 자주 어기는 곳이 여기다. displayed equation 다섯 줄을 줄줄 던지고 between-equation prose가 0줄인 derivation이 흔하다. 그러면 reviewer가 첫 독서에서 그 페이지를 통과하지 못한다. Nilsson이 §34에 적은 "쉽게 쓴 글일수록 읽기 어렵다"가 같은 문제를 가리킨다. 결국 수식 prose는 가장 어렵게 다듬어야 가장 쉬워진다.

---

## 30.1 수식이 문장에 박히는 법 — Knuth 10원칙

**R1. 인접한 수식 사이에는 단어를 넣는다 (rule 1).** 두 수식이 쉼표만으로 이어지면 어디서 한 수식이 끝나고 다음이 시작하는지 즉시 안 잡힌다.

> ❌ Consider $S_q$, $q < p$.
>
> ✓ Consider $S_q$, where $q < p$.

**R2. 문장은 수식으로 시작하지 않는다 (rule 2).**

> ❌ $X$ denotes the rotation matrix.
>
> ✓ Let $X$ denote the rotation matrix.

문장 첫 자리는 산문 단어가 받는다. ch14의 topic position 원칙과 같다.

**R3. 산문 안에 ∴ ⇒ ∀ ∃ 금지 (rule 3).** 논리 기호는 수식 *안*에서만 산다. 그래서 본문 문장 안에 `∴`를 끼워 넣으면 reviewer가 두 번 parsing해야 한다.

**R4. Displayed equation은 둘러싼 문장의 일부 (rule 6).** displayed 다음에 stray colon 금지. equation 끝의 마침표·쉼표는 *문장 부호*로서 정확하게.

> displayed equation의 끝이 문장의 끝이면 수식 뒤에 마침표.
> displayed equation 다음에 산문이 이어지면 수식 뒤에 쉼표 또는 무부호.

**R5. 인용 형식.** "Equation (5)", "Theorem 2", "Lemma 3.1". 번호가 붙으면 첫 글자 대문자.

**R6. 정의는 두 번 다른 방식으로 (rule 5).** 수식 + 산문. "Let $\mathbf{T} \in SE(3)$ denote the rigid-body transform from sensor 관점 to world 관점."에서 수식과 산문이 같은 정의를 두 번 다른 방식으로 던진다.

**R7. 중요한 수식만 displayed, 참조되는 것만 number (rule 6).** 모든 수식에 번호를 붙이면 모든 수식이 중요해지고, 결국 아무것도 안 중요해진다. 본문에서 다시 인용하지 않는 수식은 번호 빼기.

**R8. 같은 기호를 두 의미로 쓰지 마라 (rule 9).** 로보틱스에서 흔한 충돌이다. $R$이 회전행렬·residual·reward로 동시에 쓰이는 문서가 있다. 한 문서 안에서 한 의미. ch16의 매크로 위생과 직결된다.

**R9. "that"을 빼지 마라 (rule 8).**

> ❌ We show $X$ converges.
>
> ✓ We show that $X$ converges.

영어 논문에서 "that" 생략은 종종 parsing을 어렵게 만든다.

**R10. "we"를 쓰고 "I"는 피한다 (rule 7).** Knuth, Whitesides, Mensh-Kording이 모두 같은 권고를 한다. 한국 영어 교육에서 강조해 온 passive 우선 관행과 충돌하는 한편, ch01에서 다룬 *지도교수 스타일을 따른다*는 입장과 같은 결정 축이다.

---

## 30.2 Theorem·Lemma·Proof — 자기완결과 signposting

**Theorem statement는 자기완결적이다.** Knuth rule 4의 핵심이다. 정리 안의 모든 기호가 정리문 안에서 정의되거나 명시 참조되어야 한다. 앞 단락을 다시 읽어야 statement가 이해되면 self-contained가 아니다.

> ❌ **Theorem 1.** *Under the conditions above, the estimator converges.*
>
> ✓ **Theorem 1.** *Let $\hat{\mathbf{x}}_k$ denote the EKF posterior mean at step $k$, and assume the observation noise satisfies $\mathbb{E}[\mathbf{v}_k] = \mathbf{0}$ and $\mathrm{Cov}(\mathbf{v}_k) = \mathbf{R}$. Then $\hat{\mathbf{x}}_k \to \mathbf{x}_k^\star$ as $k \to \infty$ in mean square.*

**Motivate before stating.** 정리 진술 직전 1-2 문장으로 *왜 이 정리가 필요한가*를 짚는다. 그 한 문장이 없으면 reviewer가 정리를 받고 "그래서?"부터 묻게 된다.

**Lemma·Theorem·Corollary는 위계가 다르다.** Lemma는 디딤돌, Theorem은 본 주장, Corollary는 직접 귀결이다. 한국 학생이 디딤돌도 Theorem으로 박는 일이 흔하다. 그러면 위계가 무너지면서 reviewer가 *진짜 main result*를 못 잡는다.

**증명 안의 signpost.** "We divide the proof into two parts." "The lemma is half proved." 증명이 반 페이지를 넘기면 signpost가 필수다. 그래야 독자가 어디쯤 와 있는지 잡을 단서가 된다.

**Direct proof가 가능한데 contradiction부터 가지 마라.** Knuth의 권고다. proof by contradiction은 독자에게 *부정 명제를 working memory에 들고 있을 부담*을 지운다. 그래서 direct proof가 닿는 곳에서는 direct가 우선이다.

**Halmos box (∎).** 증명 끝에 명시한다. 한국 학생들이 종종 빠뜨린다.

---

## 30.3 로보틱스·CV 특화 패턴

**SE(3)·Lie group 표기.** $\mathbf{T} \in SE(3)$, $\boldsymbol{\xi} \in \mathfrak{se}(3)$. 한 논문 안에서 case·bold·hat을 통일한다. 회전행렬을 한 곳에서 $\mathbf{R}$, 다른 곳에서 $R$로 쓰면 reviewer가 *다른 양인지* 추측해야 한다. ch16에서 매크로로 강제한다.

**Optimization 수식 패턴.**

$$\mathbf{x}^\star = \arg\min_{\mathbf{x}} f(\mathbf{x}) \quad \text{s.t.} \quad g(\mathbf{x}) = 0$$

`\text{s.t.}` 인지 `\text{subject to}`인지 한 문서 안에서 통일한다. 첫 등장 시 prose에서 한 번 풀어 둔다.

**Probabilistic 수식.** $p(\mathbf{x} \mid \mathbf{z})$의 `\mid`와 `|`를 섞지 않는다. Bayes filter 단계마다 prior, likelihood, posterior가 무엇을 가리키는지 prose에서 명시한다 — R6 이중 표현이 적용된다.

**잔차·loss 정의.** $\mathbf{r}_i = \mathbf{z}_i - h(\mathbf{x})$ 같은 잔차 정의에서, 인덱스 $i$가 무엇 위에서 도는지 prose에서 항상 밝힌다. "for each measurement $i \in \{1, \ldots, N\}$." 인덱스 변수만 던져두면 독자가 *어떤 집합 위에서의 합인지* 추측해야 한다.

**수식 줄바꿈에서 등호의 위치.** Inline에서는 등호 *뒤*에서 끊고, displayed에서는 등호 *앞*에서 끊는다. Knuth가 §1에 박은 typographic convention이다.

---

## 30.4 진단 — 자기 derivation의 'blah' 통과

자기 글의 derivation 한 페이지를 골라 모든 수식을 'blah'로 치환해 본다. 그 페이지가 산문으로서 흘러야 한다. 흐름이 끊기는 곳이 곧 between-equation prose가 비어 있는 자리다.

Knuth가 §2-§3에 박은 atrocious-vs-polished proof — 같은 정리의 두 버전을 나란히 놓고 줄별로 비교하는 자료가 이 장의 정전 사례다. 발췌와 분석은 Part 3 [`knuth_proof_rewrite.md`](./excerpts/excerpt_04_knuth_proof_rewrite.md)에.

---

**출처.** [Knuth, Larrabee, Roberts 1989](https://www-cs-faculty.stanford.edu/~knuth/klr.html) — *Mathematical Writing* §1의 27 rules에서 추린 10개 (rules 1, 2, 3, 4, 5, 6, 7, 8, 9, 16). atrocious-vs-polished proof는 §2-§3. Halmos box, Nilsson "쉽게 쓴 글" 인용도 같은 문서. 로보틱스·CV 4 패턴(SE(3), optimization, probabilistic, 잔차·loss)은 이 장에서 정리했다.
